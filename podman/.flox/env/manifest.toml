schema-version = "1.10.0"

# Minimal Podman environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/podman"]
#
# Podman provides rootless containers. On macOS it
# uses a virtual machine (qemu) to run Linux
# containers.

[install]
podman.pkg-path = "podman"
podman.pkg-group = "podman"
podman-compose.pkg-path = "podman-compose"
podman-compose.pkg-group = "podman"

[install.qemu]
pkg-path = "qemu"
pkg-group = "podman"
systems = ["x86_64-darwin", "aarch64-darwin"]

[hook]
on-activate = '''
# Ensure containers policy exists on Linux
if [ "$(uname -s)" = "Linux" ]; then
  POLICY="$HOME/.config/containers/policy.json"
  if [ ! -f "$POLICY" ]; then
    mkdir -p "$(dirname "$POLICY")"
    printf '%s\n' \
      '{"default": [{"type": "insecureAcceptAnything"}]}' \
      > "$POLICY"
  fi
fi
'''
