{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "claude-code": {
        "pkg-path": "flox/claude-code",
        "pkg-group": "claude-code"
      },
      "claude-code-plugin-agentmemory": {
        "pkg-path": "flox/claude-code-plugin-agentmemory",
        "pkg-group": "claude-code-plugin-agentmemory"
      },
      "claude-managed": {
        "pkg-path": "flox/claude-managed",
        "pkg-group": "claude-managed",
        "version": "^0.4.1"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "nodejs": {
        "pkg-path": "nodejs_20",
        "pkg-group": "agentmemory"
      }
    },
    "vars": {
      "AGENTMEMORY_INJECT_CONTEXT": "true",
      "AGENTMEMORY_URL": "http://localhost:3111",
      "AGENTMEMORY_VERSION": "0.9.20"
    },
    "hook": {
      "on-activate": "export AGENTMEMORY_CACHE=\"$FLOX_ENV_CACHE/agentmemory\"\nexport npm_config_cache=\"$AGENTMEMORY_CACHE/npm\"\nmkdir -p \"$npm_config_cache\"\neval \"$(claude-managed setup-hook)\"\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'agentmemory — persistent memory for Claude Code' '' \\\n    'Start the backend in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'REST + MCP:' \\\n    \"  $AGENTMEMORY_URL\" '' \\\n    'Pinned server version:' \\\n    \"  $AGENTMEMORY_VERSION\" '' \\\n    'Plugin:' \\\n    '  $FLOX_ENV/share/claude-code/plugins/agentmemory' '' \\\n    'Try it:' \\\n    '  claude   # then /recall, /remember, /handoff'\nfi\n"
    },
    "profile": {
      "bash": "eval \"$(claude-managed setup-profile-bash)\"\n",
      "zsh": "eval \"$(claude-managed setup-profile-zsh)\"\n",
      "fish": "claude-managed setup-profile-fish | source\n"
    },
    "options": {},
    "services": {
      "agentmemory": {
        "command": "export AGENTMEMORY_CACHE=\"$FLOX_ENV_CACHE/agentmemory\"\nexport npm_config_cache=\"$AGENTMEMORY_CACHE/npm\"\nexport XDG_DATA_HOME=\"$AGENTMEMORY_CACHE/data\"\nmkdir -p \"$npm_config_cache\" \"$XDG_DATA_HOME\"\nexec npx -y \"@agentmemory/agentmemory@$AGENTMEMORY_VERSION\"\n"
      }
    }
  },
