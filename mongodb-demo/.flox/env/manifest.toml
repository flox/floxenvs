schema-version = "1.10.0"

[include]
environments = [
  { dir = "../mongodb" }
]

# mongosh and gum are demo-only tools, kept in their
# own pkg-group so they resolve independently from
# the MongoDB server.

[install]
mongosh.pkg-path = "mongosh"
mongosh.pkg-group = "demo-tools"
gum.pkg-path = "gum"
gum.pkg-group = "demo-tools"

[hook]
on-activate = '''
if [[ "${FLOX_ENVS_TESTING:-}" != "1" ]]; then
  gum style --border double --margin '1 2' \
    --padding '1 4' \
    'Start MongoDB in the background:' \
    '  flox services start' \
    '  flox activate --start-services' '' \
    'Connect to MongoDB:' \
    "  mongosh --host $MONGO_HOST --port $MONGO_PORT" \
    '' \
    'Connection information:' \
    "  host=$MONGO_HOST" \
    "  port=$MONGO_PORT"
fi
'''
