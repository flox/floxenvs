      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      }
    },
    "hook": {
      "on-activate": "eval \"$(claude-managed setup-hook)\"\n\nif [ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]; then\n  gum style \\\n    --foreground 212 --border-foreground 212 \\\n    --border double --align center \\\n    --width 50 --margin \"1 2\" --padding \"1 2\" \\\n    \"Claude Code\" \"with managed configuration\"\n  echo \"\"\n  echo \"  claude           — start Claude Code\"\n  echo \"  claude-managed doctor  — show config and validate\"\n  echo \"\"\nfi\n"
    },
    "profile": {
      "bash": "eval \"$(claude-managed setup-profile-bash)\"\n",
      "zsh": "eval \"$(claude-managed setup-profile-zsh)\"\n",
      "fish": "claude-managed setup-profile-fish | source\n"
    },
    "options": {}
  },
