      "install": {
        "claude-code-plugin-official-typescript-lsp": {
          "pkg-path": "flox/claude-code-plugin-official-typescript-lsp",
          "pkg-group": "claude-code-plugin-official-typescript-lsp"
        },
        "gum": {
          "pkg-path": "gum",
          "pkg-group": "demo-tools"
        }
      },
      "hook": {
        "on-activate": "if [ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]; then\n  gum style \\\n    --foreground 212 --border-foreground 212 \\\n    --border double --align center \\\n    --width 50 --margin \"1 2\" --padding \"1 2\" \\\n    \"Claude Code\" \"with managed configuration\"\n  echo \"\"\n  echo \"  claude           — start Claude Code\"\n  echo \"  claude-managed doctor  — show config and validate\"\n  echo \"\"\nfi\n"
      },
      "options": {},
      "include": {
        "environments": [
          {
            "dir": "../claude"
          }
        ]
      }
    },
    "include": [
      {
        "manifest": {
          "schema-version": "1.10.0",
          "install": {
            "claude-code": {
              "pkg-path": "flox/claude-code",
              "pkg-group": "claude-code"
            },
            "claude-managed": {
              "pkg-path": "flox/claude-managed",
              "pkg-group": "claude-managed",
              "version": "^0.4.1"
            }
          },
          "hook": {
            "on-activate": "eval \"$(claude-managed setup-hook)\"\n"
          },
          "profile": {
            "bash": "eval \"$(claude-managed setup-profile-bash)\"\n",
            "zsh": "eval \"$(claude-managed setup-profile-zsh)\"\n",
            "fish": "claude-managed setup-profile-fish | source\n"
          },
          "options": {}
        },
        "name": "claude",
        "descriptor": {
          "dir": "../claude"
        }
      }
    ],
    "warnings": []
  }
}
