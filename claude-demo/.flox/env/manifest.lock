    "hook": {
      "on-activate": "# Use local build if available (until plugin support is published)\nif [ -d \"$FLOX_ENV_PROJECT/../result-claude-managed/bin\" ]; then\n  export PATH=\"$FLOX_ENV_PROJECT/../result-claude-managed/bin:$PATH\"\nfi\neval \"$(claude-managed setup-hook)\"\n\nif [ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]; then\n  gum style \\\n    --foreground 212 --border-foreground 212 \\\n    --border double --align center \\\n    --width 50 --margin \"1 2\" --padding \"1 2\" \\\n    \"Claude Code\" \"with managed configuration\"\n  echo \"\"\n  echo \"  claude           — start Claude Code\"\n  echo \"  claude-managed status  — show config\"\n  echo \"  claude-managed doctor  — validate config\"\n  echo \"\"\nfi\n"
    },
