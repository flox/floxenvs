schema-version = "1.10.0"

[include]
environments = [
  { dir = "../claude" }
]

[install]
gum.pkg-path = "gum"
gum.pkg-group = "demo-tools"
skills-official-typescript-lsp.pkg-path = "flox/skills-official-typescript-lsp"
skills-official-typescript-lsp.pkg-group = "skills-official-typescript-lsp"

[hook]
on-activate = '''
if [ "${FLOX_ENVS_TESTING:-}" != "1" ]; then
  gum style \
    --foreground 212 --border-foreground 212 \
    --border double --align center \
    --width 50 --margin "1 2" --padding "1 2" \
    "Claude Code" "with managed configuration"
  echo ""
  echo "  claude           — start Claude Code"
  echo "  flox-ai doctor  — show config and validate"
  echo ""
fi
'''
