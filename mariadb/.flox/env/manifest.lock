{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "mariadb": {
        "pkg-path": "mariadb",
        "pkg-group": "mariadb"
      }
    },
    "vars": {
      "MARIADB_DATABASE": "mydb",
      "MARIADB_HOST": "127.0.0.1",
      "MARIADB_PORT": "13307",
      "MARIADB_PWD": "mypass",
      "MARIADB_USER": ""
    },
    "hook": {
      "on-activate": "export MARIADB_HOME=\"$FLOX_ENV_CACHE/mariadb\"\nexport MARIADB_CONFIG=\"$MARIADB_HOME/my.cnf\"\nexport MARIADB_DATADIR=\"$MARIADB_HOME/data\"\nexport MARIADB_TMPDIR=\"$MARIADB_HOME/tmp\"\nexport MARIADB_SOCKET=\"$MARIADB_HOME/mariadb.sock\"\nINIT_LOG=\"$MARIADB_HOME/init.log\"\n\nif [ -z \"$USER\" ]; then\n  export USER=\"$(id -un)\"\nfi\n\nif [ -z \"$MARIADB_USER\" ]; then\n  export MARIADB_USER=\"$USER\"\nfi\n\nMARIADB_BASEDIR=$(realpath -s \\\n  \"$(dirname $(realpath $(which mariadbd)))/..\")\n\ninit_fail() {\n  echo \"ERROR: MariaDB initialization failed.\" >&2\n  if [ -f \"$INIT_LOG\" ]; then\n    echo \"--- init.log ---\" >&2\n    cat \"$INIT_LOG\" >&2\n    echo \"--- end init.log ---\" >&2\n  fi\n  exit 1\n}\n\nif [ ! -d \"$MARIADB_DATADIR\" ]; then\n  mkdir -p \"$MARIADB_DATADIR\" \"$MARIADB_TMPDIR\"\n\n  cat > \"$MARIADB_CONFIG\" <<EOF\n[client]\nport   = $MARIADB_PORT\nsocket = $MARIADB_SOCKET\n\n[mysqld]\nuser     = $USER\nsocket   = $MARIADB_SOCKET\nport     = $MARIADB_PORT\nbasedir  = $MARIADB_BASEDIR\ndatadir  = $MARIADB_DATADIR\ntmpdir   = $MARIADB_TMPDIR\nbind-address = $MARIADB_HOST\nskip-external-locking\nEOF\n\n  echo \"Initializing MariaDB database...\" >> \"$INIT_LOG\"\n\n  # mariadb-install-db calls chown which fails inside user\n  # namespaces (only uid 65534 is mapped). Create a no-op\n  # chown wrapper so the init script doesn't fail.\n  FAKE_BIN=\"$MARIADB_TMPDIR/fake-bin\"\n  mkdir -p \"$FAKE_BIN\"\n  echo '#!/bin/sh' > \"$FAKE_BIN/chown\"\n  echo 'exit 0' >> \"$FAKE_BIN/chown\"\n  chmod +x \"$FAKE_BIN/chown\"\n\n  PATH=\"$FAKE_BIN:$PATH\" mariadb-install-db \\\n    --defaults-file=\"$MARIADB_CONFIG\" \\\n    --auth-root-authentication-method=normal \\\n    --user=\"$USER\" \\\n    --skip-test-db \\\n    >> \"$INIT_LOG\" 2>&1 \\\n    || init_fail\n\n  rm -rf \"$FAKE_BIN\"\n\n  echo \"Starting temporary MariaDB server...\" >> \"$INIT_LOG\"\n  mariadbd --defaults-file=\"$MARIADB_CONFIG\" \\\n    --skip-networking >> \"$INIT_LOG\" 2>&1 &\n  TMPID=$!\n\n  MAX_ATTEMPTS=15\n  while [ \"$MAX_ATTEMPTS\" -gt 0 ]; do\n    if mariadb-admin --socket=\"$MARIADB_SOCKET\" \\\n        ping -u root 2>/dev/null | \\\n        grep -q alive; then\n      break\n    fi\n    sleep 1\n    MAX_ATTEMPTS=$((MAX_ATTEMPTS - 1))\n  done\n\n  if [ \"$MAX_ATTEMPTS\" -eq 0 ]; then\n    echo \"Temp server did not start\" >> \"$INIT_LOG\"\n    kill \"$TMPID\" 2>/dev/null || true\n    init_fail\n  fi\n\n  echo \"Creating database and user...\" >> \"$INIT_LOG\"\n  mariadb --socket=\"$MARIADB_SOCKET\" -u root \\\n    -e \"CREATE DATABASE IF NOT EXISTS \\`$MARIADB_DATABASE\\`;\" \\\n    >> \"$INIT_LOG\" 2>&1 || init_fail\n\n  mariadb --socket=\"$MARIADB_SOCKET\" -u root -e \\\n    \"CREATE USER IF NOT EXISTS '$MARIADB_USER'@'localhost' IDENTIFIED BY '$MARIADB_PWD'; GRANT ALL PRIVILEGES ON *.* TO '$MARIADB_USER'@'localhost' WITH GRANT OPTION; FLUSH PRIVILEGES;\" \\\n    >> \"$INIT_LOG\" 2>&1 || init_fail\n\n  mariadb-admin --socket=\"$MARIADB_SOCKET\" \\\n    shutdown -u root >> \"$INIT_LOG\" 2>&1\n  wait \"$TMPID\" 2>/dev/null || true\n\n  rm -f \"$INIT_LOG\"\n  echo \"MariaDB initialized successfully.\"\nfi\n"
    },
    "options": {},
    "services": {
      "mariadb": {
        "command": "  exec mariadbd \\\n    --defaults-file=\"$MARIADB_HOME/my.cnf\"\n"
      }
    }
  },
