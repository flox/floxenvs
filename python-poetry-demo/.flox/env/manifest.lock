    "hook": {
      "on-activate": "export POETRY_CACHE=\"$FLOX_ENV_CACHE/python-poetry\"\nexport POETRY_VIRTUALENVS_PATH=\"$POETRY_CACHE/venvs\"\n\nmkdir -p \"$POETRY_CACHE\"\n\nunset VIRTUAL_ENV\n\nif [ -f pyproject.toml ]; then\n  POETRY_VENV=\"$(poetry env info --path 2>/dev/null || echo \"\")\"\n\n  if [ -z \"$POETRY_VENV\" ]; then\n    poetry env use python3\n    POETRY_VENV=\"$(poetry env info --path)\"\n  fi\n\n  source \"$POETRY_VENV/bin/activate\"\n\n  if [ \"$PYTHON_AUTO_INSTALL\" = \"true\" ] \\\n      && [ -f poetry.lock ]; then\n    HASH=$(md5sum poetry.lock 2>/dev/null \\\n      || md5 -q poetry.lock)\n    HASH=$(echo \"$HASH\" | cut -d\" \" -f1)\n    LAST=$(cat \"$POETRY_CACHE/.deps_hash\" 2>/dev/null)\n    if [ \"$HASH\" != \"$LAST\" ]; then\n      poetry install --no-interaction\n      echo \"$HASH\" > \"$POETRY_CACHE/.deps_hash\"\n    fi\n  fi\nfi\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Python + Poetry environment ready!' '' \\\n    'Python version:' \\\n    \"  $(python3 --version 2>&1)\" '' \\\n    'Poetry commands:' \\\n    '  poetry add <package>' \\\n    '  poetry install' \\\n    '  poetry show'\nfi\n"
    },
    "profile": {
      "bash": "if [ -f pyproject.toml ]; then\n  POETRY_VENV=\"$(poetry env info --path 2>/dev/null)\"\n  if [ -n \"$POETRY_VENV\" ]; then\n    source \"$POETRY_VENV/bin/activate\"\n  fi\nfi\n",
      "zsh": "if [ -f pyproject.toml ]; then\n  POETRY_VENV=\"$(poetry env info --path 2>/dev/null)\"\n  if [ -n \"$POETRY_VENV\" ]; then\n    source \"$POETRY_VENV/bin/activate\"\n  fi\nfi\n",
      "fish": "if test -f pyproject.toml\n  set POETRY_VENV (poetry env info --path 2>/dev/null)\n  if test -n \"$POETRY_VENV\"\n    source \"$POETRY_VENV/bin/activate.fish\"\n  end\nend\n",
      "tcsh": "if ( -f pyproject.toml ) then\n  set POETRY_VENV=`poetry env info --path`\n  source \"$POETRY_VENV/bin/activate.csh\"\nendif\n"
    },
    "options": {}
  },
