schema-version = "1.10.0"

[include]
environments = [
  { dir = "../python-poetry" }
]

# gum is a demo-only tool for styled terminal output.

[install]
gum.pkg-path = "gum"
gum.pkg-group = "demo-tools"

[hook]
on-activate = '''
if [[ "${FLOX_ENVS_TESTING:-}" != "1" ]]; then
  gum style --border double --margin '1 2' \
    --padding '1 4' \
    'Python + Poetry environment ready!' '' \
    'Python version:' \
    "  $(python3 --version 2>&1)" '' \
    'Poetry commands:' \
    '  poetry add <package>' \
    '  poetry install' \
    '  poetry show'
fi
'''
