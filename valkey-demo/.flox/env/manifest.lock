    },
    "options": {},
    "services": {
      "valkey": {
        "command": "  VALKEY_DATA=\"$FLOX_ENV_CACHE/valkey\"\n  mkdir -p \"$VALKEY_DATA\"\n  exec valkey-server \\\n    --bind \"$VALKEY_HOST\" \\\n    --port \"$VALKEY_PORT\" \\\n    --dir \"$VALKEY_DATA\" \\\n    --daemonize no\n"
      }
    }
