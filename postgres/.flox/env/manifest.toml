version = 1

# Minimal PostgreSQL environment for use with [include].
#
# This provides a working PostgreSQL setup with sane defaults.
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/postgres"]
#
# Then customize vars, add extensions, or override the service
# definition in your own manifest as needed.

[install]
postgresql.pkg-path = "postgresql_16"

[vars]
PGHOSTADDR = "127.0.0.1"
PGPORT = "15432"
PGUSER = "pguser"
PGPASS = "pgpass"
PGDATABASE = "pgdb"

[hook]
on-activate = '''
export PGDIR="$FLOX_ENV_CACHE/postgres"
export PGDATA="$PGDIR/data"
export PGHOST="$PGDIR/run"
export PGCONFIGFILE="$PGDIR/postgresql.conf"
export LOG_PATH="$PGHOST/LOG"
export DATABASE_URL="postgresql:///$PGDATABASE?host=$PGHOST&port=$PGPORT"

if [[ ! -d "$PGHOST" ]]; then
  mkdir -p "$PGHOST"
fi

if [[ ! -d "$PGDATA" ]]; then
  mkdir -p "$PGDATA"
  initdb "$PGDATA" \
    --locale=C \
    --encoding=UTF8 \
    -A md5 \
    --auth=trust \
    --username "$PGUSER" \
    --pwfile=<(echo "$PGPASS")
fi

if [[ ! -f "$PGCONFIGFILE" ]]; then
  tee -a "$PGCONFIGFILE" > /dev/null << EOF
listen_addresses = '$PGHOSTADDR';
port = '$PGPORT';
unix_socket_directories = '$PGHOST';
unix_socket_permissions = '0700';
EOF
fi

pg_ctl -D "$PGDATA" -w start \
  -o "-c unix_socket_directories=$PGHOST -c listen_addresses=$PGHOSTADDR -p $PGPORT" \
  > /dev/null
if psql -lqt | cut -d \| -f 1 | grep -qw "$PGDATABASE"; then
  true
else
  createdb
fi
pg_ctl -D "$PGDATA" -m fast -w stop > /dev/null
'''

[services]
postgres.command = "postgres -D $PGDATA -c unix_socket_directories=$PGHOST -c listen_addresses=$PGHOSTADDR -p $PGPORT"

[options]
systems = [
  "aarch64-darwin",
  "aarch64-linux",
  "x86_64-darwin",
  "x86_64-linux",
]
