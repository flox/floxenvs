{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "curl": {
        "pkg-path": "curl",
        "pkg-group": "demo-tools"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "nginx": {
        "pkg-path": "nginx"
      }
    },
    "vars": {
      "NGINX_PORT": "18181",
      "NGINX_WORKER_CONNECTIONS": "1024",
      "NGINX_WORKER_PROCESSES": "1",
      "NGINX_WWW_DIR": ""
    },
    "hook": {
      "on-activate": "\nexport NGINX_DIR=\"$FLOX_ENV_CACHE/nginx\"\nexport NGINX_CONFIG=\"$NGINX_DIR/nginx.conf\"\nexport NGINX_ERROR_LOG=\"$NGINX_DIR/error.log\"\nexport NGINX_ACCESS_LOG=\"$NGINX_DIR/access.log\"\n\nif [ -z \"$NGINX_WWW_DIR\" ]; then\n  export NGINX_WWW_DIR=\"$FLOX_ENV_CACHE/www\"\nfi\n\nmkdir -p \"$NGINX_DIR\"\n\ncat <<EOF > \"$NGINX_CONFIG\"\nworker_processes $NGINX_WORKER_PROCESSES;\n\nlock_file $NGINX_DIR/nginx.lock;\npid $NGINX_DIR/nginx.pid;\nerror_log $NGINX_ERROR_LOG;\n\nevents {\n  worker_connections $NGINX_WORKER_CONNECTIONS;\n}\n\nhttp {\n  access_log $NGINX_ACCESS_LOG;\n\n  server {\n    listen $NGINX_PORT;\n    root $NGINX_WWW_DIR;\n\n    location / {\n    }\n\n  }\n}\nEOF\n\nif [ ! -d \"$NGINX_WWW_DIR\" ]; then\n  mkdir -p \"$NGINX_WWW_DIR\"\n  cat <<EOF > \"$NGINX_WWW_DIR/index.html\"\n<!doctype html>\n<html>\n  <head>\n    <title>Hello Flox!</title>\n    <meta charset=\"utf-8\" />\n  </head>\n  <body>\n    <h1>\n      Hello from <a href=\"https://flox.dev\">Flox</a> environment!\n    </h1>\n  </body>\n</html>\nEOF\nfi\n\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' --padding '1 4' \\\n    'Start Nginx in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'Test the server:' \\\n    \"  curl http://localhost:$NGINX_PORT\" '' \\\n    'Configuration:' \\\n    \"  port=$NGINX_PORT\" \\\n    \"  document_root=$NGINX_WWW_DIR\" \\\n    \"  config=$NGINX_DIR/nginx.conf\" \\\n    \"  error_log=$NGINX_DIR/error.log\" \\\n    \"  access_log=$NGINX_DIR/access.log\"\nfi\n\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    },
    "services": {
      "nginx": {
        "command": "nginx -c $NGINX_CONFIG -e $NGINX_ERROR_LOG -g 'daemon off;'"
      }
    }
  },
