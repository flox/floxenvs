    "install": {
      "awscli2": {
        "pkg-path": "awscli2",
        "pkg-group": "localstack"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "kubectl": {
        "pkg-path": "kubectl",
