      },
      "localstack": {
        "pkg-path": "localstack",
        "pkg-group": "localstack"
      },
      "python3": {
        "pkg-path": "python3",
        "pkg-group": "localstack"
      }
    },
    "hook": {
      "on-activate": "export LOCALSTACK_CACHE=\"$FLOX_ENV_CACHE/localstack\"\nexport PYTHON_DIR=\"$LOCALSTACK_CACHE/venv\"\n\nif [ ! -d \"$PYTHON_DIR\" ]; then\n  python -m venv \"$PYTHON_DIR\" 2>/dev/null\nfi\n\n(\n  source \"$PYTHON_DIR/bin/activate\"\n  pip install -q awscli-local\n)\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Start LocalStack in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'Once it starts, see available services with:' \\\n    '  localstack status services'\nfi\n"
    },
    "profile": {
      "bash": "source \"$PYTHON_DIR/bin/activate\"\n",
      "zsh": "source \"$PYTHON_DIR/bin/activate\"\n",
      "fish": "source \"$PYTHON_DIR/bin/activate.fish\"\n",
      "tcsh": "source \"$PYTHON_DIR/bin/activate.csh\"\n"
    },
    "options": {},
    "services": {
      "localstack": {
        "command": "docker rm -f localstack-main 2>/dev/null; localstack start -d",
        "is-daemon": true,
        "shutdown": {
          "command": "localstack stop"
        }
      }
    }
  },
