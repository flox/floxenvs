schema-version = "1.10.0"

# Minimal Bazel environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/bazel"]

[install]
# Catalog bazel_9 (9.0.1) is used by default because it is
# source-built against nixpkgs and works on NixOS-style builders
# out of the box. `flox/bazel` (9.1.0, prebuilt upstream) is also
# published from `.flox/pkgs/bazel/` for hosts where glibc is
# available at the standard /lib64 path; swap the pkg-path below
# to opt in.
bazel.pkg-path = "bazel_9"
bazel.pkg-group = "bazel"

# Bazel's rules_cc auto-configure looks up `gcc` or `$CC` on first
# invocation, even for rule sets that don't emit C code (e.g.
# rules_go depends on rules_cc). macOS picks up clang from Xcode;
# Linux needs gcc in PATH.
gcc.pkg-path = "gcc"
gcc.pkg-group = "bazel-toolchain"
gcc.systems = ["aarch64-linux", "x86_64-linux"]

[hook]
on-activate = '''
export BAZEL_CACHE_DIR="$FLOX_ENV_CACHE/bazel"
mkdir -p "$BAZEL_CACHE_DIR"
'''
