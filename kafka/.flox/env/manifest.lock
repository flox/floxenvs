{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "apacheKafka": {
        "pkg-path": "apacheKafka",
        "pkg-group": "kafka"
      }
    },
    "vars": {
      "KAFKA_CONTROLLER_PORT": "9093",
      "KAFKA_HOST": "localhost",
      "KAFKA_PORT": "9092"
    },
    "hook": {
      "on-activate": "export KAFKA_CACHE=\"$FLOX_ENV_CACHE/kafka\"\nexport KAFKA_LOG_DIRS=\"$KAFKA_CACHE/logs\"\nexport KAFKA_CONFIG_FILE=\"$KAFKA_CACHE/server.properties\"\n# Derive the broker list from host/port so overriding either stays\n# consistent; respects an explicit KAFKA_BROKERS override if set.\nexport KAFKA_BROKERS=\"${KAFKA_BROKERS:-${KAFKA_HOST}:${KAFKA_PORT}}\"\n\nmkdir -p \"$KAFKA_LOG_DIRS\"\n\nif [ ! -f \"$KAFKA_CONFIG_FILE\" ]; then\n  cat > \"$KAFKA_CONFIG_FILE\" <<EOF\nprocess.roles=broker,controller\nnode.id=1\ncontroller.quorum.voters=1@${KAFKA_HOST}:${KAFKA_CONTROLLER_PORT}\nlisteners=PLAINTEXT://${KAFKA_HOST}:${KAFKA_PORT},CONTROLLER://${KAFKA_HOST}:${KAFKA_CONTROLLER_PORT}\ninter.broker.listener.name=PLAINTEXT\nadvertised.listeners=PLAINTEXT://${KAFKA_HOST}:${KAFKA_PORT}\ncontroller.listener.names=CONTROLLER\nlistener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT\nlog.dirs=${KAFKA_LOG_DIRS}\nnum.network.threads=3\nnum.io.threads=8\nsocket.send.buffer.bytes=102400\nsocket.receive.buffer.bytes=102400\nsocket.request.max.bytes=104857600\nnum.partitions=1\nnum.recovery.threads.per.data.dir=1\noffsets.topic.replication.factor=1\ntransaction.state.log.replication.factor=1\ntransaction.state.log.min.isr=1\ndefault.replication.factor=1\nmin.insync.replicas=1\nlog.retention.hours=168\nlog.segment.bytes=1073741824\nlog.retention.check.interval.ms=300000\nEOF\nfi\n\nif [ ! -f \"${KAFKA_LOG_DIRS}/meta.properties\" ]; then\n  CLUSTER_ID=\"$(kafka-storage.sh random-uuid)\"\n  kafka-storage.sh format -t \"$CLUSTER_ID\" -c \"$KAFKA_CONFIG_FILE\" --ignore-formatted\nfi\n"
    },
    "options": {},
    "services": {
      "kafka": {
        "command": "  exec kafka-server-start.sh \"$KAFKA_CONFIG_FILE\"\n",
        "shutdown": {
          "command": "kafka-server-stop.sh"
        }
      }
    }
  },
