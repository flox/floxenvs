    "schema-version": "1.11.0",
    "install": {
      "claude-code": {
        "pkg-path": "flox/claude-code",
        "pkg-group": "claude-code"
      },
      "claude-code-plugin-caveman": {
        "pkg-path": "flox/claude-code-plugin-caveman",
        "pkg-group": "claude-code-plugin-caveman"
      },
      "flox-ai": {
        "pkg-path": "flox/flox-ai",
        "pkg-group": "flox-ai"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      }
    },
    "hook": {
      "on-activate": "eval \"$(flox-ai setup-hook)\"\n\nif [ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]; then\n  gum style \\\n    --foreground 212 --border-foreground 212 \\\n    --border double --align center \\\n    --width 50 --margin \"1 2\" --padding \"1 2\" \\\n    \"Caveman Mode\" \"Talk like caveman. Save ~75% tokens.\"\n  echo \"\"\n  echo \"  claude           — start Claude Code\"\n  echo \"  /caveman         — toggle caveman mode (default: full)\"\n  echo \"  /caveman lite    — drop filler only, keep grammar\"\n  echo \"  /caveman ultra   — extreme abbreviation\"\n  echo \"  /caveman wenyan-full — classical-Chinese style\"\n  echo \"  /caveman-help    — full reference card\"\n  echo \"  /caveman-stats   — show real session token usage\"\n  echo \"\"\nfi\n"
    },
    "profile": {
      "bash": "eval \"$(flox-ai setup-profile-bash)\"\n",
      "zsh": "eval \"$(flox-ai setup-profile-zsh)\"\n",
      "fish": "flox-ai setup-profile-fish | source\n"
    },
    "options": {}
  },
