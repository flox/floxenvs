schema-version = "1.10.0"

# Minimal Node.js environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/javascript-node"]
#
# Customize Node version in your manifest:
#
#   [install]
#   nodejs.pkg-path = "nodejs_22"

[install]
nodejs.pkg-path = "nodejs_20"
nodejs.pkg-group = "javascript-node"

[vars]
NODE_ENV = "development"
NODE_AUTO_INSTALL = "true"

[hook]
on-activate = '''
export NODE_CACHE="$FLOX_ENV_CACHE/javascript-node"
mkdir -p "$NODE_CACHE"

if [ "$NODE_AUTO_INSTALL" = "true" ] \
    && [ -f package.json ] \
    && [ -f package-lock.json ]; then
  HASH=$(cat package.json package-lock.json \
    | sha256sum | cut -d" " -f1)
  LAST=$(cat "$NODE_CACHE/packages-hash" 2>/dev/null)
  if [ "$HASH" != "$LAST" ]; then
    npm install
    echo "$HASH" > "$NODE_CACHE/packages-hash"
  fi
fi
'''
