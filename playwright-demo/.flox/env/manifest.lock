  "compose": {
    "composer": {
      "schema-version": "1.11.0",
      "install": {
        "gum": {
          "pkg-path": "gum",
          "pkg-group": "demo-tools"
        }
      },
      "hook": {
        "on-activate": "if [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Playwright demo — browser automation in a Flox env' '' \\\n    'Install the chromium binary (first time only):' \\\n    '  playwright install chromium' '' \\\n    'Run the sample test against demo.playwright.dev:' \\\n    '  playwright test' '' \\\n    'Or expose Playwright as an MCP service:' \\\n    '  flox services start playwright-mcp' '' \\\n    \"MCP endpoint: http://${PLAYWRIGHT_MCP_HOST}:${PLAYWRIGHT_MCP_PORT}/\" '' \\\n    'Or drive a browser directly from the CLI:' \\\n    '  playwright-cli open https://playwright.dev'\nfi\n"
      },
      "options": {},
      "include": {
        "environments": [
          {
            "dir": "../playwright"
          }
        ]
      }
    },
    "include": [
      {
        "manifest": {
          "schema-version": "1.10.0",
          "install": {
            "playwright": {
              "pkg-path": "playwright",
              "pkg-group": "playwright"
            },
            "playwright-cli": {
              "pkg-path": "flox/playwright-cli",
              "pkg-group": "playwright"
            },
            "playwright-driver": {
              "pkg-path": "playwright-driver",
              "pkg-group": "playwright"
            },
            "playwright-mcp": {
              "pkg-path": "playwright-mcp",
              "pkg-group": "playwright"
            },
            "playwright-test": {
              "pkg-path": "playwright-test",
              "pkg-group": "playwright"
            },
            "skills-playwright-cli": {
              "pkg-path": "flox/skills-playwright-cli",
              "pkg-group": "playwright"
            }
          },
          "vars": {
            "PLAYWRIGHT_HEADLESS": "true",
            "PLAYWRIGHT_MCP_HOST": "127.0.0.1",
            "PLAYWRIGHT_MCP_PORT": "18931"
          },
          "hook": {
            "on-activate": "dir=\"$FLOX_ENV_CACHE/playwright\"\nexport PLAYWRIGHT_DATA_DIR=\"$dir\"\nexport PLAYWRIGHT_BROWSERS_PATH=\"${PLAYWRIGHT_BROWSERS_PATH:-$dir/browsers}\"\nmkdir -p \"$PLAYWRIGHT_BROWSERS_PATH\"\n"
          },
          "options": {},
          "services": {
            "playwright-mcp": {
              "command": "dir=\"${PLAYWRIGHT_DATA_DIR:-$FLOX_ENV_CACHE/playwright}\"\nexport PLAYWRIGHT_BROWSERS_PATH=\"${PLAYWRIGHT_BROWSERS_PATH:-$dir/browsers}\"\nmkdir -p \"$PLAYWRIGHT_BROWSERS_PATH\"\nexec playwright-mcp \\\n  --host \"$PLAYWRIGHT_MCP_HOST\" \\\n  --port \"$PLAYWRIGHT_MCP_PORT\" \\\n  --browser chromium\n"
            }
          }
        },
        "name": "playwright",
        "descriptor": {
          "dir": "../playwright"
        }
      }
    ],
