{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "bash": {
        "pkg-path": "bash",
        "pkg-group": "symphony"
      },
      "codex": {
        "pkg-path": "flox/codex",
        "pkg-group": "symphony"
      },
      "git": {
        "pkg-path": "git",
        "pkg-group": "symphony-tools"
      },
      "symphony": {
        "pkg-path": "flox/symphony",
        "pkg-group": "symphony"
      }
    },
    "vars": {
      "SYMPHONY_PORT": "14000"
    },
    "hook": {
      "on-activate": "export SYMPHONY_DATA=\"$FLOX_ENV_CACHE/symphony\"\nexport SYMPHONY_WORKSPACE_ROOT=\"$SYMPHONY_DATA/workspaces\"\nexport SYMPHONY_LOGS_ROOT=\"$SYMPHONY_DATA/log\"\nexport CODEX_BIN=\"$(command -v codex)\"\nmkdir -p \"$SYMPHONY_WORKSPACE_ROOT\" \"$SYMPHONY_LOGS_ROOT\"\n\n# Always regenerate WORKFLOW.md so the tracker stays in\n# sync with the current LINEAR_API_KEY state. Edits to\n# the cached file are intentionally discarded.\nif [[ -n \"${LINEAR_API_KEY:-}\" ]]; then\n  cat > \"$SYMPHONY_DATA/WORKFLOW.md\" <<EOF\n---\ntracker:\n  kind: linear\n  active_states: [Todo, In Progress, Merging, Rework]\n  terminal_states: [Closed, Cancelled, Done]\npolling:\n  interval_ms: 5000\nworkspace:\n  root: $SYMPHONY_WORKSPACE_ROOT\nagent:\n  max_concurrent_agents: 4\n  max_turns: 20\ncodex:\n  bin: $CODEX_BIN\n---\n# Symphony — Linear workflow\nEOF\nelse\n  cat > \"$SYMPHONY_DATA/WORKFLOW.md\" <<EOF\n---\ntracker:\n  kind: memory\npolling:\n  interval_ms: 5000\nworkspace:\n  root: $SYMPHONY_WORKSPACE_ROOT\nagent:\n  max_concurrent_agents: 2\n  max_turns: 10\ncodex:\n  bin: $CODEX_BIN\n---\n# Symphony — in-memory dashboard demo\nEOF\nfi\n"
    },
    "options": {},
    "services": {
      "symphony": {
        "command": "SYMPHONY_DATA=\"$FLOX_ENV_CACHE/symphony\"\nexec symphony \\\n  --i-understand-that-this-will-be-running-without-the-usual-guardrails \\\n  --port \"$SYMPHONY_PORT\" \\\n  --logs-root \"$SYMPHONY_DATA/log\" \\\n  \"$SYMPHONY_DATA/WORKFLOW.md\"\n"
      }
    }
  },
