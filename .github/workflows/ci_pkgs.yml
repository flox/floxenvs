name: "CI Packages"

on:
  push:
    branches: ["main"]
    paths:
      - ".flox/**"
      - ".github/workflows/ci_pkgs.yml"
  pull_request:
    paths:
      - ".flox/**"
      - ".github/workflows/ci_pkgs.yml"
  workflow_dispatch:
    inputs:
      package:
        description: >
          Package to build. Leave empty to build all
          packages.
        required: false
        default: ""
        type: string

env:
  FLOX_DISABLE_METRICS: "true"
  # Build from source when a binary-cache substitute fails — cache.nixos.org
  # currently serves a hash-mismatched texlive path (lpform-36918-tex) that
  # breaks skills-video-use's native x86_64-linux build. Augments nix.conf;
  # substituters unchanged.
  NIX_CONFIG: "fallback = true"

jobs:

  discover:
    name: "Discover changed packages"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10

    outputs:
      packages: "${{ steps.discover.outputs.packages }}"
      aarch64-darwin: "${{ steps.discover.outputs.aarch64-darwin }}"
      aarch64-linux: "${{ steps.discover.outputs.aarch64-linux }}"
      x86_64-darwin: "${{ steps.discover.outputs.x86_64-darwin }}"
      x86_64-linux: "${{ steps.discover.outputs.x86_64-linux }}"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          fetch-depth: 0

      - name: "Find changed packages"
        id: "discover"
        env:
          SINGLE_PKG: "${{ inputs.package }}"
          EVENT: "${{ github.event_name }}"
          BASE_SHA: "${{ github.event.pull_request.base.sha }}"
        run: |
          set -euo pipefail

          ALL_SYSTEMS="aarch64-darwin aarch64-linux x86_64-darwin x86_64-linux"

          # Collect package names
          if [ -n "$SINGLE_PKG" ]; then
            pkgs="[\"$SINGLE_PKG\"]"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            # Manual dispatch with no package input: build every
            # package, regardless of what the last commit changed.
            pkgs="[]"
            for dir in .flox/pkgs/*/; do
              name="$(basename "$dir")"
              pkgs=$(echo "$pkgs" | jq -c \
                ". + [\"$name\"]")
            done
          else
            if [ "$EVENT" = "pull_request" ]; then
              DIFF_BASE="$BASE_SHA"
            else
              DIFF_BASE="HEAD~1"
            fi

            # upgrade.sh isn't part of the build — a PR that touches
            # only it produces a byte-identical package, so skip the
            # matrix to avoid rebuilding (and re-hitting flaky cross
            # builds like openclaw x86_64-darwin).
            pkgs="[]"
            for dir in .flox/pkgs/*/; do
              name="$(basename "$dir")"
              build_changes=$(git diff --name-only \
                  "$DIFF_BASE" HEAD \
                | grep -E "^\.flox/pkgs/$name/" \
                | grep -vE \
                  "^\.flox/pkgs/$name/upgrade\.sh$" \
                || true)
              if [ -n "$build_changes" ]; then
                pkgs=$(echo "$pkgs" | jq -c \
                  ". + [\"$name\"]")
              fi
            done
          fi

          echo "packages=$pkgs" >> "$GITHUB_OUTPUT"
          echo "Packages: $pkgs"

          # Per-system package lists from publish.json. A package
          # builds (and, on main, publishes) only on the systems it
          # declares; missing publish.json or no "systems" field
          # means all four.
          for sys in $ALL_SYSTEMS; do
            sys_pkgs="[]"
            for pkg in $(echo "$pkgs" | jq -r '.[]'); do
              PJ=".flox/pkgs/$pkg/publish.json"
              if [ -f "$PJ" ]; then
                has_field=$(jq -r \
                  'has("systems")' "$PJ")
                if [ "$has_field" = "false" ]; then
                  sys_pkgs=$(echo "$sys_pkgs" | jq -c \
                    ". + [\"$pkg\"]")
                else
                  has=$(jq -r \
                    --arg s "$sys" \
                    '.systems | index($s) != null' \
                    "$PJ")
                  if [ "$has" = "true" ]; then
                    sys_pkgs=$(echo "$sys_pkgs" | jq -c \
                      ". + [\"$pkg\"]")
                  fi
                fi
              else
                sys_pkgs=$(echo "$sys_pkgs" | jq -c \
                  ". + [\"$pkg\"]")
              fi
            done
            echo "$sys=$sys_pkgs" >> "$GITHUB_OUTPUT"
            echo "  $sys: $sys_pkgs"
          done

  # ── Build (PRs) or publish (main): one job per (package, system) ──
  #
  # Each (package, system) leg is independent — fail-fast is off, so
  # one package failing on one system fails only that leg and leaves
  # every other publish intact. On a push to main or a manual
  # dispatch the leg's "Publish" step runs; otherwise its "Build"
  # step runs. There is no separate aggregate publish job, so no
  # single failure can gate the whole catalog.

  aarch64-darwin:
    name: "Package '${{ matrix.package }}' (aarch64-darwin)"
    runs-on: "ubuntu-latest"
    timeout-minutes: 90
    needs: ["discover"]
    if: needs.discover.outputs.aarch64-darwin != '[]'

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.aarch64-darwin) }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          fetch-depth: 0
          filter: "blob:none"
      - name: "Install flox"
        uses: "flox/install-flox-action@f6002ed63e483f134001de7b4b45be891e00b09f" # v2.5.1
      - name: "Setup Tailscale"
        uses: "tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8" # v4
        with:
          oauth-secret: "${{ secrets.MANAGED_TAILSCALE_AUTH_KEY }}"
          tags: "tag:ci"
          timeout: "30s"
          use-cache: true
      - name: "Configure Nix remote builders"
        uses: "flox/configure-nix-action@1ee58d63463cb1870ab73d9df0acfd9d8ba671f8" # main
        with:
          ssh-key: "${{ secrets.MANAGED_FLOXBOT_SSH_KEY }}"
          remote-builders: "${{ vars.MANAGED_REMOTE_BUILDERS }}"
      - name: "Build"
        if: ${{ !(github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')) }}
        run: |
          set -euo pipefail
          flox build "${{ matrix.package }}" --system aarch64-darwin
      - name: "Publish"
        if: ${{ github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        env:
          FLOX_FLOXHUB_TOKEN: "${{ secrets.FLOX_FLOXHUB_TOKEN }}"
        run: |
          set -euo pipefail
          ORG="$(jq -r '.org // "flox"' ".flox/pkgs/${{ matrix.package }}/publish.json" 2>/dev/null || echo flox)"
          flox publish -o "$ORG" "${{ matrix.package }}" --system aarch64-darwin

  aarch64-linux:
    name: "Package '${{ matrix.package }}' (aarch64-linux)"
    runs-on: "ubuntu-latest"
    timeout-minutes: 90
    needs: ["discover"]
    if: needs.discover.outputs.aarch64-linux != '[]'

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.aarch64-linux) }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          fetch-depth: 0
          filter: "blob:none"
      - name: "Install flox"
        uses: "flox/install-flox-action@f6002ed63e483f134001de7b4b45be891e00b09f" # v2.5.1
      - name: "Setup Tailscale"
        uses: "tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8" # v4
        with:
          oauth-secret: "${{ secrets.MANAGED_TAILSCALE_AUTH_KEY }}"
          tags: "tag:ci"
          timeout: "30s"
          use-cache: true
      - name: "Configure Nix remote builders"
        uses: "flox/configure-nix-action@1ee58d63463cb1870ab73d9df0acfd9d8ba671f8" # main
        with:
          ssh-key: "${{ secrets.MANAGED_FLOXBOT_SSH_KEY }}"
          remote-builders: "${{ vars.MANAGED_REMOTE_BUILDERS }}"
      - name: "Build"
        if: ${{ !(github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')) }}
        run: |
          set -euo pipefail
          flox build "${{ matrix.package }}" --system aarch64-linux
      - name: "Publish"
        if: ${{ github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        env:
          FLOX_FLOXHUB_TOKEN: "${{ secrets.FLOX_FLOXHUB_TOKEN }}"
        run: |
          set -euo pipefail
          ORG="$(jq -r '.org // "flox"' ".flox/pkgs/${{ matrix.package }}/publish.json" 2>/dev/null || echo flox)"
          flox publish -o "$ORG" "${{ matrix.package }}" --system aarch64-linux

  x86_64-darwin:
    name: "Package '${{ matrix.package }}' (x86_64-darwin)"
    runs-on: "ubuntu-latest"
    timeout-minutes: 90
    needs: ["discover"]
    if: needs.discover.outputs.x86_64-darwin != '[]'

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.x86_64-darwin) }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          fetch-depth: 0
          filter: "blob:none"
      - name: "Install flox"
        uses: "flox/install-flox-action@f6002ed63e483f134001de7b4b45be891e00b09f" # v2.5.1
      - name: "Setup Tailscale"
        uses: "tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8" # v4
        with:
          oauth-secret: "${{ secrets.MANAGED_TAILSCALE_AUTH_KEY }}"
          tags: "tag:ci"
          timeout: "30s"
          use-cache: true
      - name: "Configure Nix remote builders"
        uses: "flox/configure-nix-action@1ee58d63463cb1870ab73d9df0acfd9d8ba671f8" # main
        with:
          ssh-key: "${{ secrets.MANAGED_FLOXBOT_SSH_KEY }}"
          remote-builders: "${{ vars.MANAGED_REMOTE_BUILDERS }}"
      - name: "Build"
        if: ${{ !(github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')) }}
        run: |
          set -euo pipefail
          flox build "${{ matrix.package }}" --system x86_64-darwin
      - name: "Publish"
        if: ${{ github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        env:
          FLOX_FLOXHUB_TOKEN: "${{ secrets.FLOX_FLOXHUB_TOKEN }}"
        run: |
          set -euo pipefail
          ORG="$(jq -r '.org // "flox"' ".flox/pkgs/${{ matrix.package }}/publish.json" 2>/dev/null || echo flox)"
          flox publish -o "$ORG" "${{ matrix.package }}" --system x86_64-darwin

  x86_64-linux:
    name: "Package '${{ matrix.package }}' (x86_64-linux)"
    runs-on: "ubuntu-latest"
    timeout-minutes: 90
    needs: ["discover"]
    if: needs.discover.outputs.x86_64-linux != '[]'

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.x86_64-linux) }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          fetch-depth: 0
          filter: "blob:none"
      - name: "Install flox"
        uses: "flox/install-flox-action@f6002ed63e483f134001de7b4b45be891e00b09f" # v2.5.1
      - name: "Setup Tailscale"
        uses: "tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8" # v4
        with:
          oauth-secret: "${{ secrets.MANAGED_TAILSCALE_AUTH_KEY }}"
          tags: "tag:ci"
          timeout: "30s"
          use-cache: true
      - name: "Configure Nix remote builders"
        uses: "flox/configure-nix-action@1ee58d63463cb1870ab73d9df0acfd9d8ba671f8" # main
        with:
          ssh-key: "${{ secrets.MANAGED_FLOXBOT_SSH_KEY }}"
          remote-builders: "${{ vars.MANAGED_REMOTE_BUILDERS }}"
      - name: "Build"
        if: ${{ !(github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')) }}
        run: |
          set -euo pipefail
          flox build "${{ matrix.package }}" --system x86_64-linux
      - name: "Publish"
        if: ${{ github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        env:
          FLOX_FLOXHUB_TOKEN: "${{ secrets.FLOX_FLOXHUB_TOKEN }}"
        run: |
          set -euo pipefail
          ORG="$(jq -r '.org // "flox"' ".flox/pkgs/${{ matrix.package }}/publish.json" 2>/dev/null || echo flox)"
          flox publish -o "$ORG" "${{ matrix.package }}" --system x86_64-linux
