name: "CI: devcontainers"

on:
  push:
    branches: ["main"]
    paths:
      - ".devcontainer/**"
      - "scripts/devcontainer/**"
      - "*/.devcontainer.toml"
      - "flake.nix"
      - ".github/workflows/ci_devcontainers.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - "scripts/devcontainer/**"
      - "*/.devcontainer.toml"
      - "flake.nix"
      - ".github/workflows/ci_devcontainers.yml"
  workflow_dispatch:

permissions:
  contents: "read"

jobs:
  freshness:
    name: "Check devcontainers are up to date"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    steps:
      - name: "Checkout"
        uses: "actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1" # v7.0.1

      - name: "Install Nix"
        uses: "DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f" # v22

      - name: "Run generator"
        run: |
          set -euo pipefail
          nix --extra-experimental-features 'nix-command flakes' \
            run .#generate-devcontainers

      - name: "Verify no drift"
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- .devcontainer/ ; then
            echo ""
            echo "Error: .devcontainer/ is out of date."
            echo "Run 'just generate-devcontainers' and commit."
            exit 1
          fi
          echo "Devcontainers are up to date."

      - name: "Verify coverage invariant"
        run: |
          set -euo pipefail
          nix --extra-experimental-features 'nix-command flakes' \
            run .#check-devcontainers-coverage
