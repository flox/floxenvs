name: "CI"

on:
  workflow_run:
    workflows:
      - "CI: redis"
    types: [completed]

env:
  FLOX_DISABLE_METRICS: "true"

jobs:
  auto-merge:
    name: "Auto Merge"
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'

    steps:
      - name: "Find PR"
        id: "find-pr"
        uses: "actions/github-script@v7"
        with:
          script: |
            const prs =
              context.payload.workflow_run.pull_requests;
            if (prs && prs.length > 0) {
              return prs[0].number;
            }
            const result =
              await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              });
            if (result.data.length > 0) {
              return result.data[0].number;
            }
            core.info('No PR found');
            return 0;

      - name: "Check PR author and merge"
        if: steps.find-pr.outputs.result != '0'
        env:
          PR_NUMBER: "${{ steps.find-pr.outputs.result }}"
          GITHUB_TOKEN: "${{ secrets.MANAGED_FLOXBOT_GITHUB_ACCESS_TOKEN_REPO_SCOPE }}"
        run: |
          pr_author=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json author --jq '.author.login')
          if [ "$pr_author" != "floxbot" ]; then
            echo "PR author is $pr_author, not floxbot"
            exit 0
          fi

          conclusion=$(gh pr checks "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json state --jq '
              [.[] | select(.state != "SUCCESS"
                and .state != "SKIPPED")]
              | length')
          if [ "$conclusion" != "0" ]; then
            echo "Not all checks passed yet"
            exit 0
          fi

          gh pr merge --auto --merge "$PR_NUMBER" \
            --repo "${{ github.repository }}"

  report-failure:
    name: "Report Failure"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    if: >-
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.head_branch == 'main'

    steps:
      - name: "Slack Notification"
        uses: "rtCamp/action-slack-notify@v2"
        env:
          SLACK_CHANNEL: "team-content"
          SLACK_TITLE: >-
            floxenvs:
            ${{ github.event.workflow_run.name }}
            failed on main
          SLACK_FOOTER: "Thanks for looking at it."
          SLACK_WEBHOOK: "${{ secrets.MANAGED_SLACK_WEBHOOK }}"
          SLACK_USERNAME: "GitHub"
          SLACK_ICON_EMOJI: ":poop:"
          SLACK_COLOR: "#ff2800"
          SLACK_LINK_NAMES: true
          SLACK_MESSAGE: >-
            Workflow:
            ${{ github.event.workflow_run.name }}
            | Branch:
            ${{ github.event.workflow_run.head_branch }}
            | URL:
            ${{ github.event.workflow_run.html_url }}
