name: "CI"

on:
  push:
    branches: ["main"]
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  FLOX_DISABLE_METRICS: "true"

jobs:
  wait-for-environments:
    name: "Wait"
    runs-on: "ubuntu-latest"
    timeout-minutes: 120

    outputs:
      any_failed: >-
        ${{ steps.wait.outputs.any_failed
            || steps.short_circuit.outputs.any_failed }}
      failed_workflows: >-
        ${{ steps.wait.outputs.failed_workflows
            || steps.short_circuit.outputs.failed_workflows }}
      total_workflows: >-
        ${{ steps.wait.outputs.total_workflows
            || steps.short_circuit.outputs.total_workflows }}
      successful_envs: >-
        ${{ steps.wait.outputs.successful_envs
            || steps.short_circuit.outputs.successful_envs }}
      pr_number: >-
        ${{ steps.wait.outputs.pr_number
            || steps.short_circuit.outputs.pr_number }}
      pr_author: >-
        ${{ steps.wait.outputs.pr_author
            || steps.short_circuit.outputs.pr_author }}

    steps:
      - name: "Checkout"
        if: >-
          github.event_name == 'pull_request'
          || github.event_name == 'push'
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          fetch-depth: 0

      - name: "Decide if polling is needed"
        id: "decide"
        if: >-
          github.event_name == 'pull_request'
          || github.event_name == 'push'
        env:
          EVENT: "${{ github.event_name }}"
          BASE_SHA: "${{ github.event.pull_request.base.sha }}"
          HEAD_SHA: "${{ github.event.pull_request.head.sha
                       || github.sha }}"
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            BASE="$BASE_SHA"
            HEAD="$HEAD_SHA"
          else
            BASE="HEAD~1"
            HEAD="HEAD"
          fi
          changed="$(git diff --name-only "$BASE" "$HEAD")"
          should_poll="$(echo "$changed" \
            | scripts/wait-should-poll.sh envs)"
          echo "should_poll=$should_poll" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          echo "$changed" | sed 's/^/  /'
          echo "should_poll=$should_poll"

      - name: "Short-circuit (no env paths changed)"
        id: "short_circuit"
        if: >-
          (github.event_name == 'pull_request'
          || github.event_name == 'push')
          && steps.decide.outputs.should_poll == 'false'
        env:
          PR_NUMBER: >-
            ${{ github.event.pull_request.number || 0 }}
          PR_AUTHOR: >-
            ${{ github.event.pull_request.user.login || '' }}
        run: |
          {
            echo "any_failed=false"
            echo "failed_workflows="
            echo "total_workflows=0"
            echo "successful_envs=[]"
            echo "pr_number=$PR_NUMBER"
            echo "pr_author=$PR_AUTHOR"
          } >> "$GITHUB_OUTPUT"
          echo "No env paths changed — short-circuiting."

      - name: "Wait for all CI: * workflows"
        id: "wait"
        if: >-
          github.event_name == 'merge_group'
          || github.event_name == 'workflow_dispatch'
          || steps.decide.outputs.should_poll == 'true'
        uses: "actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3" # v9.0.0
        with:
          script: |
            const isPR = context.eventName === 'pull_request';
            // For PRs, context.sha is the merge commit — use head SHA instead
            const sha = isPR
              ? context.payload.pull_request.head.sha
              : context.sha;
            let prNumber = 0;
            let prAuthor = '';

            if (isPR) {
              prNumber = context.payload.pull_request.number;
              prAuthor = context.payload.pull_request.user.login;
            }

            core.info(`SHA: ${sha} (${isPR ? 'PR head' : 'push'})`);
            core.info(`Event: ${context.eventName}`);
            core.info(`PR: #${prNumber} by ${prAuthor}`);

            // Merge queue: no env workflows run, pass immediately
            if (context.eventName === 'merge_group') {
              core.info('Merge queue — no env workflows to wait for');
              core.setOutput('any_failed', 'false');
              core.setOutput('failed_workflows', '');
              core.setOutput('total_workflows', '0');
              core.setOutput('successful_envs', '[]');
              core.setOutput('pr_number', '0');
              core.setOutput('pr_author', '');
              return;
            }

            // Wait a bit for environment workflows to start
            core.info('Waiting 30s for environment workflows to register...');
            await new Promise(r => setTimeout(r, 30000));

            // Poll until all CI: * workflows are complete
            const maxAttempts = 1400;  // ~2 hours at 5s
            const interval = 5000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                per_page: 100,
              });

              // Filter for CI: * environment workflows (not this "CI" workflow)
              const ciRuns = runs.data.workflow_runs.filter(
                r => r.name.startsWith('CI: ')
              );

              if (ciRuns.length === 0) {
                if (attempt <= 12) {
                  // Still early — workflows may not have registered yet
                  core.info(
                    `Attempt ${attempt}: no CI workflows found yet, waiting...`
                  );
                  await new Promise(r => setTimeout(r, interval));
                  continue;
                }
                // No workflows found after 1 minute — nothing to wait for
                core.info('No environment workflows triggered for this SHA');
                core.setOutput('any_failed', 'false');
                core.setOutput('failed_workflows', '');
                core.setOutput('total_workflows', '0');
                core.setOutput('successful_envs', '[]');
                core.setOutput('pr_number', prNumber.toString());
                core.setOutput('pr_author', prAuthor);
                return;
              }

              const pending = ciRuns.filter(
                r => r.status !== 'completed'
              );
              const failed = ciRuns.filter(
                r => r.status === 'completed'
                  && r.conclusion !== 'success'
                  && r.conclusion !== 'skipped'
              );

              if (attempt % 12 === 1) {
                // Log status every ~60s
                core.info(
                  `[${Math.floor(attempt * 5 / 60)}m] ` +
                  `${ciRuns.length} workflows: ` +
                  `${ciRuns.length - pending.length} complete, ` +
                  `${pending.length} pending, ` +
                  `${failed.length} failed`
                );
                for (const run of ciRuns) {
                  core.info(
                    `  ${run.name}: ${run.status}` +
                    (run.conclusion ? ` (${run.conclusion})` : '')
                  );
                }
              }

              if (pending.length === 0) {
                core.info(
                  `All ${ciRuns.length} environment workflows complete!`
                );
                const failedNames = failed.map(r => r.name).join(', ');
                if (failed.length > 0) {
                  core.info(`Failed: ${failedNames}`);
                }
                core.setOutput(
                  'any_failed', (failed.length > 0).toString()
                );
                core.setOutput('failed_workflows', failedNames);
                core.setOutput(
                  'total_workflows', ciRuns.length.toString()
                );

                // Extract env names from successful workflows
                // "CI: redis" → "redis"
                const successfulEnvs = ciRuns
                  .filter(r => r.conclusion === 'success')
                  .map(r => r.name.replace('CI: ', ''))
                  .filter(n => n.length > 0);
                core.setOutput(
                  'successful_envs',
                  JSON.stringify(successfulEnvs)
                );
                core.info(
                  `Successful envs: ${successfulEnvs.join(', ')}`
                );

                core.setOutput('pr_number', prNumber.toString());
                core.setOutput('pr_author', prAuthor);
                return;
              }

              await new Promise(r => setTimeout(r, interval));
            }

            core.setFailed('Timed out waiting for environment workflows');

  wait-for-packages:
    name: "Wait Pkgs"
    runs-on: "ubuntu-latest"
    timeout-minutes: 120

    outputs:
      any_failed: >-
        ${{ steps.wait.outputs.any_failed
            || steps.short_circuit.outputs.any_failed }}
      failed_workflows: >-
        ${{ steps.wait.outputs.failed_workflows
            || steps.short_circuit.outputs.failed_workflows }}
      total_workflows: >-
        ${{ steps.wait.outputs.total_workflows
            || steps.short_circuit.outputs.total_workflows }}

    steps:
      - name: "Checkout"
        if: >-
          github.event_name == 'pull_request'
          || github.event_name == 'push'
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          fetch-depth: 0

      - name: "Decide if polling is needed"
        id: "decide"
        if: >-
          github.event_name == 'pull_request'
          || github.event_name == 'push'
        env:
          EVENT: "${{ github.event_name }}"
          BASE_SHA: "${{ github.event.pull_request.base.sha }}"
          HEAD_SHA: "${{ github.event.pull_request.head.sha
                       || github.sha }}"
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            BASE="$BASE_SHA"
            HEAD="$HEAD_SHA"
          else
            BASE="HEAD~1"
            HEAD="HEAD"
          fi
          changed="$(git diff --name-only "$BASE" "$HEAD")"
          should_poll="$(echo "$changed" \
            | scripts/wait-should-poll.sh packages)"
          echo "should_poll=$should_poll" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          echo "$changed" | sed 's/^/  /'
          echo "should_poll=$should_poll"

      - name: "Short-circuit (no pkg paths changed)"
        id: "short_circuit"
        if: >-
          (github.event_name == 'pull_request'
          || github.event_name == 'push')
          && steps.decide.outputs.should_poll == 'false'
        run: |
          {
            echo "any_failed=false"
            echo "failed_workflows="
            echo "total_workflows=0"
          } >> "$GITHUB_OUTPUT"
          echo "No package paths changed — short-circuiting."

      - name: "Wait for CI Packages workflow"
        id: "wait"
        if: >-
          github.event_name == 'merge_group'
          || github.event_name == 'workflow_dispatch'
          || steps.decide.outputs.should_poll == 'true'
        uses: "actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3" # v9.0.0
        with:
          script: |
            const isPR = context.eventName === 'pull_request';
            const sha = isPR
              ? context.payload.pull_request.head.sha
              : context.sha;

            core.info(`SHA: ${sha} (${isPR ? 'PR head' : 'push'})`);
            core.info(`Event: ${context.eventName}`);

            // Merge queue: no pkg workflow runs, pass immediately
            if (context.eventName === 'merge_group') {
              core.info('Merge queue — no pkg workflow to wait for');
              core.setOutput('any_failed', 'false');
              core.setOutput('failed_workflows', '');
              core.setOutput('total_workflows', '0');
              return;
            }

            core.info('Waiting 30s for CI Packages to register...');
            await new Promise(r => setTimeout(r, 30000));

            const maxAttempts = 1400;  // ~2 hours at 5s
            const interval = 5000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                per_page: 100,
              });

              const pkgRuns = runs.data.workflow_runs.filter(
                r => r.name === 'CI Packages'
              );

              if (pkgRuns.length === 0) {
                if (attempt <= 12) {
                  core.info(
                    `Attempt ${attempt}: CI Packages not found yet, waiting...`
                  );
                  await new Promise(r => setTimeout(r, interval));
                  continue;
                }
                core.info('No CI Packages run triggered for this SHA');
                core.setOutput('any_failed', 'false');
                core.setOutput('failed_workflows', '');
                core.setOutput('total_workflows', '0');
                return;
              }

              const pending = pkgRuns.filter(
                r => r.status !== 'completed'
              );
              const failed = pkgRuns.filter(
                r => r.status === 'completed'
                  && r.conclusion !== 'success'
                  && r.conclusion !== 'skipped'
              );

              if (attempt % 12 === 1) {
                core.info(
                  `[${Math.floor(attempt * 5 / 60)}m] ` +
                  `${pkgRuns.length} CI Packages: ` +
                  `${pkgRuns.length - pending.length} complete, ` +
                  `${pending.length} pending, ` +
                  `${failed.length} failed`
                );
                for (const run of pkgRuns) {
                  core.info(
                    `  ${run.name}: ${run.status}` +
                    (run.conclusion ? ` (${run.conclusion})` : '')
                  );
                }
              }

              if (pending.length === 0) {
                core.info(
                  `All ${pkgRuns.length} CI Packages runs complete!`
                );
                const failedNames = failed.map(r => r.name).join(', ');
                if (failed.length > 0) {
                  core.info(`Failed: ${failedNames}`);
                }
                core.setOutput(
                  'any_failed', (failed.length > 0).toString()
                );
                core.setOutput('failed_workflows', failedNames);
                core.setOutput(
                  'total_workflows', pkgRuns.length.toString()
                );
                return;
              }

              await new Promise(r => setTimeout(r, interval));
            }

            core.setFailed('Timed out waiting for CI Packages');

  result:
    name: "Summary"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    needs: ["wait-for-environments", "wait-for-packages"]
    if: always()

    steps:
      - name: "Check result"
        env:
          ENVS_RESULT: >-
            ${{ needs.wait-for-environments.result }}
          PKGS_RESULT: >-
            ${{ needs.wait-for-packages.result }}
          ENVS_FAILED: >-
            ${{ needs.wait-for-environments.outputs.any_failed }}
          PKGS_FAILED: >-
            ${{ needs.wait-for-packages.outputs.any_failed }}
          ENVS_FAILED_LIST: >-
            ${{ needs.wait-for-environments.outputs.failed_workflows }}
          PKGS_FAILED_LIST: >-
            ${{ needs.wait-for-packages.outputs.failed_workflows }}
          ENVS_TOTAL: >-
            ${{ needs.wait-for-environments.outputs.total_workflows }}
          PKGS_TOTAL: >-
            ${{ needs.wait-for-packages.outputs.total_workflows }}
        run: |
          fail=0
          if [ "$ENVS_RESULT" != "success" ]; then
            echo "wait-for-environments did not succeed: $ENVS_RESULT"
            fail=1
          fi
          if [ "$PKGS_RESULT" != "success" ]; then
            echo "wait-for-packages did not succeed: $PKGS_RESULT"
            fail=1
          fi
          if [ "$ENVS_FAILED" = "true" ]; then
            echo "Failed env workflows: $ENVS_FAILED_LIST"
            fail=1
          fi
          if [ "$PKGS_FAILED" = "true" ]; then
            echo "Failed pkg workflows: $PKGS_FAILED_LIST"
            fail=1
          fi
          if [ "$fail" -eq 1 ]; then
            exit 1
          fi
          echo "Envs: ${ENVS_TOTAL} passed, Pkgs: ${PKGS_TOTAL} passed"

  auto-merge:
    name: "Auto Merge"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    needs: ["wait-for-environments"]
    if: >-
      github.event_name == 'pull_request'
      && needs.wait-for-environments.outputs.any_failed == 'false'
      && needs.wait-for-environments.outputs.pr_author == 'floxbot'
      && needs.wait-for-environments.outputs.total_workflows != '0'

    steps:
      - name: "Merge PR"
        env:
          PR_NUMBER: >-
            ${{ needs.wait-for-environments.outputs.pr_number }}
          GITHUB_TOKEN: >-
            ${{ secrets.MANAGED_FLOXBOT_GITHUB_ACCESS_TOKEN_REPO_SCOPE }}
        run: |
          gh pr merge --auto --merge "$PR_NUMBER" \
            --repo "${{ github.repository }}"

  report-failure:
    name: "Report Failure"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    needs: ["wait-for-environments"]
    if: >-
      needs.wait-for-environments.outputs.any_failed == 'true'
      && github.ref_name == 'main'

    steps:
      - name: "Slack Notification"
        uses: "rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661" # v2
        env:
          SLACK_CHANNEL: "team-content"
          SLACK_TITLE: "floxenvs CI failed on main"
          SLACK_FOOTER: "Thanks for looking at it."
          SLACK_WEBHOOK: "${{ secrets.MANAGED_SLACK_WEBHOOK }}"
          SLACK_USERNAME: "GitHub"
          SLACK_ICON_EMOJI: ":poop:"
          SLACK_COLOR: "#ff2800"
          SLACK_LINK_NAMES: true
          SLACK_MESSAGE: >-
            Failed:
            ${{ needs.wait-for-environments.outputs.failed_workflows }}
            | Workflows:
            ${{ needs.wait-for-environments.outputs.total_workflows }}

  containerize:
    name: "Containerize '${{ matrix.env }}'"
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    needs: ["wait-for-environments", "result"]
    if: >-
      github.event_name == 'push'
      && github.ref_name == 'main'
      && needs.result.result == 'success'
      && needs.wait-for-environments.outputs.successful_envs != '[]'

    permissions:
      contents: "read"
      packages: "write"
      attestations: "write"
      id-token: "write"

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        env: ${{ fromJSON(needs.wait-for-environments.outputs.successful_envs) }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Install flox"
        uses: "flox/install-flox-action@c94e7e1ab56ae14fe98bae4fd84384fd135f0c2a" # main

      - name: "Login to GHCR"
        uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121" # v4
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Containerize environment"
        run: |
          ENV="${{ matrix.env }}"
          export NIX_CONFIG='extra-experimental-features = nix-command flakes'
          flox containerize -d "./$ENV"
          tag=$(echo -n "$ENV" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')
          docker tag "$tag:latest" "ghcr.io/flox/floxenvs:$tag-latest"
          docker push "ghcr.io/flox/floxenvs:$tag-latest"

      - name: "Containerize demo"
        if: hashFiles(format('{0}-demo/.flox/env/manifest.toml', matrix.env)) != ''
        run: |
          ENV="${{ matrix.env }}"
          DEMO="$ENV-demo"
          if [ ! -d "$DEMO/.flox/env" ]; then
            echo "No demo for $ENV, skipping"
            exit 0
          fi
          export NIX_CONFIG='extra-experimental-features = nix-command flakes'
          flox containerize -d "./$DEMO"
          tag=$(echo -n "$DEMO" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]//g')
          docker tag "$tag:latest" "ghcr.io/flox/floxenvs:$tag-latest"
          docker push "ghcr.io/flox/floxenvs:$tag-latest"
