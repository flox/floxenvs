name: "Refresh FloxHub Token"

on:
  schedule:
    # Every 2 weeks on Monday at 06:00 UTC
    - cron: "0 6 1,15 * *"
  workflow_dispatch:

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: "Fetch new token from Auth0"
        id: fetch
        run: |
          RESPONSE=$(curl --silent --fail --request POST \
            --url https://auth.flox.dev/oauth/token \
            --header 'content-type: application/x-www-form-urlencoded' \
            --data "client_id=${{ secrets.MANAGED_FLOXENVS_AUTH0_CLIENT_ID }}" \
            --data "audience=https://hub.flox.dev/api" \
            --data "grant_type=client_credentials" \
            --data "client_secret=${{ secrets.MANAGED_FLOXENVS_AUTH0_CLIENT_SECRET }}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "Failed to fetch token"
            echo "$RESPONSE" | jq .
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: "Update FLOX_FLOXHUB_TOKEN secret"
        env:
          GH_TOKEN: ${{ secrets.MANAGED_FLOXBOT_GITHUB_ACCESS_TOKEN_REPO_SCOPE }}
        run: |
          echo "${{ steps.fetch.outputs.token }}" | gh secret set FLOX_FLOXHUB_TOKEN --repo "${{ github.repository }}"
