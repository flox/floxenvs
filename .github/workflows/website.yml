name: "Website"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      sha:
        type: string
        required: false
      triggered_by:
        type: string
        default: "manual"

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: "read"
  pages: "write"
  id-token: "write"

jobs:
  build:
    name: "Build"
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "site/package-lock.json"
      - name: "Install"
        working-directory: "site"
        run: "npm ci"
      - name: "Build"
        working-directory: "site"
        env:
          SITE_URL: "https://flox.github.io"
          BASE_PATH: "/floxenvs"
        run: "npm run build"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "site/dist"

  deploy:
    name: "Deploy"
    needs: build
    runs-on: "ubuntu-latest"
    environment:
      name: "github-pages"
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
