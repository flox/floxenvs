name: "Website"

on:
  workflow_dispatch:
    inputs:
      items:
        description: >
          Comma-separated <kind>:<name> entries
          (e.g. `env:claude,pkg:ollama`), or `changed`, or `all`.
        type: string
        default: "changed"
      force_rescan:
        description: "Ignore audit cache and re-run all scanners."
        type: boolean
        default: false
  workflow_call:
    inputs:
      sha:
        type: string
        required: true
      triggered_by:
        type: string
        default: "ci"
      items:
        type: string
        default: "changed"
      force_rescan:
        type: boolean
        default: false

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: "read"
  pages: "write"
  id-token: "write"

jobs:
  detect-changed:
    name: "Detect changed items"
    runs-on: "ubuntu-latest"
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Install yq, jq, gh"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq yq
      - name: "Compute matrix"
        id: matrix
        env:
          TRIGGER: ${{ github.event_name }}
          SHA: ${{ inputs.sha || github.sha }}
          INPUT_ITEMS: ${{ inputs.items || 'changed' }}
        run: |
          set -euo pipefail
          export REPO_ROOT="$PWD"
          matrix=$(bash scripts/changed-items.sh)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          count=$(echo "$matrix" | jq '.include | length')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .
