name: "Upgrade Environments"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: >
          Environment to update. Leave empty to update
          all environments.
        required: false
        default: ""
        type: string
  schedule:
    - cron: "30 0 * * 1"

env:
  FLOX_DISABLE_METRICS: "true"

jobs:

  envs:
    name: "Find environments"
    runs-on: "ubuntu-latest"
    timeout-minutes: 30

    outputs:
      envs: "${{ steps.envs.outputs.envs }}"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6

      - name: "Find environments"
        id: "envs"
        env:
          SINGLE_ENV: "${{ inputs.environment }}"
        run: |
          if [ -n "$SINGLE_ENV" ]; then
            # Single environment mode. Reuse discover-envs.sh
            # to pick a runner compatible with the env's lock
            # systems (avoids hard-coding ubuntu-latest for
            # darwin-only envs like omlx).
            LOCK="$SINGLE_ENV/.flox/env/manifest.lock"
            if [ ! -f "$LOCK" ]; then
              echo "Error: $LOCK not found"
              exit 1
            fi

            has_demo="false"
            if [ -d "${SINGLE_ENV}-demo/.flox/env" ]; then
              has_demo="true"
            fi

            systems="$(jq -r '
              .manifest.options.systems // []
              | map(select(. != "x86_64-darwin"))
              | if length == 0 then
                  ["aarch64-darwin","aarch64-linux","x86_64-linux"]
                else . end
              | .[]
            ' "$LOCK")"
            runs_on="$(
              if   echo "$systems" | grep -qx 'x86_64-linux';   then echo "ubuntu-latest"
              elif echo "$systems" | grep -qx 'aarch64-linux';  then echo "ubuntu-24.04-arm"
              elif echo "$systems" | grep -qx 'aarch64-darwin'; then echo "macos-latest"
              else echo "ERROR"; fi
            )"
            if [ "$runs_on" = "ERROR" ]; then
              echo "Error: no supported runner for systems: $systems"
              exit 1
            fi

            envs="[{\"name\":\"$SINGLE_ENV\",\"has_demo\":$has_demo,\"runs_on\":\"$runs_on\"}]"

            echo "-- single env --------------"
            echo "$envs" | jq .
            echo "----------------------------"

            echo "envs=$envs" >> "$GITHUB_OUTPUT"
          else
            # All environments
            bash scripts/discover-envs.sh --update
          fi

  upgrade:
    name: "Upgrade '${{ matrix.name }}'"
    runs-on: "${{ matrix.runs_on }}"
    timeout-minutes: 30

    needs:
      - "envs"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.envs.outputs.envs) }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
        with:
          ref: "main"

      - name: "Install flox"
        uses: "flox/install-flox-action@f6002ed63e483f134001de7b4b45be891e00b09f" # v2.5.1

      - name: "Upgrade minimal environment"
        run: |
          pushd ./${{ matrix.name }}
          flox -vvv upgrade
          popd

      - name: "Upgrade demo environment"
        if: matrix.has_demo
        run: |
          pushd ./${{ matrix.name }}-demo
          # Delete lock to force fresh resolution against
          # the updated minimal env. flox include upgrade
          # doesn't detect when the included env's lock
          # changes (only manifest.toml triggers it).
          rm -f .flox/env/manifest.lock
          flox edit -f .flox/env/manifest.toml
          popd

      - name: "Create Pull Request"
        id: "create-pr"
        uses: "peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1" # v8
        with:
          token: "${{ secrets.MANAGED_FLOXBOT_GITHUB_ACCESS_TOKEN_REPO_SCOPE }}"
          add-paths: |
            ${{ matrix.name }}/.flox
            ${{ matrix.name }}-demo/.flox
          commit-message: "chore: update lockfiles for `${{ matrix.name }}`"
          committer: "FloxBot <bot@flox.dev>"
          author: "FloxBot <bot@flox.dev>"
          branch: "chore-update-${{ matrix.name }}-environment"
          delete-branch: true
          title: "chore: update lockfiles for `${{ matrix.name }}` environment"
          body: |
            Updates lockfiles for `${{ matrix.name }}` and `${{ matrix.name }}-demo`.

            Created by [Update workflow](https://github.com/flox/floxenvs/actions/workflows/update.yml).
          labels: "team-developer-support"

      - name: "Sleep to slow down PRs"
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        run: |
          echo "Sleeping to reduce concurrent PRs"
          sleep "$((RANDOM % 60 + 120))"
