name: "Upgrade Environments"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: >
          Environment to update. Leave empty to update
          all environments.
        required: false
        default: ""
        type: string
  schedule:
    - cron: "30 0 * * 1"

env:
  FLOX_DISABLE_METRICS: "true"

jobs:

  envs:
    name: "Find environments"
    runs-on: "ubuntu-latest"
    timeout-minutes: 30

    outputs:
      envs: "${{ steps.envs.outputs.envs }}"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Find environments"
        id: "envs"
        env:
          SINGLE_ENV: "${{ inputs.environment }}"
        run: |
          if [ -n "$SINGLE_ENV" ]; then
            # Single environment mode
            has_demo="false"
            if [ -d "${SINGLE_ENV}-demo/.flox/env" ]; then
              has_demo="true"
            fi
            envs="[{\"name\":\"$SINGLE_ENV\",\"has_demo\":$has_demo}]"

            echo "-- single env --------------"
            echo "$envs" | jq .
            echo "----------------------------"

            echo "envs=$envs" >> "$GITHUB_OUTPUT"
          else
            # All environments
            bash scripts/discover-envs.sh --update
          fi

  upgrade:
    name: "Upgrade '${{ matrix.name }}'"
    runs-on: "ubuntu-latest"
    timeout-minutes: 30

    needs:
      - "envs"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.envs.outputs.envs) }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6
        with:
          ref: "main"

      - name: "Install flox"
        uses: "flox/install-flox-action@c94e7e1ab56ae14fe98bae4fd84384fd135f0c2a" # main

      - name: "Upgrade minimal environment"
        run: |
          pushd ./${{ matrix.name }}
          flox -vvv upgrade
          popd

      - name: "Upgrade demo environment"
        if: matrix.has_demo
        run: |
          pushd ./${{ matrix.name }}-demo
          # Delete lock to force fresh resolution against
          # the updated minimal env. flox include upgrade
          # doesn't detect when the included env's lock
          # changes (only manifest.toml triggers it).
          rm -f .flox/env/manifest.lock
          flox edit -f .flox/env/manifest.toml
          popd

      - name: "Create Pull Request"
        id: "create-pr"
        uses: "peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1" # v8
        with:
          token: "${{ secrets.MANAGED_FLOXBOT_GITHUB_ACCESS_TOKEN_REPO_SCOPE }}"
          add-paths: |
            ${{ matrix.name }}/.flox
            ${{ matrix.name }}-demo/.flox
          commit-message: "chore: update lockfiles for `${{ matrix.name }}`"
          committer: "FloxBot <bot@flox.dev>"
          author: "FloxBot <bot@flox.dev>"
          branch: "chore-update-${{ matrix.name }}-environment"
          delete-branch: true
          title: "chore: update lockfiles for `${{ matrix.name }}` environment"
          body: |
            Updates lockfiles for `${{ matrix.name }}` and `${{ matrix.name }}-demo`.

            Created by [Update workflow](https://github.com/flox/floxenvs/actions/workflows/update.yml).
          labels: "team-developer-support"

      - name: "Sleep to slow down PRs"
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        run: |
          echo "Sleeping to reduce concurrent PRs"
          sleep "$((RANDOM % 60 + 120))"
