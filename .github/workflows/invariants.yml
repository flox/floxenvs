name: "Invariants"

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: "read"

env:
  FLOX_DISABLE_METRICS: "true"

jobs:

  lockfile-present:
    name: "Every env has manifest.lock"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6

      - name: "Check every env has a manifest.lock"
        run: |
          set -euo pipefail

          # Every dir matching <env>/.flox/env/manifest.toml must
          # have a sibling manifest.lock. The rest of CI assumes
          # this invariant (containerize, lockfile-freshness,
          # composed-include resolution all jq the lockfile
          # without guarding the read).
          fail=0
          for manifest in */.flox/env/manifest.toml; do
            env_dir="${manifest%/.flox/env/manifest.toml}"
            lock="$env_dir/.flox/env/manifest.lock"
            if [ ! -f "$lock" ]; then
              echo "::error file=$manifest::env '$env_dir' is missing manifest.lock"
              fail=1
            fi
          done

          if [ $fail -ne 0 ]; then
            echo ""
            echo "To fix locally:"
            echo "  (cd <env> && flox edit -f .flox/env/manifest.toml)"
            echo ""
            echo "Then commit the generated manifest.lock alongside"
            echo "manifest.toml."
            exit 1
          fi

          echo "OK: every env has a manifest.lock"

  coexist:
    name: "All skills + agents + audit tools coexist in one Flox env"
    runs-on: "ubuntu-latest"
    timeout-minutes: 60

    steps:
      - name: "Checkout"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6

      - name: "Install flox"
        uses: "flox/install-flox-action@f6002ed63e483f134001de7b4b45be891e00b09f" # v2.5.1

      - name: "Get FloxHub token"
        run: |
          echo "FLOX_FLOXHUB_TOKEN=${{ secrets.FLOX_FLOXHUB_TOKEN }}" >> "$GITHUB_ENV"

      # Build every skill + agent + audit tool FROM SOURCE, then `flox install
      # ./result-<pkg>` each into one throwaway environment (Flox rejects any
      # that conflict — the original bug was four skills each shipping
      # bin/python3), then tear it down. Building from source and installing
      # the local result validates THIS checkout, so a source fix turns the
      # check green immediately rather than lagging until the catalog is
      # republished.
      - name: "Assert coexistence"
        run: |
          bash scripts/coexist-check.sh
