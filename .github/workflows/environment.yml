name: "Environment CI"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

env:
  FLOX_DISABLE_METRICS: "true"
  CI: true

jobs:

  discover:
    name: "Discover '${{ inputs.environment }}'"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5

    outputs:
      matrix: "${{ steps.discover.outputs.matrix }}"
      runs_on: "${{ steps.discover.outputs.runs_on }}"
      start_services: "${{ steps.discover.outputs.start_services }}"
      has_demo: "${{ steps.discover.outputs.has_demo }}"
      demo_matrix: "${{ steps.discover.outputs.demo_matrix }}"
      demo_runs_on: "${{ steps.discover.outputs.demo_runs_on }}"
      demo_start_services: "${{ steps.discover.outputs.demo_start_services }}"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Install flox"
        uses: "flox/install-flox-action@6e70b2624cea62b0f11ea4a28e719fe1c86c028b" # v2.4.1

      - name: "Check lockfiles are up to date"
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"

          # Regenerate lock for minimal env
          pushd "$ENV"
          flox edit -f .flox/env/manifest.toml
          popd

          # Regenerate lock for demo env if present
          DEMO_DIR="${ENV}-demo"
          if [ -d "$DEMO_DIR" ] \
              && [ -f "$DEMO_DIR/.flox/env/manifest.toml" ]; then
            pushd "$DEMO_DIR"
            flox include upgrade 2>/dev/null || true
            flox edit -f .flox/env/manifest.toml
            popd
          fi

          # Check for uncommitted lock changes — but ignore
          # two known-noisy per-fetch fields:
          #
          # * `scrape_date` — timestamp the catalog records
          #   when it last verified an artifact. Recently
          #   published packages get re-scraped every couple
          #   of minutes, racing CI on PRs that publish and
          #   consume in the same branch.
          #
          # * `schema-version` — recorded inside each
          #   included env's manifest snapshot in the lock.
          #   A `{ remote = "flox/X" }` include re-fetches
          #   the published env from FloxHub, whose recorded
          #   schema may differ from the same env's checked-
          #   out source if FloxHub processed the publish
          #   with a different flox version. The source-of-
          #   truth schema lives in the manifest.toml that
          #   is itself committed.
          #
          # Both fields are derived metadata, not part of
          # the artifact identity (`rev`/`rev_count`/
          # `narHash`).
          diff="$(git diff --unified=0 \
            -- "*/manifest.lock" \
            | grep -E '^[-+][^-+]' \
            | grep -vE '^[-+][[:space:]]*"scrape_date":' \
            | grep -vE '^[-+][[:space:]]*"schema-version":' \
            || true)"
          if [ -n "$diff" ]; then
            echo "Error: lockfiles are out of date!"
            echo ""
            git diff --stat -- "*/manifest.lock"
            echo ""
            echo "Non-trivial drift detected:"
            echo "$diff" | head -40
            echo ""
            echo "Run 'flox edit -f' on the env and"
            echo "'flox include upgrade' on the demo,"
            echo "then commit the updated lockfiles."
            exit 1
          fi
          echo "Lockfiles are up to date (scrape_date / schema-version drift ignored)."

      - name: "Discover environment"
        id: "discover"
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          LOCK="$ENV/.flox/env/manifest.lock"

          if [ ! -f "$LOCK" ]; then
            echo "Error: $LOCK not found"
            exit 1
          fi

          # Extract systems (exclude x86_64-darwin, default if empty)
          SYSTEMS=$(jq -r '
            .manifest.options.systems // []
            | map(select(. != "x86_64-darwin"))
            | if length == 0 then
                ["aarch64-darwin", "aarch64-linux", "x86_64-linux"]
              else . end
          ' "$LOCK")
          MATRIX=$(echo "$SYSTEMS" | jq -c '{system: .}')

          # Pick a runner whose system is in the lockfile. Prefer Linux
          # (cheaper minutes), fall back to macOS for darwin-only envs.
          RUNS_ON=$(echo "$SYSTEMS" | jq -r '
            if   index("x86_64-linux")   then "ubuntu-latest"
            elif index("aarch64-linux")  then "ubuntu-24.04-arm"
            elif index("aarch64-darwin") then "macos-latest"
            else error("no supported runner for systems: \(.)")
            end
          ')
          echo "runs_on=$RUNS_ON" >> "$GITHUB_OUTPUT"

          # Detect services
          SVC=$(jq -r '
            .manifest.services // {} | length > 0
          ' "$LOCK")

          {
            echo "matrix=$MATRIX"
            echo "start_services=$SVC"
          } >> "$GITHUB_OUTPUT"

          # Check for demo
          DEMO_DIR="$ENV-demo"
          if [ -d "$DEMO_DIR" ] \
              && [ -f "$DEMO_DIR/.flox/env/manifest.lock" ]; then
            DEMO_LOCK="$DEMO_DIR/.flox/env/manifest.lock"

            DEMO_SYSTEMS=$(jq -r '
              .manifest.options.systems // []
              | map(select(. != "x86_64-darwin"))
              | if length == 0 then
                  ["aarch64-darwin", "aarch64-linux", "x86_64-linux"]
                else . end
            ' "$DEMO_LOCK")
            DEMO_MATRIX=$(echo "$DEMO_SYSTEMS" | jq -c '{system: .}')

            DEMO_RUNS_ON=$(echo "$DEMO_SYSTEMS" | jq -r '
              if   index("x86_64-linux")   then "ubuntu-latest"
              elif index("aarch64-linux")  then "ubuntu-24.04-arm"
              elif index("aarch64-darwin") then "macos-latest"
              else error("no supported runner for systems: \(.)")
              end
            ')
            echo "demo_runs_on=$DEMO_RUNS_ON" >> "$GITHUB_OUTPUT"

            DEMO_SVC=$(jq -r '
              .manifest.services // {} | length > 0
            ' "$DEMO_LOCK")

            {
              echo "has_demo=true"
              echo "demo_matrix=$DEMO_MATRIX"
              echo "demo_start_services=$DEMO_SVC"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "has_demo=false"
              echo "demo_matrix={\"system\":[]}"
              echo "demo_runs_on=ubuntu-latest"
              echo "demo_start_services=false"
            } >> "$GITHUB_OUTPUT"
          fi

  test:
    name: "Test '${{ inputs.environment }}' on '${{ matrix.system }}'"
    runs-on: "ubuntu-latest"
    timeout-minutes: 60

    needs:
      - "discover"

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Setup SSH"
        uses: "webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555" # v0.10.0
        with:
          ssh-private-key: "${{ secrets.MANAGED_FLOXBOT_SSH_KEY }}"

      - name: "Setup Tailscale"
        uses: "tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8" # v4
        with:
          oauth-secret: "${{ secrets.MANAGED_TAILSCALE_AUTH_KEY }}"
          tags: "tag:ci"
          timeout: "30s"
          use-cache: true

      - name: "Find remote server to run tests on"
        run: |
          set -eo pipefail
          echo "${{ vars.MANAGED_REMOTE_BUILDERS }}" > machines
          REMOTE_SERVER_ENTRY="$(shuf machines | grep "${{ matrix.system }}" | head -1)"
          REMOTE_SERVER_ADDRESS="$(echo "$REMOTE_SERVER_ENTRY" | cut -f1 -d' ' | cut -f3 -d'/' | sed 's/nixbld@//')"
          REMOTE_SERVER_USER_KNOWN_HOSTS_FILE="$(mktemp)"
          REMOTE_SERVER_PUBLIC_HOST_KEY="$(echo "$REMOTE_SERVER_ENTRY" | tr -s ' ' | cut -f8 -d' ' | base64 -d)"
          export REMOTE_SERVER_ENTRY REMOTE_SERVER_ADDRESS
          export REMOTE_SERVER_USER_KNOWN_HOSTS_FILE REMOTE_SERVER_PUBLIC_HOST_KEY
          printf "%s %s\n" "$REMOTE_SERVER_ADDRESS" "$REMOTE_SERVER_PUBLIC_HOST_KEY" > "$REMOTE_SERVER_USER_KNOWN_HOSTS_FILE"
          echo "REMOTE_SERVER_ADDRESS: $REMOTE_SERVER_ADDRESS"
          echo "REMOTE_SERVER_USER_KNOWN_HOSTS_FILE: $REMOTE_SERVER_USER_KNOWN_HOSTS_FILE"
          cat "$REMOTE_SERVER_USER_KNOWN_HOSTS_FILE"
          {
            echo "REMOTE_SERVER_ADDRESS=$REMOTE_SERVER_ADDRESS"
            echo "REMOTE_SERVER_USER_KNOWN_HOSTS_FILE=$REMOTE_SERVER_USER_KNOWN_HOSTS_FILE"
          } >> "$GITHUB_ENV"
          if [ -n "$REMOTE_SERVER_ADDRESS" ]; then
            tailscale ping "$REMOTE_SERVER_ADDRESS"
          fi

      - name: "Test environment"
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: |
            if [ ! -f "${{ inputs.environment }}/test.sh" ]; then
              echo "WARN: No test.sh found in ${{ inputs.environment }}"
              exit 0
            fi
            ssh github@$REMOTE_SERVER_ADDRESS \
              -oUserKnownHostsFile=$REMOTE_SERVER_USER_KNOWN_HOSTS_FILE \
              nix run \
                  --accept-flake-config \
                  --extra-experimental-features '"nix-command flakes"' \
                  --option access-tokens "github.com=${{ secrets.MANAGED_FLOXBOT_GITHUB_ACCESS_TOKEN_REPO_SCOPE }}" \
                  github:flox/floxenvs/${{ github.sha }}#apps.${{ matrix.system }}.run-test -- ${{ inputs.environment }}

  test-demo:
    name: "Test '${{ inputs.environment }}-demo' on '${{ matrix.system }}'"
    runs-on: "ubuntu-latest"
    timeout-minutes: 60

    needs:
      - "discover"

    if: needs.discover.outputs.has_demo == 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.demo_matrix) }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Setup SSH"
        uses: "webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555" # v0.10.0
        with:
          ssh-private-key: "${{ secrets.MANAGED_FLOXBOT_SSH_KEY }}"

      - name: "Setup Tailscale"
        uses: "tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8" # v4
        with:
          oauth-secret: "${{ secrets.MANAGED_TAILSCALE_AUTH_KEY }}"
          tags: "tag:ci"
          timeout: "30s"
          use-cache: true

      - name: "Find remote server to run tests on"
        run: |
          set -eo pipefail
          echo "${{ vars.MANAGED_REMOTE_BUILDERS }}" > machines
          REMOTE_SERVER_ENTRY="$(shuf machines | grep "${{ matrix.system }}" | head -1)"
          REMOTE_SERVER_ADDRESS="$(echo "$REMOTE_SERVER_ENTRY" | cut -f1 -d' ' | cut -f3 -d'/' | sed 's/nixbld@//')"
          REMOTE_SERVER_USER_KNOWN_HOSTS_FILE="$(mktemp)"
          REMOTE_SERVER_PUBLIC_HOST_KEY="$(echo "$REMOTE_SERVER_ENTRY" | tr -s ' ' | cut -f8 -d' ' | base64 -d)"
          export REMOTE_SERVER_ENTRY REMOTE_SERVER_ADDRESS
          export REMOTE_SERVER_USER_KNOWN_HOSTS_FILE REMOTE_SERVER_PUBLIC_HOST_KEY
          printf "%s %s\n" "$REMOTE_SERVER_ADDRESS" "$REMOTE_SERVER_PUBLIC_HOST_KEY" > "$REMOTE_SERVER_USER_KNOWN_HOSTS_FILE"
          echo "REMOTE_SERVER_ADDRESS: $REMOTE_SERVER_ADDRESS"
          echo "REMOTE_SERVER_USER_KNOWN_HOSTS_FILE: $REMOTE_SERVER_USER_KNOWN_HOSTS_FILE"
          cat "$REMOTE_SERVER_USER_KNOWN_HOSTS_FILE"
          {
            echo "REMOTE_SERVER_ADDRESS=$REMOTE_SERVER_ADDRESS"
            echo "REMOTE_SERVER_USER_KNOWN_HOSTS_FILE=$REMOTE_SERVER_USER_KNOWN_HOSTS_FILE"
          } >> "$GITHUB_ENV"
          if [ -n "$REMOTE_SERVER_ADDRESS" ]; then
            tailscale ping "$REMOTE_SERVER_ADDRESS"
          fi

      - name: "Test environment"
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: |
            if [ ! -f "${{ inputs.environment }}-demo/test.sh" ]; then
              echo "WARN: No test.sh found in ${{ inputs.environment }}-demo"
              exit 0
            fi
            ssh github@$REMOTE_SERVER_ADDRESS \
              -oUserKnownHostsFile=$REMOTE_SERVER_USER_KNOWN_HOSTS_FILE \
              nix run \
                  --accept-flake-config \
                  --extra-experimental-features '"nix-command flakes"' \
                  --option access-tokens "github.com=${{ secrets.MANAGED_FLOXBOT_GITHUB_ACCESS_TOKEN_REPO_SCOPE }}" \
                  github:flox/floxenvs/${{ github.sha }}#apps.${{ matrix.system }}.run-test -- ${{ inputs.environment }}-demo

  push:
    name: "Push '${{ inputs.environment }}' to FloxHub"
    runs-on: "${{ needs.discover.outputs.runs_on }}"
    timeout-minutes: 30

    needs:
      - "discover"
      - "test"

    if: (github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch'

    env:
      FLOX_BIN: "flox -vvv"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Install flox"
        uses: "flox/install-flox-action@6e70b2624cea62b0f11ea4a28e719fe1c86c028b" # v2.4.1

      - name: "Get FloxHub token"
        run: |
          echo "FLOX_FLOXHUB_TOKEN=${{ secrets.FLOX_FLOXHUB_TOKEN }}" >> "$GITHUB_ENV"

      - name: "Determine target org"
        id: "org"
        run: |
          ENV="${{ inputs.environment }}"
          if [ -f "$ENV/push.json" ]; then
            ORG=$(jq -r '.org' "$ENV/push.json")
          else
            ORG="flox"
          fi
          echo "owner=$ORG" >> "$GITHUB_OUTPUT"

      - name: "Pull or Create remote environment"
        env:
          FLOX_REMOTE_OWNER: "${{ steps.org.outputs.owner }}"
        run: |
          ENV="${{ inputs.environment }}"
          pushd "./$ENV"
          if flox list --config -r "$FLOX_REMOTE_OWNER/$ENV" >/dev/null; then
            $FLOX_BIN pull "$FLOX_REMOTE_OWNER/$ENV" --dir "remote"
          else
            echo "WARN: No environment $FLOX_REMOTE_OWNER/$ENV found on FloxHub"
            echo "WARN: Creating a new environment $ENV"
            $FLOX_BIN init --name "$ENV" --dir "remote"
            $FLOX_BIN push --dir "remote"
          fi
          popd

      - name: "Sync to remote environment"
        env:
          FLOX_REMOTE_OWNER: "${{ steps.org.outputs.owner }}"
        run: |
          ENV="${{ inputs.environment }}"
          pushd "./$ENV"
          cp -rf .flox/env/* remote/.flox/env/
          $FLOX_BIN edit --sync --dir "remote"
          popd

      - name: "Push to remote environment"
        run: |
          ENV="${{ inputs.environment }}"
          pushd "./$ENV"
          $FLOX_BIN push --dir "remote"
          popd

  push-demo:
    name: "Push '${{ inputs.environment }}-demo' to FloxHub"
    runs-on: "${{ needs.discover.outputs.demo_runs_on }}"
    timeout-minutes: 30

    needs:
      - "discover"
      - "push"
      - "test-demo"

    if: >-
      ((github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch')
      && needs.discover.outputs.has_demo == 'true'

    env:
      FLOX_BIN: "flox -vvv"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6

      - name: "Install flox"
        uses: "flox/install-flox-action@6e70b2624cea62b0f11ea4a28e719fe1c86c028b" # v2.4.1

      - name: "Get FloxHub token"
        run: |
          echo "FLOX_FLOXHUB_TOKEN=${{ secrets.FLOX_FLOXHUB_TOKEN }}" >> "$GITHUB_ENV"

      - name: "Determine target org"
        id: "org"
        run: |
          ENV="${{ inputs.environment }}"
          if [ -f "$ENV/push.json" ]; then
            ORG=$(jq -r '.org' "$ENV/push.json")
          else
            ORG="flox"
          fi
          echo "owner=$ORG" >> "$GITHUB_OUTPUT"

      - name: "Rewrite include to use remote environment"
        env:
          FLOX_REMOTE_OWNER: "${{ steps.org.outputs.owner }}"
        run: |
          ENV="${{ inputs.environment }}"
          DEMO_DIR="$ENV-demo"
          # sed -i is non-portable between GNU (Linux) and BSD (macOS) sed;
          # write through a temp file so the same step works on both runners.
          MANIFEST="$DEMO_DIR/.flox/env/manifest.toml"
          sed "s|{ dir = \"../$ENV\" }|{ remote = \"$FLOX_REMOTE_OWNER/$ENV\" }|g" "$MANIFEST" > "$MANIFEST.new"
          mv "$MANIFEST.new" "$MANIFEST"
          cat "$DEMO_DIR/.flox/env/manifest.toml"

      - name: "Upgrade includes"
        run: |
          ENV="${{ inputs.environment }}"
          DEMO_DIR="$ENV-demo"
          pushd "$DEMO_DIR"
          flox include upgrade
          popd

      - name: "Pull or Create remote environment"
        env:
          FLOX_REMOTE_OWNER: "${{ steps.org.outputs.owner }}"
        run: |
          ENV="${{ inputs.environment }}"
          DEMO_DIR="$ENV-demo"
          pushd "$DEMO_DIR"
          if flox list --config -r "$FLOX_REMOTE_OWNER/$DEMO_DIR" >/dev/null; then
            $FLOX_BIN pull "$FLOX_REMOTE_OWNER/$DEMO_DIR" --dir "remote"
          else
            echo "WARN: No environment $FLOX_REMOTE_OWNER/$DEMO_DIR found on FloxHub"
            echo "WARN: Creating a new environment $DEMO_DIR"
            $FLOX_BIN init --name "$DEMO_DIR" --dir "remote"
            $FLOX_BIN push --dir "remote"
          fi
          popd

      - name: "Sync to remote environment"
        run: |
          ENV="${{ inputs.environment }}"
          DEMO_DIR="$ENV-demo"
          pushd "$DEMO_DIR"
          cp -rf .flox/env/* remote/.flox/env/
          $FLOX_BIN edit --sync --dir "remote"
          popd

      - name: "Push to remote environment"
        run: |
          ENV="${{ inputs.environment }}"
          DEMO_DIR="$ENV-demo"
          pushd "$DEMO_DIR"
          $FLOX_BIN push --dir "remote"
          popd
