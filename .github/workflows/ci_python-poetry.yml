name: "CI: python-poetry"

on:
  push:
    branches: ["main"]
    paths:
      - "python-poetry/**"
      - "python-poetry-demo/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - ".github/workflows/environment.yml"
  pull_request:
    paths:
      - "python-poetry/**"
      - "python-poetry-demo/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - ".github/workflows/environment.yml"
  workflow_dispatch:

permissions:
  contents: "read"
  packages: "write"
  attestations: "write"
  id-token: "write"

jobs:
  run:
    uses: "./.github/workflows/environment.yml"
    with:
      environment: "python-poetry"
    secrets: inherit
