name: "Sentry"

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches:
      - "main"

jobs:

  report:
    name: "Report"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Setup Sentry CLI"
        uses: "matbour/setup-sentry-cli@3e938c54b3018bdd019973689ef984e033b0454b"
 # v2
        with:
          token:        "${{ secrets.MANAGED_FLOXENVS_SENTRY_TOKEN }}"
          organization: "flox-dev"
          project:      "floxenvs"

      # 1. fetch jobs
      # 2. send them to sentry
