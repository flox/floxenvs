name: "CI: 1password"

on:
  push:
    branches: ["main"]
    paths:
      - "1password/**"
      - "1password-demo/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - ".github/workflows/environment.yml"
      - ".github/workflows/ci_1password.yml"
  pull_request:
    paths:
      - "1password/**"
      - "1password-demo/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - ".github/workflows/environment.yml"
      - ".github/workflows/ci_1password.yml"
  workflow_dispatch:

permissions:
  contents: "read"
  packages: "write"
  attestations: "write"
  id-token: "write"

jobs:
  run:
    uses: "./.github/workflows/environment.yml"
    with:
      environment: "1password"
    secrets: inherit
