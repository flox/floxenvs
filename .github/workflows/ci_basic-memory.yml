name: "CI: basic-memory"

on:
  push:
    branches: ["main"]
    paths:
      - "basic-memory/**"
      - "basic-memory-demo/**"
      - ".flox/pkgs/basic-memory/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - ".github/workflows/environment.yml"
      - ".github/workflows/ci_basic-memory.yml"
  pull_request:
    paths:
      - "basic-memory/**"
      - "basic-memory-demo/**"
      - ".flox/pkgs/basic-memory/**"
      - "flake.nix"
      - "flake.lock"
      - "scripts/**"
      - ".github/workflows/environment.yml"
      - ".github/workflows/ci_basic-memory.yml"
  workflow_dispatch:

permissions:
  contents: "read"
  packages: "write"
  attestations: "write"
  id-token: "write"

jobs:
  run:
    uses: "./.github/workflows/environment.yml"
    with:
      environment: "basic-memory"
    secrets: inherit
