      "on-activate": "export VIBE_KANBAN_CACHE=\"$FLOX_ENV_CACHE/vibe-kanban\"\nmkdir -p \"$VIBE_KANBAN_CACHE\"\n\n# vibe-kanban stores its sqlite database and config under\n# $XDG_DATA_HOME/vibe-kanban. Scope it to the env cache so the\n# env is self-contained and doesn't touch the user's home.\nexport XDG_DATA_HOME=\"$VIBE_KANBAN_CACHE/data\"\nmkdir -p \"$XDG_DATA_HOME\"\n\nif [ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]; then\n  gum style \\\n    --foreground 212 --border-foreground 212 \\\n    --border double --align center \\\n    --width 50 --margin \"1 2\" --padding \"1 2\" \\\n    \"Vibe Kanban\" \"kanban for coding agents\"\n  echo \"\"\n  echo \"  vibe-kanban         — start the web UI\"\n  echo \"  vibe-kanban-mcp     — MCP server for agents\"\n  echo \"  vibe-kanban-review  — review diffs\"\n  echo \"\"\n  echo \"  Web UI port: $BACKEND_PORT\"\n  echo \"  Data dir:    $XDG_DATA_HOME\"\n  echo \"\"\nfi\n"
    },
    "options": {}
  },
