  "compose": {
    "composer": {
      "schema-version": "1.10.0",
      "install": {
        "gum": {
          "pkg-path": "gum",
          "pkg-group": "demo-tools"
        }
      },
      "hook": {
        "on-activate": "if [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Start Verba services in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'Services:' \\\n    '  weaviate  http://localhost:8080' \\\n    '  ollama    http://localhost:11434' \\\n    '  verba     http://localhost:8000' '' \\\n    'Ollama models:' \\\n    \"  chat   = $OLLAMA_MODEL\" \\\n    \"  embed  = $OLLAMA_EMBED_MODEL\"\nfi\n"
      },
      "options": {},
      "include": {
        "environments": [
          {
            "dir": "../verba"
          }
        ]
      }
    },
    "include": [
      {
        "manifest": {
          "schema-version": "1.10.0",
          "install": {
            "bash": {
              "pkg-path": "bash",
              "pkg-group": "verba",
              "priority": 0
            },
            "curl": {
              "pkg-path": "curl",
              "pkg-group": "verba-tools"
            },
            "gcc-unwrapped": {
              "pkg-path": "gcc-unwrapped",
              "pkg-group": "verba-build"
            },
            "git": {
              "pkg-path": "git",
              "pkg-group": "verba-tools"
            },
            "glibc": {
              "pkg-path": "glibc",
              "pkg-group": "verba-build",
              "systems": [
                "x86_64-linux",
                "aarch64-linux"
              ]
            },
            "ollama": {
              "pkg-path": "ollama",
              "pkg-group": "verba"
            },
            "pkg-config": {
              "pkg-path": "pkg-config",
              "pkg-group": "verba-build"
            },
            "python": {
              "pkg-path": "python311",
              "pkg-group": "verba"
            },
            "weaviate": {
              "pkg-path": "weaviate",
              "pkg-group": "verba"
            }
          },
          "vars": {
            "AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED": "true",
            "OLLAMA_EMBED_MODEL": "mxbai-embed-large",
            "OLLAMA_MODEL": "llama3",
            "OLLAMA_URL": "http://localhost:11434",
            "PERSISTENCE_DATA_PATH": "./verba-data",
            "QUERY_DEFAULTS_LIMIT": "10",
            "VERBA_INSTALL_PACKAGE": "goldenverba@git+https://github.com/weaviate/Verba",
            "VIRTUAL_ENV_DISABLE_PROMPT": "1",
            "WEAVIATE_URL_VERBA": "localhost",
            "WEAVIATE_URL_VERBA_full": "http://localhost:8080"
          },
          "hook": {
            "on-activate": "export PYTHON_DIR=\"$FLOX_ENV_CACHE/python\"\n\nif [ ! -d \"$PYTHON_DIR\" ]; then\n  python -m venv \"$PYTHON_DIR\"\nfi\n\n(\n  source \"$PYTHON_DIR/bin/activate\"\n  pip install -q \"$VERBA_INSTALL_PACKAGE\"\n)\n"
          },
          "profile": {
            "common": "source \"$PYTHON_DIR/bin/activate\"\n"
          },
          "options": {},
          "services": {
            "models": {
              "command": "until ollama list; do\n  sleep 0.1\ndone\nollama pull \"$OLLAMA_MODEL\"\nollama pull \"$OLLAMA_EMBED_MODEL\"\n"
            },
            "ollama": {
              "command": "ollama serve"
            },
            "verba": {
              "command": "if [[ \"$WEAVIATE_URL_VERBA\" != \"\" ]]; then\n  until curl -s \"$WEAVIATE_URL_VERBA_full\"; do\n    echo \"waiting for weaviate ...\"\n    sleep 0.1\n  done\nfi\n\"$PYTHON_DIR/bin/verba\" start --port 8000 --host 0.0.0.0\n"
            },
            "weaviate": {
              "command": "weaviate --host 0.0.0.0 --port 8080 --scheme http"
            }
          }
        },
        "name": "verba",
        "descriptor": {
          "dir": "../verba"
        }
      }
    ],
    "warnings": []
  }
