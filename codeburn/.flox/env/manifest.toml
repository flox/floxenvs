schema-version = "1.10.0"

# Minimal CodeBurn environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/codeburn"]
#
# CodeBurn auto-detects which AI coding tools you use by
# scanning their session data on disk. No configuration is
# required for the common case.
#
# Override the default config dir for Claude Code with
# CLAUDE_CONFIG_DIRS (colon-separated, e.g.
# "$HOME/.claude-work:$HOME/.claude-personal") to merge
# usage across multiple Claude profiles.

[install]
codeburn.pkg-path = "flox/codeburn"
codeburn.pkg-group = "codeburn"
