      "hook": {
        "on-activate": "if [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  dir=\"${FIRECRAWL_DATA_DIR:-$FLOX_ENV_CACHE/firecrawl}\"\n  mkdir -p \"$dir\"\n  key_file=\"$dir/api-key\"\n\n  # Ask for the Firecrawl API key on first run. Only prompt\n  # when running interactively and the key isn't already set.\n  if [[ -z \"${FIRECRAWL_API_KEY:-}\" && -t 0 ]]; then\n    gum style --border double --margin '1 2' --padding '1 4' \\\n      'Firecrawl demo — scrape, crawl, and search the web' '' \\\n      'A Firecrawl API key is required.' \\\n      'Grab one (free tier available) at:' \\\n      '  https://firecrawl.dev/app/api-keys'\n    key=\"$(gum input --password \\\n      --placeholder 'fc-...' \\\n      --prompt 'FIRECRAWL_API_KEY > ')\"\n    if [[ -n \"$key\" ]]; then\n      printf '%s' \"$key\" > \"$key_file\"\n      chmod 600 \"$key_file\"\n      FIRECRAWL_API_KEY=\"$key\"\n      export FIRECRAWL_API_KEY\n      gum style --foreground 42 'Key saved to the env cache. ✓'\n    else\n      gum style --foreground 214 \\\n        'No key entered — set FIRECRAWL_API_KEY later or run `firecrawl login`.'\n    fi\n  fi\n\n  gum style --border double --margin '1 2' --padding '1 4' \\\n    'Firecrawl CLI' '' \\\n    'Check auth + credits:' \\\n    '  firecrawl --status' '' \\\n    'Scrape a page to clean markdown:' \\\n    '  firecrawl scrape \"https://firecrawl.dev\" -o page.md' '' \\\n    'Search the web:' \\\n    '  firecrawl search \"flox dev environments\"' '' \\\n    'Drive it from Claude Code / OpenCode via the bundled skill.'\nfi\n"
      },
