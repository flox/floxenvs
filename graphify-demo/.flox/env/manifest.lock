{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "bash": {
        "pkg-path": "bash",
        "pkg-group": "graphify",
        "priority": 0
      },
      "binutils": {
        "pkg-path": "binutils",
        "pkg-group": "graphify-build",
        "systems": [
          "x86_64-linux",
          "aarch64-linux"
        ]
      },
      "claude-code": {
        "pkg-path": "flox/claude-code",
        "pkg-group": "claude-code"
      },
      "curl": {
        "pkg-path": "curl",
        "pkg-group": "graphify-tools"
      },
      "flox-ai": {
        "pkg-path": "flox/flox-ai",
        "pkg-group": "flox-ai"
      },
      "gcc-unwrapped": {
        "pkg-path": "gcc-unwrapped",
        "pkg-group": "graphify-build"
      },
      "git": {
        "pkg-path": "git",
        "pkg-group": "graphify-tools"
      },
      "glibc": {
        "pkg-path": "glibc",
        "pkg-group": "graphify-build",
        "systems": [
          "x86_64-linux",
          "aarch64-linux"
        ],
        "outputs": "all"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "pkg-config": {
        "pkg-path": "pkg-config",
        "pkg-group": "graphify-build"
      },
      "python": {
        "pkg-path": "python311",
        "pkg-group": "graphify"
      },
      "skills-graphify": {
        "pkg-path": "flox/skills-graphify",
        "pkg-group": "skills-graphify"
      }
    },
    "vars": {
      "GRAPHIFY_INSTALL_PACKAGE": "graphifyy[mcp,watch]",
      "GRAPHIFY_PROJECT_ROOT": "",
      "VIRTUAL_ENV_DISABLE_PROMPT": "1"
    },
    "hook": {
      "on-activate": "# flox-ai sets up Claude Code config + discovers the bundled skill\n# (was previously provided via the flox/claude include).\neval \"$(flox-ai setup-hook)\"\n\nexport PYTHON_DIR=\"$FLOX_ENV_CACHE/python\"\n\nCURRENT_INTERP=\"$(realpath \"$(which python3)\")\"\nCACHED_INTERP=\"$(cat \"$PYTHON_DIR/.interpreter\" \\\n  2>/dev/null || echo none)\"\n\nif [ ! -d \"$PYTHON_DIR\" ] \\\n    || [ \"$CURRENT_INTERP\" != \"$CACHED_INTERP\" ]; then\n  python3 -m venv --upgrade-deps \"$PYTHON_DIR\"\n  echo \"$CURRENT_INTERP\" > \"$PYTHON_DIR/.interpreter\"\nfi\n\nunset VIRTUAL_ENV\nsource \"$PYTHON_DIR/bin/activate\"\n\nHASH=$(echo \"$GRAPHIFY_INSTALL_PACKAGE\" | md5sum 2>/dev/null \\\n  || echo \"$GRAPHIFY_INSTALL_PACKAGE\" | md5 -q)\nHASH=$(echo \"$HASH\" | cut -d\" \" -f1)\nLAST=$(cat \"$PYTHON_DIR/.deps_hash\" 2>/dev/null)\nif [ \"$HASH\" != \"$LAST\" ]; then\n  pip install -q \"$GRAPHIFY_INSTALL_PACKAGE\"\n  echo \"$HASH\" > \"$PYTHON_DIR/.deps_hash\"\nfi\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'graphify — knowledge graphs for Claude Code' '' \\\n    'The /graphify skill is pre-installed via' \\\n    'flox/skill-graphify and discovered by' \\\n    'flox-ai. Just open Claude Code:' \\\n    '  /graphify .' '' \\\n    'Or use the CLI directly:' \\\n    '  graphify .' \\\n    '  graphify ./raw --mode deep' \\\n    '  graphify ./raw --update' '' \\\n    'Query the graph:' \\\n    '  graphify query \"what connects X to Y?\"' \\\n    '  graphify path \"Module\" \"Database\"' \\\n    '  graphify explain \"Concept\"'\nfi\n"
    },
    "profile": {
      "bash": "source \"$PYTHON_DIR/bin/activate\"\n",
      "zsh": "source \"$PYTHON_DIR/bin/activate\"\n",
      "fish": "source \"$PYTHON_DIR/bin/activate.fish\"\n",
      "tcsh": "source \"$PYTHON_DIR/bin/activate.csh\"\n"
    },
    "options": {},
    "services": {
      "graphify-mcp": {
        "command": "PYTHON_DIR=\"$FLOX_ENV_CACHE/python\"\nsource \"$PYTHON_DIR/bin/activate\"\nroot=\"${GRAPHIFY_PROJECT_ROOT:-$FLOX_ENV_PROJECT}\"\ngraph=\"$root/graphify-out/graph.json\"\nuntil [ -f \"$graph\" ]; do\n  echo \"waiting for $graph (run graphify-watch first) ...\"\n  sleep 2\ndone\nexec python -m graphify.serve \"$graph\"\n"
      },
      "graphify-watch": {
        "command": "PYTHON_DIR=\"$FLOX_ENV_CACHE/python\"\nsource \"$PYTHON_DIR/bin/activate\"\nroot=\"${GRAPHIFY_PROJECT_ROOT:-$FLOX_ENV_PROJECT}\"\nexec graphify watch \"$root\"\n"
      }
    }
  },
