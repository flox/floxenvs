    }
  ],
  "compose": {
    "composer": {
      "schema-version": "1.10.0",
      "install": {
        "gum": {
          "pkg-path": "gum",
          "pkg-group": "demo-tools"
        },
        "skill-graphify": {
          "pkg-path": "flox/skill-graphify",
          "pkg-group": "skill-graphify"
        }
      },
      "hook": {
        "on-activate": "if [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'graphify — knowledge graphs for Claude Code' '' \\\n    'The /graphify skill is pre-installed via' \\\n    'flox/skill-graphify and discovered by' \\\n    'claude-managed. Just open Claude Code:' \\\n    '  /graphify .' '' \\\n    'Or use the CLI directly:' \\\n    '  graphify .' \\\n    '  graphify ./raw --mode deep' \\\n    '  graphify ./raw --update' '' \\\n    'Query the graph:' \\\n    '  graphify query \"what connects X to Y?\"' \\\n    '  graphify path \"Module\" \"Database\"' \\\n    '  graphify explain \"Concept\"'\nfi\n"
      },
      "options": {},
      "include": {
        "environments": [
          {
            "dir": "../graphify"
          },
          {
            "remote": "flox/claude"
          }
        ]
      }
    },
    "include": [
      {
        "manifest": {
          "schema-version": "1.10.0",
          "install": {
            "bash": {
              "pkg-path": "bash",
              "pkg-group": "graphify",
              "priority": 0
            },
            "claude-code": {
              "pkg-path": "flox/claude-code",
              "pkg-group": "claude-code"
            },
            "curl": {
              "pkg-path": "curl",
              "pkg-group": "graphify-tools"
            },
            "gcc-unwrapped": {
              "pkg-path": "gcc-unwrapped",
              "pkg-group": "graphify-build"
            },
            "git": {
              "pkg-path": "git",
              "pkg-group": "graphify-tools"
            },
            "glibc": {
              "pkg-path": "glibc",
              "pkg-group": "graphify-build",
              "systems": [
                "x86_64-linux",
                "aarch64-linux"
              ]
            },
            "pkg-config": {
              "pkg-path": "pkg-config",
              "pkg-group": "graphify-build"
            },
            "python": {
              "pkg-path": "python311",
              "pkg-group": "graphify"
            }
          },
          "vars": {
            "GRAPHIFY_INSTALL_PACKAGE": "graphifyy[mcp,watch]",
            "GRAPHIFY_PROJECT_ROOT": "",
            "VIRTUAL_ENV_DISABLE_PROMPT": "1"
          },
          "hook": {
            "on-activate": "export PYTHON_DIR=\"$FLOX_ENV_CACHE/python\"\n\nCURRENT_INTERP=\"$(realpath \"$(which python3)\")\"\nCACHED_INTERP=\"$(cat \"$PYTHON_DIR/.interpreter\" \\\n  2>/dev/null || echo none)\"\n\nif [ ! -d \"$PYTHON_DIR\" ] \\\n    || [ \"$CURRENT_INTERP\" != \"$CACHED_INTERP\" ]; then\n  python3 -m venv --upgrade-deps \"$PYTHON_DIR\"\n  echo \"$CURRENT_INTERP\" > \"$PYTHON_DIR/.interpreter\"\nfi\n\nunset VIRTUAL_ENV\nsource \"$PYTHON_DIR/bin/activate\"\n\nHASH=$(echo \"$GRAPHIFY_INSTALL_PACKAGE\" | md5sum 2>/dev/null \\\n  || echo \"$GRAPHIFY_INSTALL_PACKAGE\" | md5 -q)\nHASH=$(echo \"$HASH\" | cut -d\" \" -f1)\nLAST=$(cat \"$PYTHON_DIR/.deps_hash\" 2>/dev/null)\nif [ \"$HASH\" != \"$LAST\" ]; then\n  pip install -q \"$GRAPHIFY_INSTALL_PACKAGE\"\n  echo \"$HASH\" > \"$PYTHON_DIR/.deps_hash\"\nfi\n"
          },
          "profile": {
            "bash": "source \"$PYTHON_DIR/bin/activate\"\n",
            "zsh": "source \"$PYTHON_DIR/bin/activate\"\n",
            "fish": "source \"$PYTHON_DIR/bin/activate.fish\"\n",
            "tcsh": "source \"$PYTHON_DIR/bin/activate.csh\"\n"
          },
          "options": {},
          "services": {
            "graphify-mcp": {
              "command": "PYTHON_DIR=\"$FLOX_ENV_CACHE/python\"\nsource \"$PYTHON_DIR/bin/activate\"\nroot=\"${GRAPHIFY_PROJECT_ROOT:-$FLOX_ENV_PROJECT}\"\ngraph=\"$root/graphify-out/graph.json\"\nuntil [ -f \"$graph\" ]; do\n  echo \"waiting for $graph (run graphify-watch first) ...\"\n  sleep 2\ndone\nexec python -m graphify.serve \"$graph\"\n"
            },
            "graphify-watch": {
              "command": "PYTHON_DIR=\"$FLOX_ENV_CACHE/python\"\nsource \"$PYTHON_DIR/bin/activate\"\nroot=\"${GRAPHIFY_PROJECT_ROOT:-$FLOX_ENV_PROJECT}\"\nexec graphify watch \"$root\"\n"
            }
          }
        },
        "name": "graphify",
        "descriptor": {
          "dir": "../graphify"
        }
      },
      {
        "manifest": {
          "schema-version": "1.10.0",
          "install": {
            "claude-code": {
              "pkg-path": "flox/claude-code",
              "pkg-group": "claude-code"
            },
            "claude-managed": {
              "pkg-path": "flox/claude-managed",
              "pkg-group": "claude-managed",
              "version": "^0.4.1"
            }
          },
          "hook": {
            "on-activate": "eval \"$(claude-managed setup-hook)\"\n"
          },
          "profile": {
            "bash": "eval \"$(claude-managed setup-profile-bash)\"\n",
            "zsh": "eval \"$(claude-managed setup-profile-zsh)\"\n",
            "fish": "claude-managed setup-profile-fish | source\n"
          },
          "options": {}
        },
        "name": "claude",
        "descriptor": {
          "remote": "flox/claude"
        }
      }
    ],
    "warnings": [
      {
        "warning": {
          "Overriding": [
            "install",
            "claude-code"
          ]
        },
        "higher_priority_name": "claude"
      }
    ]
  }
}
