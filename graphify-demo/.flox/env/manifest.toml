schema-version = "1.10.0"

[include]
environments = [
  { dir = "../graphify" }
]

# gum is a demo-only tool for styled terminal output.
# skills-graphify ships the /graphify SKILL.md into
# $FLOX_ENV/share/claude-code/skills/graphify/ where
# flox-ai (installed below) auto-discovers it on
# activate — no `graphify install` step needed.

[install]
gum.pkg-path = "gum"
gum.pkg-group = "demo-tools"
skills-graphify.pkg-path = "flox/skills-graphify"
skills-graphify.pkg-group = "skills-graphify"
flox-ai.pkg-path = "flox/flox-ai"
flox-ai.pkg-group = "flox-ai"

[hook]
on-activate = '''
if [[ "${FLOX_ENVS_TESTING:-}" != "1" ]]; then
  gum style --border double --margin '1 2' \
    --padding '1 4' \
    'graphify — knowledge graphs for Claude Code' '' \
    'The /graphify skill is pre-installed via' \
    'flox/skill-graphify and discovered by' \
    'flox-ai. Just open Claude Code:' \
    '  /graphify .' '' \
    'Or use the CLI directly:' \
    '  graphify .' \
    '  graphify ./raw --mode deep' \
    '  graphify ./raw --update' '' \
    'Query the graph:' \
    '  graphify query "what connects X to Y?"' \
    '  graphify path "Module" "Database"' \
    '  graphify explain "Concept"'
fi
'''
