{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "bash": {
        "pkg-path": "bash",
        "priority": 0,
        "outputs": "all"
      },
      "curl": {
        "pkg-path": "curl",
        "outputs": "all"
      },
      "gcc-unwrapped": {
        "pkg-path": "gcc-unwrapped",
        "outputs": "all"
      },
      "git": {
        "pkg-path": "git",
        "outputs": "all"
      },
      "glibc": {
        "pkg-path": "glibc",
        "systems": [
          "x86_64-linux",
          "aarch64-linux"
        ],
        "outputs": "all"
      },
      "gum": {
        "pkg-path": "gum"
      },
      "ollama": {
        "pkg-path": "ollama"
      },
      "pkg-config": {
        "pkg-path": "pkg-config",
        "outputs": "all"
      },
      "python": {
        "pkg-path": "python311"
      },
      "weaviate": {
        "pkg-path": "weaviate"
      }
    },
    "vars": {
      "AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED": "true",
      "OLLAMA_EMBED_MODEL": "mxbai-embed-large",
      "OLLAMA_MODEL": "llama3",
      "OLLAMA_URL": "http://localhost:11434",
      "PERSISTENCE_DATA_PATH": "./verba-data",
      "QUERY_DEFAULTS_LIMIT": "10",
      "VERBA_INSTALL_PACKAGE": "goldenverba@git+https://github.com/weaviate/Verba",
      "VIRTUAL_ENV_DISABLE_PROMPT": "1",
      "WEAVIATE_URL_VERBA": "localhost",
      "WEAVIATE_URL_VERBA_full": "http://localhost:8080"
    },
    "hook": {
      "on-activate": "# If we export this here, it can be used later in 'profiles.common'\nexport PYTHON_DIR=\"$FLOX_ENV_CACHE/python\"\n\nif tty -s; then\n  if [ ! -d \"$PYTHON_DIR\" ]; then\n    gum spin -s globe --title \"Creating venv in $PYTHON_DIR...\" -- python -m venv \"$PYTHON_DIR\"\n  fi\n\n  (\n    source \"$PYTHON_DIR/bin/activate\"\n    gum spin -s monkey --title \"Installing/updating Verba...\" -- pip install \"$VERBA_INSTALL_PACKAGE\"\n  )\nelse\n  if [ ! -d \"$PYTHON_DIR\" ]; then\n    python -m venv \"$PYTHON_DIR\"\n  fi\n\n  (\n    source \"$PYTHON_DIR/bin/activate\"\n    pip install \"$VERBA_INSTALL_PACKAGE\"\n  )\nfi\n"
    },
    "profile": {
      "common": "  # Activate the Python venv\n  source \"$PYTHON_DIR/bin/activate\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-linux",
        "x86_64-darwin"
      ]
    },
    "services": {
      "models": {
        "command": "# wait for ollama to be ready\nuntil ollama list; do\n  sleep 0.1\ndone\n\nollama pull \"$OLLAMA_MODEL\"\nollama pull \"$OLLAMA_EMBED_MODEL\"\n"
      },
      "ollama": {
        "command": "ollama serve"
      },
      "verba": {
        "command": "if [[ \"$WEAVIATE_URL_VERBA\" != \"\" ]]; then\n  until curl -s \"$WEAVIATE_URL_VERBA_full\"; do\n    echo \"waiting for weaviate ...\"\n    sleep 0.1\n  done\nfi\n\"$PYTHON_DIR/bin/verba\" start --port 8000 --host 0.0.0.0\n"
      },
      "weaviate": {
        "command": "weaviate --host 0.0.0.0 --port 8080 --scheme http"
      }
    }
  },
