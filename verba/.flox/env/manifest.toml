schema-version = "1.10.0"

# Verba RAG application with Weaviate + Ollama.
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/verba"]
#
# Provides Python, Weaviate vector database, Ollama
# LLM backend, and the Verba RAG application.

[install]
python.pkg-path = "python311"
python.pkg-group = "verba"
weaviate.pkg-path = "weaviate"
weaviate.pkg-group = "verba"
ollama.pkg-path = "ollama"
ollama.pkg-group = "verba"
bash.pkg-path = "bash"
bash.pkg-group = "verba"
bash.priority = 0
curl.pkg-path = "curl"
curl.pkg-group = "verba-tools"
git.pkg-path = "git"
git.pkg-group = "verba-tools"
gcc-unwrapped.pkg-path = "gcc-unwrapped"
gcc-unwrapped.pkg-group = "verba-build"
pkg-config.pkg-path = "pkg-config"
pkg-config.pkg-group = "verba-build"
glibc.pkg-path = "glibc"
glibc.pkg-group = "verba-build"
glibc.systems = ["x86_64-linux", "aarch64-linux"]

[vars]
VERBA_INSTALL_PACKAGE = "goldenverba@git+https://github.com/weaviate/Verba"
WEAVIATE_URL_VERBA = "localhost"
WEAVIATE_URL_VERBA_full = "http://localhost:8080"
PERSISTENCE_DATA_PATH = "./verba-data"
AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED = "true"
QUERY_DEFAULTS_LIMIT = "10"
OLLAMA_URL = "http://localhost:11434"
OLLAMA_MODEL = "llama3"
OLLAMA_EMBED_MODEL = "mxbai-embed-large"
VIRTUAL_ENV_DISABLE_PROMPT = "1"

[hook]
on-activate = '''
export PYTHON_DIR="$FLOX_ENV_CACHE/python"

if [ ! -d "$PYTHON_DIR" ]; then
  python -m venv "$PYTHON_DIR"
fi

(
  source "$PYTHON_DIR/bin/activate"
  pip install -q "$VERBA_INSTALL_PACKAGE"
)
'''

[profile]
common = '''
source "$PYTHON_DIR/bin/activate"
'''

[services]
weaviate.command = "weaviate --host 0.0.0.0 --port 8080 --scheme http"

ollama.command = "ollama serve"

verba.command = """
if [[ "$WEAVIATE_URL_VERBA" != "" ]]; then
  until curl -s "$WEAVIATE_URL_VERBA_full"; do
    echo "waiting for weaviate ..."
    sleep 0.1
  done
fi
"$PYTHON_DIR/bin/verba" start --port 8000 --host 0.0.0.0
"""

models.command = """
until ollama list; do
  sleep 0.1
done
ollama pull "$OLLAMA_MODEL"
ollama pull "$OLLAMA_EMBED_MODEL"
"""
