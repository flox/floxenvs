  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "claude-code": {
        "pkg-path": "flox/claude-code",
        "pkg-group": "claude-code"
      },
      "flox-ai": {
        "pkg-path": "flox/flox-ai",
        "pkg-group": "flox-ai"
      },
      "gcc": {
        "pkg-path": "gcc",
        "pkg-group": "go"
      },
      "go": {
        "pkg-path": "go",
        "pkg-group": "go"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "jq": {
        "pkg-path": "jq",
        "pkg-group": "demo-tools"
      },
      "skills-temporal-developer": {
        "pkg-path": "flox/skills-temporal-developer",
        "pkg-group": "skills-temporal-developer"
      },
      "temporal": {
        "pkg-path": "temporal",
        "pkg-group": "temporal"
      },
      "temporal-cli": {
        "pkg-path": "temporal-cli",
        "pkg-group": "temporal"
      }
    },
    "vars": {
      "TEMPORAL_HOST": "127.0.0.1",
      "TEMPORAL_PORT": "7233",
      "TEMPORAL_UI_PORT": "8233"
    },
    "hook": {
      "on-activate": "export TEMPORAL_DATA=\"$FLOX_ENV_CACHE/temporal\"\n\nif [ ! -d \"$TEMPORAL_DATA\" ]; then\n  mkdir -p \"$TEMPORAL_DATA\"\nfi\n\neval \"$(flox-ai setup-hook)\"\n\n# Point Go's caches at a writable location.\n# Default GOPATH is $HOME/go, which fails inside the\n# CI test namespace where HOME=/var/empty (read-only).\nexport GOPATH=\"$FLOX_ENV_CACHE/go\"\nexport GOMODCACHE=\"$GOPATH/pkg/mod\"\nexport GOCACHE=\"$FLOX_ENV_CACHE/go-build\"\nmkdir -p \"$GOPATH\" \"$GOCACHE\"\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Start Temporal + worker in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'Send a hello workflow:' \\\n    '  go run ./start YourName' '' \\\n    'Temporal Web UI:' \\\n    \"  http://$TEMPORAL_HOST:$TEMPORAL_UI_PORT\"\nfi\n"
    },
    "profile": {
      "bash": "eval \"$(flox-ai setup-profile-bash)\"\n",
      "zsh": "eval \"$(flox-ai setup-profile-zsh)\"\n",
      "fish": "flox-ai setup-profile-fish | source\n"
    },
    "options": {},
    "services": {
      "temporal": {
        "command": "  TEMPORAL_DATA=\"$FLOX_ENV_CACHE/temporal\"\n  mkdir -p \"$TEMPORAL_DATA\"\n  exec temporal server start-dev \\\n    --ip \"$TEMPORAL_HOST\" \\\n    --port \"$TEMPORAL_PORT\" \\\n    --ui-port \"$TEMPORAL_UI_PORT\" \\\n    --db-filename \"$TEMPORAL_DATA/temporal.db\"\n"
      },
      "worker": {
        "command": "  cd \"$FLOX_ENV_PROJECT\"\n  export GOPATH=\"$FLOX_ENV_CACHE/go\"\n  export GOMODCACHE=\"$GOPATH/pkg/mod\"\n  export GOCACHE=\"$FLOX_ENV_CACHE/go-build\"\n  mkdir -p \"$GOPATH\" \"$GOCACHE\"\n  until temporal workflow list \\\n      --address \"$TEMPORAL_HOST:$TEMPORAL_PORT\" \\\n      >/dev/null 2>&1; do\n    sleep 1\n  done\n  exec go run ./worker\n"
      }
    }
  },
