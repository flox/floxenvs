    "schema-version": "1.10.0",
    "install": {
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "temporal-cli": {
        "pkg-path": "temporal-cli",
        "pkg-group": "temporal"
      }
    },
    "vars": {
      "TEMPORAL_HOST": "127.0.0.1",
      "TEMPORAL_PORT": "7233",
      "TEMPORAL_UI_PORT": "8233"
    },
    "hook": {
      "on-activate": "export TEMPORAL_DATA=\"$FLOX_ENV_CACHE/temporal\"\n\nif [ ! -d \"$TEMPORAL_DATA\" ]; then\n  mkdir -p \"$TEMPORAL_DATA\"\nfi\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Start Temporal in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'Temporal gRPC endpoint:' \\\n    \"  $TEMPORAL_HOST:$TEMPORAL_PORT\" '' \\\n    'Temporal Web UI:' \\\n    \"  http://$TEMPORAL_HOST:$TEMPORAL_UI_PORT\" '' \\\n    'Temporal CLI:' \\\n    '  temporal operator namespace list' \\\n    '  temporal workflow list'\nfi\n"
    },
    "options": {},
    "services": {
      "temporal": {
        "command": "  TEMPORAL_DATA=\"$FLOX_ENV_CACHE/temporal\"\n  mkdir -p \"$TEMPORAL_DATA\"\n  exec temporal server start-dev \\\n    --ip \"$TEMPORAL_HOST\" \\\n    --port \"$TEMPORAL_PORT\" \\\n    --ui-port \"$TEMPORAL_UI_PORT\" \\\n    --db-filename \"$TEMPORAL_DATA/temporal.db\"\n"
      }
    }
  },
