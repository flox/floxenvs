schema-version = "1.10.0"

# Minimal Colima environment for use with [include].
#
# This provides a working Colima + Docker setup with sane
# defaults. Include it in your own manifest:
#
#   [include]
#   environments = ["flox/colima"]
#
# Then run containers with docker as usual.

[install]
colima.pkg-path = "colima"
docker.pkg-path = "docker-client"

[services]
colima.command = "colima start --foreground"

[options]
systems = ["aarch64-darwin", "aarch64-linux", "x86_64-linux"]
