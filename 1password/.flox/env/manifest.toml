schema-version = "1.10.0"

# 1Password CLI with automatic session caching.
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/1password"]
#
# Then fetch secrets in your own hook:
#
#   [hook]
#   on-activate = '''
#   export MY_API_KEY=$(op item get "MyService" \
#     --field "credential")
#   '''

[install]
op.pkg-path = "_1password"
op.pkg-group = "1password"

[hook]
on-activate = '''
# Cache 1Password session token so repeated
# activations don't prompt for auth.
export OP_CACHE="$FLOX_ENV_CACHE/1password"
mkdir -p "$OP_CACHE"

if ! op vault list >/dev/null 2>&1; then
  SESSION_FILE="$OP_CACHE/session"
  OP_TOKEN=""
  if [ -f "$SESSION_FILE" ]; then
    OP_TOKEN=$(cat "$SESSION_FILE")
  fi
  if [ -z "$OP_TOKEN" ] \
      || ! op whoami --session "$OP_TOKEN" \
           >/dev/null 2>&1; then
    OP_TOKEN=$(op signin --raw 2>&1) || true
    if op whoami --session "$OP_TOKEN" \
         >/dev/null 2>&1; then
      echo "$OP_TOKEN" > "$SESSION_FILE"
      chmod 600 "$SESSION_FILE"
    fi
  fi
  if [ -n "$OP_TOKEN" ]; then
    export OP_SESSION_TOKEN="$OP_TOKEN"
  fi
fi
'''

[profile]
common = '''
if [ -n "${OP_SESSION_TOKEN:-}" ]; then
  alias op="op --session $OP_SESSION_TOKEN"
fi
'''
