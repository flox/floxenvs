schema-version = "1.10.0"

[include]
environments = [
  { dir = "../rust" }
]

# rust-analyzer uses rust-toolchain group to resolve
# against the same compiler version as the base env.
# Extra cargo tools and gum use their own groups.

[install]
rust-analyzer.pkg-path = "rust-analyzer"
rust-analyzer.pkg-group = "rust-toolchain"

cargo-nextest.pkg-path = "cargo-nextest"
cargo-nextest.pkg-group = "cargo-tools"
cargo-watch.pkg-path = "cargo-watch"
cargo-watch.pkg-group = "cargo-tools"
cargo-semver-checks.pkg-path = "cargo-semver-checks"
cargo-semver-checks.pkg-group = "cargo-tools"

gum.pkg-path = "gum"
gum.pkg-group = "demo-tools"

[hook]
on-activate = '''
if [[ "${FLOX_ENVS_TESTING:-}" != "1" ]]; then
  gum style --border double --margin '1 2' \
    --padding '1 4' \
    'Rust development environment' '' \
    'Included tools:' \
    '  rustc, cargo    - compiler and package manager' \
    '  clippy          - linter' \
    '  rustfmt         - formatter' \
    '  rust-analyzer   - language server' \
    '  cargo-nextest   - test runner' \
    '  cargo-watch     - file watcher' '' \
    'Try the sample app:' \
    '  cargo run'
fi
'''
