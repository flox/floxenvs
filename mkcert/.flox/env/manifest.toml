schema-version = "1.10.0"

# Local TLS certificates with mkcert.
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/mkcert"]
#
# Customize domains:
#
#   [vars]
#   MKCERT_DOMAINS = "myapp.local localhost"

[install]
mkcert.pkg-path = "mkcert"
mkcert.pkg-group = "mkcert"
nssTools.pkg-path = "nssTools"
nssTools.pkg-group = "mkcert"

[vars]
# Space-separated list of domains for the certificate
MKCERT_DOMAINS = "example.com localhost 127.0.0.1 ::1"

[hook]
on-activate = '''
export CAROOT="$FLOX_ENV_CACHE/mkcert"
export NODE_EXTRA_CA_CERTS="$CAROOT/rootCA.pem"
mkdir -p "$CAROOT"

# Create local CA if it doesn't exist
if [ ! -f "$CAROOT/rootCA.pem" ]; then
  mkcert -install
fi

# Generate domain certificates if domains changed
DOMAINS_HASH="$CAROOT/domains"
if [ ! -f "$DOMAINS_HASH" ] \
    || [ "$(cat "$DOMAINS_HASH")" \
         != "$MKCERT_DOMAINS" ]; then
  echo "$MKCERT_DOMAINS" > "$DOMAINS_HASH"
  pushd "$CAROOT" >/dev/null
  mkcert \
    -cert-file=domains.pem \
    -key-file=domains-key.pem \
    -p12-file=domains.p12 \
    $(echo $MKCERT_DOMAINS)
  popd >/dev/null
fi
'''
