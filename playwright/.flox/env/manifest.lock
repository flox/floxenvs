      "playwright-mcp": {
        "command": "dir=\"${PLAYWRIGHT_DATA_DIR:-$FLOX_ENV_CACHE/playwright}\"\nexport PLAYWRIGHT_BROWSERS_PATH=\"${PLAYWRIGHT_BROWSERS_PATH:-$dir/browsers}\"\nmkdir -p \"$PLAYWRIGHT_BROWSERS_PATH\"\nexec playwright-mcp \\\n  --host \"$PLAYWRIGHT_MCP_HOST\" \\\n  --port \"$PLAYWRIGHT_MCP_PORT\" \\\n  --browser chromium\n"
      }
    }
  },
