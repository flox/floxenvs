schema-version = "1.10.0"

# Minimal Bun environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/javascript-bun"]

[install]
bun.pkg-path = "bun"
bun.pkg-group = "javascript-bun"

[vars]
NODE_ENV = "development"
BUN_AUTO_INSTALL = "true"

[hook]
on-activate = '''
export BUN_CACHE="$FLOX_ENV_CACHE/javascript-bun"
mkdir -p "$BUN_CACHE"

if [ "$BUN_AUTO_INSTALL" = "true" ] \
    && [ -f package.json ] \
    && [ -f bun.lockb ]; then
  HASH=$(cat package.json bun.lockb \
    | sha256sum | cut -d" " -f1)
  LAST=$(cat "$BUN_CACHE/packages-hash" 2>/dev/null)
  if [ "$HASH" != "$LAST" ]; then
    bun install --frozen-lockfile
    echo "$HASH" > "$BUN_CACHE/packages-hash"
  fi
fi
'''
