schema-version = "1.10.0"

# Minimal Ruby environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/ruby"]
#
# Customize Ruby version in your manifest:
#
#   [install]
#   ruby.version = "3.3.4"

[install]
ruby.pkg-path = "ruby"
ruby.pkg-group = "ruby"

[vars]
RUBY_AUTO_INSTALL = "true"

[hook]
on-activate = '''
export RUBY_CACHE="$FLOX_ENV_CACHE/ruby"
export BUNDLE_PATH="$RUBY_CACHE/vendor"
mkdir -p "$RUBY_CACHE"

if [ "$RUBY_AUTO_INSTALL" = "true" ] \
    && [ -f Gemfile ] \
    && [ -f Gemfile.lock ]; then
  HASH=$(cat Gemfile Gemfile.lock \
    | sha256sum | cut -d" " -f1)
  LAST=$(cat "$RUBY_CACHE/gems-hash" 2>/dev/null)
  if [ "$HASH" != "$LAST" ]; then
    bundle install
    echo "$HASH" > "$RUBY_CACHE/gems-hash"
  fi
fi
'''
