{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "curl": {
        "pkg-path": "curl",
        "pkg-group": "lmstudio"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "jq": {
        "pkg-path": "jq",
        "pkg-group": "lmstudio"
      },
      "lmstudio": {
        "pkg-path": "flox/lmstudio",
        "pkg-group": "lmstudio"
      }
    },
    "vars": {
      "LMS_CONTEXT_LENGTH": "131072",
      "LMS_HOST": "127.0.0.1",
      "LMS_PORT": "11234"
    },
    "hook": {
      "on-activate": "export LMS_LOG_DIR=\"$FLOX_ENV_CACHE/lmstudio/logs\"\nmkdir -p \"$LMS_LOG_DIR\"\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' --padding '1 4' \\\n    'LM Studio — local LLMs + OpenAI-compatible API' '' \\\n    'Start the API server:' \\\n    '  flox services start' '' \\\n    \"API: http://${LMS_HOST}:${LMS_PORT}/v1\" \\\n    'Health check:  lmstudio-health' '' \\\n    'Download + run a model:' \\\n    '  lms get qwen2.5-7b-instruct' \\\n    '  lms load qwen2.5-7b-instruct' '' \\\n    'Launch an agentic CLI against the local model:' \\\n    '  lms-launch claude --model qwen2.5-7b-instruct' \\\n    '  lms-launch codex  --model qwen2.5-7b-instruct'\nfi\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-linux"
      ]
    },
    "services": {
      "lmstudio": {
        "command": "export LMS_LOG_DIR=\"${LMS_LOG_DIR:-$FLOX_ENV_CACHE/lmstudio/logs}\"\nmkdir -p \"$LMS_LOG_DIR\"\nexec lms-service\n"
      }
    }
  },
