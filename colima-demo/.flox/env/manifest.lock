      "oxker": {
        "pkg-path": "oxker",
        "pkg-group": "demo-tools"
      }
    },
    "hook": {
      "on-activate": "\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' --padding '1 4' \\\n    'Start Colima in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'Once running, try:' \\\n    '  docker run hello-world' \\\n    '  docker-compose up' '' \\\n    'Container management TUIs:' \\\n    '  lazydocker    — full container/image/volume dashboard' \\\n    '  oxker         — lightweight container viewer' \\\n    '  ctop          — top-like container metrics' \\\n    '  dive <image>  — explore image layers'\nfi\n\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-linux"
      ]
    },
    "services": {
      "colima": {
        "command": "colima start --foreground"
      }
    }
  },
