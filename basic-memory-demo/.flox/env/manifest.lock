    "hook": {
      "on-activate": "# Project-scope MCP wiring. claude reads .mcp.json from CWD,\n# so basic-memory is available immediately when claude is run\n# from this dir. Idempotent — overwritten every activation.\ncat > \"$FLOX_ENV_PROJECT/.mcp.json\" <<'JSON'\n{\n  \"mcpServers\": {\n    \"basic-memory\": {\n      \"command\": \"basic-memory\",\n      \"args\": [\"mcp\"]\n    }\n  }\n}\nJSON\n\nif [ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]; then\n  gum style \\\n    --foreground 212 --border-foreground 212 \\\n    --border double --align center \\\n    --width 60 --margin \"1 2\" --padding \"1 2\" \\\n    \"Basic Memory\" \\\n    \"Local-first knowledge graph wired into Claude Code\"\n  echo \"\"\n  echo \"  basic-memory --help        — CLI overview\"\n  echo \"  basic-memory project list  — list projects\"\n  echo \"  claude                     — start Claude Code with\"\n  echo \"                                basic-memory MCP wired up\"\n  echo \"\"\nfi\n"
    },
    "options": {}
  },
