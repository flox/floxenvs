{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.11.0",
    "install": {
      "basic-memory": {
        "pkg-path": "flox/basic-memory",
        "pkg-group": "basic-memory",
        "systems": [
          "aarch64-darwin",
          "aarch64-linux",
          "x86_64-linux"
        ]
      },
      "claude-code": {
        "pkg-path": "flox/claude-code",
        "pkg-group": "claude-code"
      },
      "flox-ai": {
        "pkg-path": "flox/flox-ai",
        "pkg-group": "flox-ai"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      }
    },
    "hook": {
      "on-activate": "eval \"$(flox-ai setup-hook)\"\n\n# Project-scope MCP wiring. claude reads .mcp.json from CWD,\n# so basic-memory is available immediately when claude is run\n# from this dir. Idempotent — overwritten every activation.\ncat > \"$FLOX_ENV_PROJECT/.mcp.json\" <<'JSON'\n{\n  \"mcpServers\": {\n    \"basic-memory\": {\n      \"command\": \"basic-memory\",\n      \"args\": [\"mcp\"]\n    }\n  }\n}\nJSON\n\nif [ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]; then\n  gum style \\\n    --foreground 212 --border-foreground 212 \\\n    --border double --align center \\\n    --width 60 --margin \"1 2\" --padding \"1 2\" \\\n    \"Basic Memory\" \\\n    \"Local-first knowledge graph wired into Claude Code\"\n  echo \"\"\n  echo \"  basic-memory --help        — CLI overview\"\n  echo \"  basic-memory project list  — list projects\"\n  echo \"  claude                     — start Claude Code with\"\n  echo \"                                basic-memory MCP wired up\"\n  echo \"\"\nfi\n"
    },
    "profile": {
      "bash": "eval \"$(flox-ai setup-profile-bash)\"\n",
      "zsh": "eval \"$(flox-ai setup-profile-zsh)\"\n",
      "fish": "flox-ai setup-profile-fish | source\n"
    },
    "options": {}
  },
