  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "redis": {
        "pkg-path": "redis",
        "pkg-group": "redis"
      }
    },
    "vars": {
      "REDIS_HOST": "127.0.0.1",
      "REDIS_PORT": "16379"
    },
    "hook": {
      "on-activate": "export REDIS_DATA=\"$FLOX_ENV_CACHE/redis\"\n\nif [ ! -d \"$REDIS_DATA\" ]; then\n  mkdir -p \"$REDIS_DATA\"\nfi\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Start Redis in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'Connect to Redis:' \\\n    \"  redis-cli -h $REDIS_HOST -p $REDIS_PORT\" '' \\\n    'Connection information:' \\\n    \"  host=$REDIS_HOST\" \\\n    \"  port=$REDIS_PORT\"\nfi\n"
    },
    "options": {},
    "services": {
      "redis": {
        "command": "  REDIS_DATA=\"$FLOX_ENV_CACHE/redis\"\n  mkdir -p \"$REDIS_DATA\"\n  exec redis-server \\\n    --bind \"$REDIS_HOST\" \\\n    --port \"$REDIS_PORT\" \\\n    --dir \"$REDIS_DATA\" \\\n    --daemonize no\n"
      }
    }
  },
