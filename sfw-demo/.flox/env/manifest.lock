          "pkg-group": "demo-tools"
        },
        "pip": {
          "pkg-path": "python313Packages.pip",
          "pkg-group": "demo-tools"
        }
      },
      "hook": {
        "on-activate": "# Per-environment \"global\" install locations so package-manager installs\n# land inside $FLOX_ENV_CACHE without sudo or polluting $HOME.\nexport NPM_CONFIG_PREFIX=\"$FLOX_ENV_CACHE/npm-global\"\nmkdir -p \"$NPM_CONFIG_PREFIX/bin\"\nexport CARGO_HOME=\"$FLOX_ENV_CACHE/cargo\"\nmkdir -p \"$CARGO_HOME/bin\"\n\n# pip on nixpkgs python is marked EXTERNALLY-MANAGED (PEP 668), has\n# require-virtualenv set, and --user disabled; the one install mode it\n# allows is `pip install --target=<dir>`.\nunset PIP_CONFIG_FILE\nexport PIP_REQUIRE_VIRTUALENV=false\nexport PIP_BREAK_SYSTEM_PACKAGES=true\nexport PIP_TARGET=\"$FLOX_ENV_CACHE/pip-target\"\nmkdir -p \"$PIP_TARGET\"\n\n# Keep the sfw shim dir at the front of PATH, ahead of the per-env\n# install bins, so npm/pip/cargo still resolve to the shim and route\n# through sfw. (The included flox/sfw env also prepends it; this is\n# the belt-and-suspenders re-prepend after we add the install bins.)\nexport PATH=\"$FLOX_ENV/libexec/sfw-shims:$NPM_CONFIG_PREFIX/bin:$CARGO_HOME/bin:$PATH\"\n\nif [ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]; then\n  gum style \\\n    --border rounded --border-foreground 212 \\\n    --padding \"1 2\" --margin \"1 0\" \\\n    \"$(gum style --bold --foreground 212 'Socket Firewall demo (sfw-demo)')\" \\\n    \"\" \\\n    \"$(gum style --bold --foreground 196 'WARNING: best run inside a container or sandbox')\" \\\n    \"\" \\\n    \"$(gum style --italic 'npm, pip, and cargo route through sfw automatically.')\" \\\n    \"\" \\\n    \"$(gum style --bold 'Try a flagged package (sfw blocks it):')\" \\\n    \"  npm install lodahs\" \\\n    \"  pip install fabrice\" \\\n    \"  cargo install rustdecimal\" \\\n    \"\" \\\n    \"$(gum style --bold 'And a clean one (sfw lets it through):')\" \\\n    \"  npm install lodash\" \\\n    \"\" \\\n    \"Full walkthrough: README.md\"\nfi\n"
      },
      "options": {},
      "include": {
        "environments": [
          {
            "dir": "../sfw"
          }
        ]
      }
    },
    "include": [
      {
        "manifest": {
          "schema-version": "1.10.0",
          "install": {
            "sfw": {
              "pkg-path": "flox/sfw",
              "pkg-group": "sfw"
            }
          },
          "hook": {
            "on-activate": "# Route supported package managers on PATH through sfw transparently\n# (shims shipped with the flox/sfw package). This covers\n# `flox activate -- cmd`, scripts, and CI; [profile.common] re-prepends\n# it for interactive shells, whose PATH flox may reset to put\n# $FLOX_ENV/bin first after the hook runs.\nexport PATH=\"$FLOX_ENV/libexec/sfw-shims:$PATH\"\n"
          },
          "profile": {
            "common": "# Re-prepend the shim dir for interactive shells (see hook note above).\nexport PATH=\"$FLOX_ENV/libexec/sfw-shims:$PATH\"\n",
            "bash": "source \"$FLOX_ENV/libexec/sfw-shims/activate.bash\"\n",
            "zsh": "source \"$FLOX_ENV/libexec/sfw-shims/activate.zsh\"\n"
          },
          "options": {}
        },
        "name": "sfw",
        "descriptor": {
          "dir": "../sfw"
        }
      }
    ],
