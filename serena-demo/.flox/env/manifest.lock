    "install": {
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "nodejs": {
        "pkg-path": "nodejs_20",
        "pkg-group": "serena"
      },
      "serena": {
        "pkg-path": "flox/serena",
        "pkg-group": "serena"
      }
    },
    "vars": {
