      "SERENA_MCP_PORT": "19121",
      "SERENA_TRANSPORT": "sse"
    },
    "hook": {
      "on-activate": "dir=\"$FLOX_ENV_CACHE/serena\"\nexport SERENA_DATA_DIR=\"$dir\"\nmkdir -p \"$dir\"\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Serena demo — IDE-grade MCP toolkit for coding agents' '' \\\n    'Run the CLI:' \\\n    '  serena --help' '' \\\n    'Start the MCP server inside the sample project:' \\\n    '  cd sample-project' \\\n    '  flox services start serena-mcp' '' \\\n    \"MCP endpoint: http://${SERENA_MCP_HOST}:${SERENA_MCP_PORT}/sse\" '' \\\n    'Then point Claude Desktop / Cursor / Codex at that URL.'\nfi\n"
    },
    "options": {},
    "services": {
      "serena-mcp": {
        "command": "dir=\"${SERENA_DATA_DIR:-$FLOX_ENV_CACHE/serena}\"\nmkdir -p \"$dir\"\nexec serena start-mcp-server \\\n  --transport \"$SERENA_TRANSPORT\" \\\n  --host \"$SERENA_MCP_HOST\" \\\n  --port \"$SERENA_MCP_PORT\"\n"
      }
    }
  },
