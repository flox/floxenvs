schema-version = "1.11.0"

[include]
environments = [
  { dir = "../serena" }
]

# gum is a demo-only tool for styled terminal output.

[install]
gum.pkg-path  = "gum"
gum.pkg-group = "demo-tools"

[hook]
on-activate = '''
if [[ "${FLOX_ENVS_TESTING:-}" != "1" ]]; then
  gum style --border double --margin '1 2' \
    --padding '1 4' \
    'Serena demo — IDE-grade MCP toolkit for coding agents' '' \
    'Run the CLI:' \
    '  serena --help' '' \
    'Start the MCP server inside the sample project:' \
    '  cd sample-project' \
    '  flox services start serena-mcp' '' \
    "MCP endpoint: http://${SERENA_MCP_HOST}:${SERENA_MCP_PORT}/sse" '' \
    'Then point Claude Desktop / Cursor / Codex at that URL.'
fi
'''
