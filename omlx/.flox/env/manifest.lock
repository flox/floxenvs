{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "omlx": {
        "pkg-path": "flox/omlx",
        "pkg-group": "omlx"
      }
    },
    "vars": {
      "OMLX_HOST": "127.0.0.1",
      "OMLX_PORT": "18000"
    },
    "hook": {
      "on-activate": "export OMLX_DATA_DIR=\"$FLOX_ENV_CACHE/omlx\"\nexport OMLX_MODEL_DIR=\"${OMLX_MODEL_DIR:-$OMLX_DATA_DIR/models}\"\nmkdir -p \"$OMLX_MODEL_DIR\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin"
      ]
    },
    "services": {
      "omlx": {
        "command": "omlx_data=\"${OMLX_DATA_DIR:-$FLOX_ENV_CACHE/omlx}\"\nomlx_models=\"${OMLX_MODEL_DIR:-$omlx_data/models}\"\nmkdir -p \"$omlx_models\"\nexec omlx serve \\\n  --model-dir \"$omlx_models\" \\\n  --host \"$OMLX_HOST\" \\\n  --port \"$OMLX_PORT\"\n"
      }
    }
  },
