schema-version = "1.10.0"

# Minimal Python + uv environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/python-uv"]
#
# Customize Python version in your manifest:
#
#   [install]
#   python3.pkg-path = "python312"

[install]
python3.pkg-path = "python3"
uv.pkg-path = "uv"
uv.pkg-group = "python-tools"

[vars]
PYTHON_AUTO_INSTALL = "true"

[hook]
on-activate = '''
export UV_CACHE="$FLOX_ENV_CACHE/python-uv"
export UV_VENV="$UV_CACHE/venv"
export UV_PROJECT_ENVIRONMENT="$UV_VENV"

mkdir -p "$UV_CACHE"

CURRENT_INTERP="$(realpath "$(which python3)")"
CACHED_INTERP="$(cat "$UV_CACHE/venv.interpreter" \
  2>/dev/null || echo none)"

if [ ! -d "$UV_VENV" ] \
    || [ "$CURRENT_INTERP" != "$CACHED_INTERP" ]; then
  uv venv -p python3 "$UV_VENV"
  echo "$CURRENT_INTERP" > "$UV_CACHE/venv.interpreter"
fi

unset VIRTUAL_ENV
source "$UV_VENV/bin/activate"

if [ "$PYTHON_AUTO_INSTALL" = "true" ] \
    && [ -f uv.lock ]; then
  HASH=$(md5sum uv.lock 2>/dev/null \
    || md5 -q uv.lock)
  HASH=$(echo "$HASH" | cut -d" " -f1)
  LAST=$(cat "$UV_VENV/.deps_hash" 2>/dev/null)
  if [ "$HASH" != "$LAST" ]; then
    uv sync
    echo "$HASH" > "$UV_VENV/.deps_hash"
  fi
fi
'''

[profile]
bash = '''
source "$FLOX_ENV_CACHE/python-uv/venv/bin/activate"
'''
zsh = '''
source "$FLOX_ENV_CACHE/python-uv/venv/bin/activate"
'''
fish = '''
source "$FLOX_ENV_CACHE/python-uv/venv/bin/activate.fish"
'''
tcsh = '''
source "$FLOX_ENV_CACHE/python-uv/venv/bin/activate.csh"
'''
