schema-version = "1.10.0"

[include]
environments = [
  { dir = "../omlx" }
]

# gum is a demo-only tool for styled terminal output.

[install]
gum.pkg-path = "gum"
gum.pkg-group = "demo-tools"

[hook]
on-activate = '''
if [[ "${FLOX_ENVS_TESTING:-}" != "1" ]]; then
  gum style --border double --margin '1 2' --padding '1 4' \
    'oMLX — local LLM inference for Apple Silicon' '' \
    'Start the server:' \
    '  flox services start' '' \
    "Server:   http://${OMLX_HOST}:${OMLX_PORT}" \
    "Admin UI: http://${OMLX_HOST}:${OMLX_PORT}/admin" '' \
    'Download a small model via the admin UI, or:' \
    '  huggingface-cli download \' \
    '    mlx-community/Qwen3-1.7B-MLX-4bit \' \
    "    --local-dir \"\$OMLX_MODEL_DIR/Qwen3-1.7B-MLX-4bit\"" '' \
    'Test inference:' \
    "  curl http://${OMLX_HOST}:${OMLX_PORT}/v1/models"
fi
'''
