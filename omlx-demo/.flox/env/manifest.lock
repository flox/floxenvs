    "schema-version": "1.10.0",
    "install": {
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "omlx": {
        "pkg-path": "flox/omlx",
        "pkg-group": "omlx"
      }
    },
    "vars": {
      "OMLX_HOST": "127.0.0.1",
      "OMLX_PORT": "18000"
    },
    "hook": {
      "on-activate": "export OMLX_DATA_DIR=\"$FLOX_ENV_CACHE/omlx\"\nexport OMLX_MODEL_DIR=\"${OMLX_MODEL_DIR:-$OMLX_DATA_DIR/models}\"\nmkdir -p \"$OMLX_MODEL_DIR\"\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' --padding '1 4' \\\n    'oMLX — local LLM inference for Apple Silicon' '' \\\n    'Start the server:' \\\n    '  flox services start' '' \\\n    \"Server:   http://${OMLX_HOST}:${OMLX_PORT}\" \\\n    \"Admin UI: http://${OMLX_HOST}:${OMLX_PORT}/admin\" '' \\\n    'Download a small model via the admin UI, or:' \\\n    '  huggingface-cli download \\' \\\n    '    mlx-community/Qwen3-1.7B-MLX-4bit \\' \\\n    \"    --local-dir \\\"\\$OMLX_MODEL_DIR/Qwen3-1.7B-MLX-4bit\\\"\" '' \\\n    'Test inference:' \\\n    \"  curl http://${OMLX_HOST}:${OMLX_PORT}/v1/models\"\nfi\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin"
      ]
    },
    "services": {
      "omlx": {
        "command": "omlx_data=\"${OMLX_DATA_DIR:-$FLOX_ENV_CACHE/omlx}\"\nomlx_models=\"${OMLX_MODEL_DIR:-$omlx_data/models}\"\nmkdir -p \"$omlx_models\"\nexec omlx serve \\\n  --model-dir \"$omlx_models\" \\\n  --host \"$OMLX_HOST\" \\\n  --port \"$OMLX_PORT\"\n"
      }
    }
