schema-version = "1.10.0"

# Minimal LangChain environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/langchain"]

[install]
langgraph.pkg-path = "python312Packages.langgraph"
langgraph.pkg-group = "langchain"
langchain-ollama.pkg-path = "python312Packages.langchain-ollama"
langchain-ollama.pkg-group = "langchain"
langchain-community.pkg-path = "python312Packages.langchain-community"
langchain-community.pkg-group = "langchain"
ollama.pkg-path = "ollama"
ollama.pkg-group = "langchain"

[services]
ollama.command = "ollama serve"
