  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "claude-code": {
        "pkg-path": "flox/claude-code",
        "pkg-group": "claude-code"
      },
      "claude-managed": {
        "pkg-path": "flox/claude-managed",
        "pkg-group": "claude-managed",
        "version": "^0.4.1"
      },
      "git": {
        "pkg-path": "git",
        "pkg-group": "understand-anything-tools"
      },
      "jq": {
        "pkg-path": "jq",
        "pkg-group": "understand-anything-tools"
      },
      "nodejs": {
        "pkg-path": "nodejs_22",
        "pkg-group": "understand-anything"
      },
      "pnpm": {
        "pkg-path": "pnpm_10",
        "pkg-group": "understand-anything"
      },
      "python": {
        "pkg-path": "python3",
        "pkg-group": "understand-anything"
      }
    },
    "vars": {
      "UA_PREBUILD": "0",
      "UA_REPO_URL": "https://github.com/Lum1104/Understand-Anything.git",
      "UA_VERSION": "v2.7.3"
    },
    "hook": {
      "on-activate": "eval \"$(claude-managed setup-hook)\"\n\nua_cache=\"$FLOX_ENV_CACHE/understand-anything\"\nua_repo=\"$ua_cache/repo\"\nua_plugin=\"$ua_repo/understand-anything-plugin\"\nmkdir -p \"$ua_cache\"\n\n# Clone if missing, otherwise fast-forward to UA_VERSION.\n# Shallow clone keeps the cache small; we re-fetch the tag\n# whenever the pinned version changes.\nif [ ! -d \"$ua_repo/.git\" ]; then\n  rm -rf \"$ua_repo\"\n  git clone --quiet --depth 1 --branch \"$UA_VERSION\" \\\n    \"$UA_REPO_URL\" \"$ua_repo\" 2>/dev/null \\\n    || git clone --quiet \"$UA_REPO_URL\" \"$ua_repo\"\n  git -C \"$ua_repo\" checkout --quiet \"$UA_VERSION\" 2>/dev/null || true\nelif [ \"$(git -C \"$ua_repo\" describe --tags --exact-match \\\n            2>/dev/null)\" != \"$UA_VERSION\" ]; then\n  git -C \"$ua_repo\" fetch --quiet --tags --depth 1 \\\n    origin \"refs/tags/$UA_VERSION:refs/tags/$UA_VERSION\" \\\n    2>/dev/null || git -C \"$ua_repo\" fetch --quiet --tags\n  git -C \"$ua_repo\" checkout --quiet \"$UA_VERSION\"\nfi\n\n# Expose the plugin root at the path SKILL.md falls back to\n# when CLAUDE_PLUGIN_ROOT is unset (e.g. when scripts are\n# invoked outside Claude Code's hook context). Leave any\n# pre-existing user link alone.\nif [ ! -e \"$HOME/.understand-anything-plugin\" ]; then\n  ln -s \"$ua_plugin\" \"$HOME/.understand-anything-plugin\"\nfi\n\n# claude-managed `plugins add` reads installed_plugins.json\n# from the plugin dir and merges it into the config's\n# trusted-plugins list. Without it Claude Code lists the\n# plugin but treats it as untrusted, suppressing hook\n# execution. Generate it from the pinned commit each time\n# so version + sha stay in sync with the checked-out tree.\nua_version=\"$(git -C \"$ua_repo\" describe --tags \\\n  --always 2>/dev/null | sed 's/^v//')\"\nua_sha=\"$(git -C \"$ua_repo\" rev-parse HEAD 2>/dev/null)\"\ncat > \"$ua_plugin/installed_plugins.json\" <<JSON\n{\n  \"plugins\": {\n    \"understand-anything@flox\": [\n      {\n        \"installPath\": \"\",\n        \"scope\": \"project\",\n        \"version\": \"$ua_version\",\n        \"gitCommitSha\": \"$ua_sha\"\n      }\n    ]\n  },\n  \"version\": 2\n}\nJSON\n\n# Optional eager build. The /understand skill itself runs\n# the same commands the first time it is invoked, so this\n# is a UX nicety, not a correctness requirement.\nif [ \"$UA_PREBUILD\" = \"1\" ] \\\n   && [ ! -f \"$ua_plugin/packages/core/dist/index.js\" ]; then\n  (\n    cd \"$ua_plugin\" \\\n      && pnpm install --frozen-lockfile >/dev/null 2>&1 \\\n      && pnpm --filter @understand-anything/core build \\\n           >/dev/null 2>&1\n  ) || echo \"understand-anything: pre-build failed; /understand will retry on first use\"\nfi\n\n# Register the plugin with claude-managed. The flox/claude\n# hook above already ran `plugins clean`, so this just adds\n# a symlink under $CLAUDE_CONFIG_DIR/plugins/ that the\n# generated `claude` wrapper picks up at exec time via\n# --plugin-dir. Idempotent: re-running it on a subsequent\n# activation is harmless.\nif command -v claude-managed >/dev/null 2>&1; then\n  cmd_dir=\"${CLAUDE_CONFIG_DIR:-$FLOX_ENV_PROJECT/.claude-managed}\"\n  claude-managed --config-dir \"$cmd_dir\" plugins add \\\n    \"$ua_plugin\" >/dev/null 2>&1 || true\nfi\n"
    },
    "profile": {
      "bash": "eval \"$(claude-managed setup-profile-bash)\"\n",
      "zsh": "eval \"$(claude-managed setup-profile-zsh)\"\n",
      "fish": "claude-managed setup-profile-fish | source\n"
    },
    "options": {}
  },
