  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "mysql": {
        "pkg-path": "mysql84",
        "pkg-group": "mysql"
      }
    },
    "vars": {
      "MYSQL_DATABASE": "mydb",
      "MYSQL_HOST": "127.0.0.1",
      "MYSQL_PORT": "13306",
      "MYSQL_PWD": "mypass",
      "MYSQL_USER": ""
    },
    "hook": {
      "on-activate": "export MYSQL_HOME=\"$FLOX_ENV_CACHE/mysql\"\nexport MYSQL_CONFIG=\"$MYSQL_HOME/my.cnf\"\nexport MYSQL_DATADIR=\"$MYSQL_HOME/data\"\nexport MYSQL_TMPDIR=\"$MYSQL_HOME/tmp\"\nexport MYSQL_SOCKET=\"$MYSQL_HOME/mysql.sock\"\nexport MYSQL_TCP_PORT=\"$MYSQL_PORT\"\nINIT_LOG=\"$MYSQL_HOME/init.log\"\n\nif [ -z \"$MYSQL_USER\" ]; then\n  export MYSQL_USER=\"$USER\"\nfi\n\nMYSQL_BASEDIR=$(realpath -s \\\n  \"$(dirname $(realpath $(which mysqld)))/..\")\n\ninit_fail() {\n  echo \"ERROR: MySQL initialization failed.\" >&2\n  if [ -f \"$INIT_LOG\" ]; then\n    echo \"--- init.log ---\" >&2\n    cat \"$INIT_LOG\" >&2\n    echo \"--- end init.log ---\" >&2\n  fi\n  exit 1\n}\n\nif [ ! -d \"$MYSQL_DATADIR\" ]; then\n  SAVED_MYSQL_PWD=\"$MYSQL_PWD\"\n  SAVED_MYSQL_HOST=\"$MYSQL_HOST\"\n\n  mkdir -p \"$MYSQL_DATADIR\" \"$MYSQL_TMPDIR\"\n\n  cat > \"$MYSQL_CONFIG\" <<EOF\n[client]\nport   = $MYSQL_TCP_PORT\nsocket = $MYSQL_SOCKET\n\n[mysqld]\nuser     = $USER\nsocket   = $MYSQL_SOCKET\nport     = $MYSQL_TCP_PORT\nbasedir  = $MYSQL_BASEDIR\ndatadir  = $MYSQL_DATADIR\ntmpdir   = $MYSQL_TMPDIR\nbind-address = $MYSQL_HOST\nskip-external-locking\nmysqlx = OFF\nEOF\n\n  # Unset MYSQL_PWD and MYSQL_HOST during init.\n  # Root has no password after --initialize-insecure, and\n  # MYSQL_HOST causes the client to try TCP instead of\n  # the socket (temp server runs with --skip-networking).\n  unset MYSQL_PWD\n  unset MYSQL_HOST\n\n  echo \"Initializing MySQL database...\" >> \"$INIT_LOG\"\n  mysqld \\\n    --defaults-file=\"$MYSQL_CONFIG\" \\\n    --default-time-zone=SYSTEM \\\n    --initialize-insecure >> \"$INIT_LOG\" 2>&1 \\\n    || init_fail\n\n  echo \"Starting temporary MySQL server...\" >> \"$INIT_LOG\"\n  mysqld --defaults-file=\"$MYSQL_CONFIG\" \\\n    --skip-networking >> \"$INIT_LOG\" 2>&1 &\n  TMPID=$!\n\n  MAX_ATTEMPTS=15\n  while [ \"$MAX_ATTEMPTS\" -gt 0 ]; do\n    if mysqladmin --socket=\"$MYSQL_SOCKET\" \\\n        ping -u root 2>/dev/null | \\\n        grep -q alive; then\n      break\n    fi\n    sleep 1\n    MAX_ATTEMPTS=$((MAX_ATTEMPTS - 1))\n  done\n\n  if [ \"$MAX_ATTEMPTS\" -eq 0 ]; then\n    echo \"Temp server did not start\" >> \"$INIT_LOG\"\n    kill \"$TMPID\" 2>/dev/null || true\n    init_fail\n  fi\n\n  echo \"Creating database and user...\" >> \"$INIT_LOG\"\n  mysql --socket=\"$MYSQL_SOCKET\" -u root \\\n    -e \"CREATE DATABASE IF NOT EXISTS \\`$MYSQL_DATABASE\\`;\" \\\n    >> \"$INIT_LOG\" 2>&1 || init_fail\n\n  mysql --socket=\"$MYSQL_SOCKET\" -u root -e \\\n    \"CREATE USER IF NOT EXISTS '$MYSQL_USER'@'localhost' IDENTIFIED BY '$SAVED_MYSQL_PWD'; GRANT ALL PRIVILEGES ON *.* TO '$MYSQL_USER'@'localhost' WITH GRANT OPTION; FLUSH PRIVILEGES;\" \\\n    >> \"$INIT_LOG\" 2>&1 || init_fail\n\n  mysqladmin --socket=\"$MYSQL_SOCKET\" \\\n    shutdown -u root >> \"$INIT_LOG\" 2>&1\n  wait \"$TMPID\" 2>/dev/null || true\n\n  # Restore MYSQL_PWD and MYSQL_HOST for normal operation\n  export MYSQL_PWD=\"$SAVED_MYSQL_PWD\"\n  export MYSQL_HOST=\"$SAVED_MYSQL_HOST\"\n\n  rm -f \"$INIT_LOG\"\n  echo \"MySQL initialized successfully.\"\nfi\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Start MySQL in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'Connect to MySQL:' \\\n    \"  mysql -h $MYSQL_HOST -P $MYSQL_PORT -u $MYSQL_USER -p\" '' \\\n    'Connection information:' \\\n    \"  host=$MYSQL_HOST\" \\\n    \"  port=$MYSQL_PORT\" \\\n    \"  database=$MYSQL_DATABASE\" \\\n    \"  user=$MYSQL_USER\"\nfi\n"
    },
    "options": {},
    "services": {
      "mysql": {
        "command": "  exec mysqld \\\n    --defaults-file=\"$MYSQL_HOME/my.cnf\"\n"
      }
    }
  },
