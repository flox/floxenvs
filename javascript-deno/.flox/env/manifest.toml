schema-version = "1.10.0"

# Minimal Deno environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/javascript-deno"]

[install]
deno.pkg-path = "deno"
deno.pkg-group = "javascript-deno"

[vars]
NODE_ENV = "development"
DENO_AUTO_INSTALL = "true"

[hook]
on-activate = '''
export DENO_CACHE="$FLOX_ENV_CACHE/javascript-deno"
mkdir -p "$DENO_CACHE"

if [ "$DENO_AUTO_INSTALL" = "true" ] \
    && [ -f deno.json ] \
    && [ -f deno.lock ]; then
  HASH=$(cat deno.json deno.lock \
    | sha256sum | cut -d" " -f1)
  LAST=$(cat "$DENO_CACHE/packages-hash" 2>/dev/null)
  if [ "$HASH" != "$LAST" ]; then
    deno install
    echo "$HASH" > "$DENO_CACHE/packages-hash"
  fi
fi
'''
