      "undocker": {
        "pkg-path": "undocker",
        "pkg-group": "demo-tools"
      }
    },
    "hook": {
      "on-activate": "# Ensure containers policy exists on Linux\nif [ \"$(uname -s)\" = \"Linux\" ]; then\n  POLICY=\"$HOME/.config/containers/policy.json\"\n  if [ ! -f \"$POLICY\" ]; then\n    mkdir -p \"$(dirname \"$POLICY\")\"\n    printf '%s\\n' \\\n      '{\"default\": [{\"type\": \"insecureAcceptAnything\"}]}' \\\n      > \"$POLICY\"\n  fi\nfi\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Podman environment ready!' '' \\\n    'podman version:' \\\n    \"  $(podman --version)\" '' \\\n    'Commands:' \\\n    '  podman run <image>     Run a container' \\\n    '  podman-compose up      Start services' \\\n    '  podman-tui             Terminal UI' \\\n    '  undocker <image>       Extract image'\nfi\n"
    },
    "profile": {
      "common": "if [ \"$(uname -s)\" = 'Darwin' ] \\\n    && [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  trap 'gum confirm \"Stop virtual machine?\" \\\n    && gum spin --spinner dot \\\n         --title \"Stopping machine...\" \\\n         -- podman machine stop \\\n    ; echo \"Podman machine stopped\"' EXIT\nfi\n"
    },
    "options": {}
  },
