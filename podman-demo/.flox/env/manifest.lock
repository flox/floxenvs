  "compose": {
    "composer": {
      "schema-version": "1.10.0",
      "install": {
        "gum": {
          "pkg-path": "gum",
          "pkg-group": "demo-tools"
        },
        "podman-tui": {
          "pkg-path": "podman-tui",
          "pkg-group": "demo-tools"
        },
        "undocker": {
          "pkg-path": "undocker",
          "pkg-group": "demo-tools"
        }
      },
      "hook": {
        "on-activate": "if [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Podman environment ready!' '' \\\n    'podman version:' \\\n    \"  $(podman --version)\" '' \\\n    'Commands:' \\\n    '  podman run <image>     Run a container' \\\n    '  podman-compose up      Start services' \\\n    '  podman-tui             Terminal UI' \\\n    '  undocker <image>       Extract image'\nfi\n"
      },
      "profile": {
        "common": "if [ \"$(uname -s)\" = 'Darwin' ] \\\n    && [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  trap 'gum confirm \"Stop virtual machine?\" \\\n    && gum spin --spinner dot \\\n         --title \"Stopping machine...\" \\\n         -- podman machine stop \\\n    ; echo \"Podman machine stopped\"' EXIT\nfi\n"
      },
      "options": {},
      "include": {
        "environments": [
          {
            "dir": "../podman"
          }
        ]
      }
    },
    "include": [
      {
        "manifest": {
          "schema-version": "1.10.0",
