            "on-activate": "# Ensure containers policy exists on Linux\nif [ \"$(uname -s)\" = \"Linux\" ]; then\n  POLICY=\"$HOME/.config/containers/policy.json\"\n  if [ ! -f \"$POLICY\" ]; then\n    mkdir -p \"$(dirname \"$POLICY\")\"\n    printf '%s\\n' \\\n      '{\"default\": [{\"type\": \"insecureAcceptAnything\"}]}' \\\n      > \"$POLICY\"\n  fi\nfi\n"
