    "schema-version": "1.10.0",
    "install": {
      "claude-code": {
        "pkg-path": "flox/claude-code",
        "pkg-group": "claude-code"
      },
      "flox-ai": {
        "pkg-path": "flox/flox-ai",
        "pkg-group": "flox-ai"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "nodejs": {
        "pkg-path": "nodejs_22",
        "pkg-group": "remotion"
      },
      "skills-remotion": {
        "pkg-path": "flox/skills-remotion",
        "pkg-group": "skills-remotion"
      }
    },
    "hook": {
      "on-activate": "eval \"$(flox-ai setup-hook)\"\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Remotion + Claude Code' '' \\\n    'Scaffold a new video project:' \\\n    '  npx create-video@latest --yes --blank --no-tailwind my-video' '' \\\n    'Inside a Remotion project:' \\\n    '  npx remotion studio       Open the visual editor' \\\n    '  npx remotion render       Render to MP4' \\\n    '  npx remotion ffmpeg ...   Bundled ffmpeg' '' \\\n    'Ask Claude (skill auto-loads on Remotion code):' \\\n    '  claude' '' \\\n    \"Node: $(node --version)\"\nfi\n"
    },
    "profile": {
      "bash": "eval \"$(flox-ai setup-profile-bash)\"\n",
      "zsh": "eval \"$(flox-ai setup-profile-zsh)\"\n",
      "fish": "flox-ai setup-profile-fish | source\n"
    },
    "options": {}
  },
