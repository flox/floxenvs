schema-version = "1.10.0"

# Minimal Redis environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/redis"]
#
# Customize vars in your manifest to override defaults:
#
#   [vars]
#   REDIS_PORT = "6379"

[install]
redis.pkg-path = "redis"
redis.pkg-group = "redis"

[vars]
REDIS_HOST = "127.0.0.1"
REDIS_PORT = "16379"

[hook]
on-activate = '''
export REDIS_DATA="$FLOX_ENV_CACHE/redis"

if [ ! -d "$REDIS_DATA" ]; then
  mkdir -p "$REDIS_DATA"
fi
'''

[services]
redis.command = '''
  REDIS_DATA="$FLOX_ENV_CACHE/redis"
  mkdir -p "$REDIS_DATA"
  exec redis-server \
    --bind "$REDIS_HOST" \
    --port "$REDIS_PORT" \
    --dir "$REDIS_DATA" \
    --daemonize no
'''
