  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "bazel": {
        "pkg-path": "flox/bazel",
        "pkg-group": "bazel"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      }
    },
    "hook": {
      "on-activate": "export BAZEL_CACHE_DIR=\"$FLOX_ENV_CACHE/bazel\"\nmkdir -p \"$BAZEL_CACHE_DIR\"\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Bazel development environment' '' \\\n    'Try the sample build:' \\\n    '  flox build hello' \\\n    '  ./result-hello/bin/hello'\nfi\n"
    },
    "options": {},
    "build": {
      "hello": {
        "command": "set -eo pipefail\n\n# Keep Bazel's output tree inside the flox cache so repeated\n# builds reuse the action cache instead of cluttering $HOME.\nexport BAZEL_CACHE_DIR=\"${BAZEL_CACHE_DIR:-$FLOX_ENV_CACHE/bazel}\"\nmkdir -p \"$BAZEL_CACHE_DIR\"\n\nbazel --output_user_root=\"$BAZEL_CACHE_DIR\" \\\n  build //:hello --repo_contents_cache=\n\nmkdir -p \"$out/bin\"\ncp -L bazel-bin/hello_/hello \"$out/bin/hello\"\nchmod +x \"$out/bin/hello\"\n",
        "version": "0.0.1",
        "description": "Sample Go binary built with Bazel + rules_go"
      }
    }
  },
