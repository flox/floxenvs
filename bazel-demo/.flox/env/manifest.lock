    "options": {},
    "build": {
      "hello": {
        "command": "set -eo pipefail\n\nbazel build //:hello\n\nmkdir -p \"$out/bin\"\ncp -L bazel-bin/hello_/hello \"$out/bin/hello\"\nchmod +x \"$out/bin/hello\"\n",
        "version": "0.0.1",
        "description": "Sample Go binary built with Bazel + rules_go"
      }
    }
