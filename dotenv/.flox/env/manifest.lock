{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "vars": {
      "DOTENV_FILE": ".env"
    },
    "hook": {
      "on-activate": "if [ -f \"$DOTENV_FILE\" ]; then\n  set -o allexport\n  source \"$DOTENV_FILE\"\n  set +o allexport\nfi\n"
    },
    "options": {}
  },
  "packages": []
}
