schema-version = "1.10.0"

# Load .env files automatically on activation.
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/dotenv"]
#
# Customize the file path:
#
#   [vars]
#   DOTENV_FILE = ".env.local"

[vars]
DOTENV_FILE = ".env"

[hook]
on-activate = '''
if [ -f "$DOTENV_FILE" ]; then
  set -o allexport
  source "$DOTENV_FILE"
  set +o allexport
fi
'''
