schema-version = "1.11.0"

[include]
environments = [{ dir = "../finceptterminal" }]

# gum is a demo-only tool for styled terminal output.

[install]
gum.pkg-path = "gum"
gum.pkg-group = "demo-tools"

[hook]
on-activate = '''
if [[ "${FLOX_ENVS_TESTING:-}" != "1" ]]; then
  gum style --border double --margin '1 2' --padding '1 4' \
    --foreground 212 --border-foreground 212 \
    'Fincept Terminal — native Qt financial-analytics desktop' '' \
    'Launch the GUI:' \
    '  finceptterminal' '' \
    "Data dir: ${XDG_DATA_HOME}" \
    "Python:   ${FINCEPT_INSTALL_DIR}/venv-numpy2/bin/python3" '' \
    'First launch goes straight to the main window — the Python' \
    'venv is pre-built into the Nix store; no UV bootstrap runs.' '' \
    'Commercial use requires a separate license from Fincept Corp:' \
    'github.com/Fincept-Corporation/FinceptTerminal/blob/main/docs/COMMERCIAL_LICENSE.md'
fi
'''
