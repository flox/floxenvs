schema-version = "1.10.0"

# Minimal review-skills environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = [{ remote = "flox/review-skills" }]
#
# Provides `review-skills <lint|review|audit> <path>` plus the
# underlying tools (skill-tools, claudelint, cclint, skill-validator,
# agnix, skillcheck, skillspector) and promptfoo for optional
# behavioral evals:
#
#   review-skills lint   <path>   # deterministic structural gate
#   review-skills review <path>   # quality-only score
#   review-skills audit  <path>   # full 0-100 metrics.json
#
# Add --json for machine output, --with-behavioral to include a
# promptfoo behavioral eval (needs an LLM provider API key).

[install]
# The runner — detects skill vs agent, runs the per-kind ensemble,
# fuses into quality/reliability/security/impact, emits a 0-100 score.
review-skills.pkg-path = "flox/review-skills"
review-skills.pkg-group = "review-skills"

# The scoring tools the runner calls by bare name (quality + security).
skill-tools.pkg-path = "flox/skill-tools"
skill-tools.pkg-group = "review-skills"
claudelint.pkg-path = "flox/claudelint"
claudelint.pkg-group = "review-skills"
cclint.pkg-path = "flox/cclint"
cclint.pkg-group = "review-skills"
skill-validator.pkg-path = "flox/skill-validator"
skill-validator.pkg-group = "review-skills"
agnix.pkg-path = "flox/agnix"
agnix.pkg-group = "review-skills"
skillcheck.pkg-path = "flox/skillcheck"
skillcheck.pkg-group = "review-skills"
# NVIDIA SkillSpector — static security scan (run --no-llm by the runner).
# It ships a bundled `bin/python`; lower its priority so python313 (needed
# by the quick_validate gate) wins that slot. The `skillspector` binary is
# a self-contained wrapper, so it still works at the lower priority.
skillspector.pkg-path = "flox/skillspector"
skillspector.pkg-group = "review-skills"
skillspector.priority = 6

# Optional behavioral stage for `audit --with-behavioral` (nixpkgs).
promptfoo.pkg-path = "promptfoo"
promptfoo.pkg-group = "review-skills"

# The skill gate prefers the vendored skill-creator quick_validate.py
# (full frontmatter/structure check) over the runner's inline fallback.
# python3 + PyYAML in the same group make `import yaml` resolve so the
# validator can run; if either is unavailable the runner falls back to
# its dependency-free inline frontmatter check.
skills-skill-creator.pkg-path = "flox/skills-skill-creator"
skills-skill-creator.pkg-group = "review-skills"
python313.pkg-path = "python313"
python313.pkg-group = "review-skills"
pyyaml.pkg-path = "python313Packages.pyyaml"
pyyaml.pkg-group = "review-skills"

[hook]
on-activate = '''
# Point the skill gate at the vendored quick_validate.py so it uses the
# full validator instead of the inline fallback. Silent per minimal-env
# rules; the runner ignores the path if the file or PyYAML is missing.
export REVIEW_SKILLS_QUICK_VALIDATE="$FLOX_ENV/share/claude-code/skills/skill-creator/scripts/quick_validate.py"
'''
