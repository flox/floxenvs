        "pkg-group": "firecrawl"
      }
    },
    "vars": {
      "FIRECRAWL_API_KEY": ""
    },
    "hook": {
      "on-activate": "eval \"$(flox-ai setup-hook)\"\n\ndir=\"$FLOX_ENV_CACHE/firecrawl\"\nmkdir -p \"$dir\"\nexport FIRECRAWL_DATA_DIR=\"$dir\"\n\n# Persist the key across activations: if it isn't set in the\n# environment but was saved to the cache before, load it back.\nkey_file=\"$dir/api-key\"\nif [ -z \"${FIRECRAWL_API_KEY:-}\" ] && [ -f \"$key_file\" ]; then\n  FIRECRAWL_API_KEY=\"$(cat \"$key_file\")\"\n  export FIRECRAWL_API_KEY\nfi\n"
    },
    "profile": {
      "bash": "eval \"$(flox-ai setup-profile-bash)\"\n",
      "zsh": "eval \"$(flox-ai setup-profile-zsh)\"\n",
      "fish": "flox-ai setup-profile-fish | source\n"
    },
    "options": {}
  },
