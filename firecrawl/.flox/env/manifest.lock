      "priority": 5
    }
  ],
  "compose": {
    "composer": {
      "schema-version": "1.10.0",
      "install": {
        "firecrawl-cli": {
          "pkg-path": "flox/firecrawl-cli",
          "pkg-group": "firecrawl"
        },
        "skills-firecrawl-cli": {
          "pkg-path": "flox/skills-firecrawl-cli",
          "pkg-group": "firecrawl"
        }
      },
      "vars": {
        "FIRECRAWL_API_KEY": ""
      },
      "hook": {
        "on-activate": "dir=\"$FLOX_ENV_CACHE/firecrawl\"\nmkdir -p \"$dir\"\nexport FIRECRAWL_DATA_DIR=\"$dir\"\n\n# Persist the key across activations: if it isn't set in the\n# environment but was saved to the cache before, load it back.\nkey_file=\"$dir/api-key\"\nif [ -z \"${FIRECRAWL_API_KEY:-}\" ] && [ -f \"$key_file\" ]; then\n  FIRECRAWL_API_KEY=\"$(cat \"$key_file\")\"\n  export FIRECRAWL_API_KEY\nfi\n"
      },
      "options": {},
      "include": {
        "environments": [
          {
            "dir": "../claude"
          }
        ]
      }
    },
    "include": [
      {
        "manifest": {
          "schema-version": "1.10.0",
          "install": {
            "claude-code": {
              "pkg-path": "flox/claude-code",
              "pkg-group": "claude-code"
            },
            "claude-managed": {
              "pkg-path": "flox/claude-managed",
              "pkg-group": "claude-managed",
              "version": "^0.4.1"
            }
          },
          "hook": {
            "on-activate": "eval \"$(claude-managed setup-hook)\"\n"
          },
          "profile": {
            "bash": "eval \"$(claude-managed setup-profile-bash)\"\n",
            "zsh": "eval \"$(claude-managed setup-profile-zsh)\"\n",
            "fish": "claude-managed setup-profile-fish | source\n"
          },
          "options": {}
        },
        "name": "claude",
        "descriptor": {
          "dir": "../claude"
        }
      }
    ],
    "warnings": []
  }
}
