kind: env
name: claude
title: Claude Code
publisher: flox
tagline: >
  Claude Code CLI with managed config assembly and MCP fragments.
summary:
  - "One-line include — claude CLI ready in any Flox env"
  - "Auto-assembles settings, MCP servers, and instructions"
  - "Isolated mode for full sandboxing from ~/.claude/"
  - "Works with API key or interactive auth"
category: ai
ai_role: agent
tags: [agent, cli, anthropic, mcp]
stack: [nodejs, typescript]
featured: true
combines_well_with:
  - pkg:graphify
  - env:playwright
  - pkg:vibe-kanban
status: stable
license: MIT
upstream:
  name: Claude Code
  url: https://github.com/anthropics/claude-code
  license: Apache-2.0
maintainer: "@rok"
install:
  include: |
    [include]
    environments = ["flox/claude"]
  activate: |
    flox activate -r flox/claude
  docker: |
    docker run -it ghcr.io/flox/floxenvs/claude-latest
recipes:
  - name: claude-demo
    title: Quick start
    start_services: false
    features:
      - "Managed config assembly with example fragments"
      - "MCP server setup in 10 lines"
links:
  source: https://github.com/flox/floxenvs/tree/main/claude
  floxhub: https://hub.flox.dev/flox/claude
  docker: https://github.com/flox/floxenvs/pkgs/container/floxenvs/claude-latest
  issues: https://github.com/flox/floxenvs/issues?q=label%3Aclaude
