    "hook": {
      "on-activate": "# Point the skill gate at the vendored quick_validate.py so it uses the\n# full validator instead of the inline fallback. Silent per minimal-env\n# rules; the runner ignores the path if the file or PyYAML is missing.\nexport SKILLS_REVIEW_QUICK_VALIDATE=\"$FLOX_ENV/share/claude-code/skills/skill-creator/scripts/quick_validate.py\"\n\nif [ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]; then\n  gum style \\\n    --foreground 212 --border-foreground 212 \\\n    --border double --align center \\\n    --width 50 --margin \"1 2\" --padding \"1 2\" \\\n    \"Skills Review\" \"Unified 0-100 score for skills & agents.\"\n  echo \"\"\n  echo \"  skills-review audit samples/good-skill   — score a clean skill\"\n  echo \"  skills-review audit samples/bad-skill    — score a broken skill\"\n  echo \"  skills-review audit samples/good-agent.md — score an agent\"\n  echo \"  skills-review audit --json <path>        — machine output\"\n  echo \"  skills-review lint <path>                — deterministic gate\"\n  echo \"\"\nfi\n"
    },
    "options": {}
  },
