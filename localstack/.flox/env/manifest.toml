schema-version = "1.10.0"

# Minimal LocalStack environment for use with [include].
#
# Include it in your own manifest:
#
#   [include]
#   environments = ["flox/localstack"]

[install]
localstack.pkg-path = "localstack"
localstack.pkg-group = "localstack"
python3.pkg-path = "python3"
python3.pkg-group = "localstack"
awscli2.pkg-path = "awscli2"
awscli2.pkg-group = "localstack"
kubectl.pkg-path = "kubectl"
kubectl.pkg-group = "localstack-tools"

[services]
localstack.command = "localstack start -d"
localstack.is-daemon = true
localstack.shutdown.command = "localstack stop"

[hook]
on-activate = '''
export LOCALSTACK_CACHE="$FLOX_ENV_CACHE/localstack"
export PYTHON_DIR="$LOCALSTACK_CACHE/venv"

if [ ! -d "$PYTHON_DIR" ]; then
  python -m venv "$PYTHON_DIR" 2>/dev/null
fi

(
  source "$PYTHON_DIR/bin/activate"
  pip install -q awscli-local
)
'''

[profile]
bash = '''
source "$PYTHON_DIR/bin/activate"
'''
fish = '''
source "$PYTHON_DIR/bin/activate.fish"
'''
tcsh = '''
source "$PYTHON_DIR/bin/activate.csh"
'''
zsh = '''
source "$PYTHON_DIR/bin/activate"
'''
