      "on-activate": "export LOCALSTACK_CACHE=\"$FLOX_ENV_CACHE/localstack\"\nexport PYTHON_DIR=\"$LOCALSTACK_CACHE/venv\"\n\nif [ ! -d \"$PYTHON_DIR\" ]; then\n  python -m venv \"$PYTHON_DIR\" 2>/dev/null\nfi\n\n(\n  source \"$PYTHON_DIR/bin/activate\"\n  pip install -q awscli-local\n)\n"
    },
    "profile": {
      "bash": "source \"$PYTHON_DIR/bin/activate\"\n",
      "zsh": "source \"$PYTHON_DIR/bin/activate\"\n",
      "fish": "source \"$PYTHON_DIR/bin/activate.fish\"\n",
      "tcsh": "source \"$PYTHON_DIR/bin/activate.csh\"\n"
    },
    "options": {},
    "services": {
      "localstack": {
        "command": "localstack start -d",
        "is-daemon": true,
        "shutdown": {
          "command": "localstack stop"
        }
      }
    }
