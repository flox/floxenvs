# fnox demo configuration — showcases multiple ways to retrieve
# secrets. The `DEMO_*` keys all resolve out of the box; the
# commented-out blocks below show how to wire up real providers
# (1Password, Vault, AWS, keychain, custom scripts, ...).
#
# To pull every demo secret into your shell:
#   eval "$(fnox export --shell bash)"
# Or wrap a command:
#   fnox exec -- env | grep ^DEMO_

# ─── PROVIDERS ──────────────────────────────────────────────────

# 1. age — encryption keys, ciphertext lives in this file.
#    Anyone can read the encrypted value; only the holder of the
#    private key can decrypt. Safe to commit.
[providers.demo-age]
type = "age"
recipients = ["age1dstzhpm8gqpjrqxnr00djx4wswayaev9sdp7zp9yt0mqq78ec9ysjfdd6u"]

# 2. Examples — uncomment one (and configure it) to add a real
#    provider. fnox will then store the encrypted value or the
#    reference in this file.
#
# [providers.work-1p]
# type = "1password"
# # Then: fnox set GITHUB_TOKEN "op://Personal/GitHub/token" \
# #         --provider work-1p
#
# [providers.staging-vault]
# type = "vault"
# address = "https://vault.example.com:8200"
# # Then: fnox set DB_PASSWORD "secret/data/staging/db#password" \
# #         --provider staging-vault
#
# [providers.mac-keychain]
# type = "keychain"
# # Then: fnox set GHCR_PAT "<value>" --provider mac-keychain
#
# [providers.local-pass]
# type = "password-store"
# # Reads from `pass show <key>` — uses your existing
# # GPG-encrypted ~/.password-store/.

# ─── SECRETS ────────────────────────────────────────────────────

# 1. Encrypted in git via age. fnox set wrote this; only holders
#    of the age private key (FNOX_AGE_KEY) can decrypt.
[secrets.DEMO_DATABASE_URL]
provider = "demo-age"
value = """\
