# 2. Plain default — non-secret config that lives alongside.
[secrets.DEMO_APP_PORT]
default = "3000"

[secrets.DEMO_NODE_ENV]
default = "development"

# ─── LEASES ────────────────────────────────────────────────────
#
# Leases are short-lived credentials minted on demand. The
# `command` backend runs a script and parses JSON back from it —
# useful for any system fnox doesn't natively integrate with.

# Demo: emits a fresh "credential" every time you run
#   fnox lease create greeting
# It just shells out to a script that prints JSON. Replace with
# your own script that hits an internal API, runs `op item get`,
# calls `gh auth token`, signs a JWT, etc.
[leases.greeting]
type = "command"
create_command = "$FLOX_ENV_PROJECT/scripts/mint-greeting.sh"
duration = "5m"

# Real-world examples — uncomment and adapt:
#
# [leases.aws-readonly]
# type = "aws-sts"
# role_arn = "arn:aws:iam::1234567890:role/readonly"
# duration = "1h"
#
# [leases.gh-app]
# type = "github-app"
# app_id = "123456"
# installation_id = "78901234"
# private_key_path = "~/.config/fnox/github-app.pem"
# duration = "1h"
#
# [leases.vault-db]
# type = "vault"
# path = "database/creds/readonly"
