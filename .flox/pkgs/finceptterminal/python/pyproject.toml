[tool.uv]
# Resolve and lock against the actual requirements list. Native
# extension packages (numpy, pandas, scipy, vnpy, pyaudio,
# curl_cffi) build from sdist when no manylinux wheel is available
# for the target architecture; uv2nix surfaces the build through
# Nix so we can inject the needed C libraries.
#
# Restrict resolution to the platforms Flox actually targets for
# FinceptTerminal — aarch64-darwin and x86_64-linux. Upstream's
# requirements file carries a legacy Intel-mac branch
# (torch==2.2.2 on platform_machine=="x86_64" and sys_platform==
# "darwin") that conflicts with stable-baselines3>=2.7.0 (which
# requires torch>=2.3). We don't ship Intel-Mac binaries, so we
# exclude that split from the resolver.
environments = [
  "sys_platform == 'darwin' and platform_machine == 'arm64'",
  "sys_platform == 'linux' and platform_machine == 'x86_64'",
]
