    [install]
    uv2nix.pkg-path = "flox/uv2nix"
    uv2nix.publisher = "flox"
links:
  source: >-
    https://github.com/flox/floxenvs/tree/main/.flox/pkgs/uv2nix
  floxhub: https://hub.flox.dev/flox/uv2nix
