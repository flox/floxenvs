  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "cassandra_4": {
        "pkg-path": "cassandra_4",
        "pkg-group": "cassandra"
      },
      "gum": {
        "pkg-path": "gum",
        "pkg-group": "demo-tools"
      },
      "semver-tool": {
        "pkg-path": "semver-tool",
        "pkg-group": "cassandra-tools"
      }
    },
    "vars": {
      "CASSANDRA_ALLOW_CLIENTS": "true",
      "CASSANDRA_CLUSTER_NAME": "My Cluster",
      "CASSANDRA_HOST": "127.0.0.1",
      "CASSANDRA_PORT": "19042",
      "CASSANDRA_SEED_ADDRS": "127.0.0.1",
      "CASSANDRA_STORAGE_PORT": "7070",
      "JVM_OPTS": ""
    },
    "hook": {
      "on-activate": "export CASSANDRA_CACHE=\"$FLOX_ENV_CACHE/cassandra\"\nexport CASSANDRA_CONFIG_FILE=\"$CASSANDRA_CACHE/cassandra.yaml\"\n\nif [ ! -d \"$CASSANDRA_CACHE\" ]; then\n  mkdir -p \"$CASSANDRA_CACHE\"\nfi\n\n# Detect version for JVM options\nCASSANDRA_VERSION=\"$(cassandra -v)\"\nif [ \"$(semver compare \"$CASSANDRA_VERSION\" \"4.0.0\")\" != \"-1\" ]; then\n  JVM_OPTS=\"$JVM_OPTS -Xlog:gc=warning,heap*=warning,age*=warning,safepoint=warning,promotion*=warning\"\nfi\n\nif [ ! -f \"$CASSANDRA_CONFIG_FILE\" ]; then\n  cat > \"$CASSANDRA_CONFIG_FILE\" <<EOF\nlisten_address: \"$CASSANDRA_HOST\"\nnative_transport_port: \"$CASSANDRA_PORT\"\nstorage_port: \"$CASSANDRA_STORAGE_PORT\"\nstart_native_transport: \"$CASSANDRA_ALLOW_CLIENTS\"\ncluster_name: \"$CASSANDRA_CLUSTER_NAME\"\ndata_file_directories:\n  - \"$CASSANDRA_CACHE/data\"\ncommitlog_directory: \"$CASSANDRA_CACHE/commitlog\"\nsaved_caches_directory: \"$CASSANDRA_CACHE/saved_caches\"\nhints_directory: \"$CASSANDRA_CACHE/hints\"\nseed_provider:\n  - class_name: \"org.apache.cassandra.locator.SimpleSeedProvider\"\n    parameters:\n      - seeds: \"$CASSANDRA_SEED_ADDRS\"\ncommitlog_sync: \"batch\"\ncommitlog_sync_batch_window_in_ms: 2\npartitioner: \"org.apache.cassandra.dht.Murmur3Partitioner\"\nendpoint_snitch: \"SimpleSnitch\"\nEOF\nfi\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Start Cassandra in the background:' \\\n    '  flox services start' \\\n    '  flox activate --start-services' '' \\\n    'Connect to Cassandra:' \\\n    \"  cqlsh $CASSANDRA_HOST $CASSANDRA_PORT\" '' \\\n    'Connection information:' \\\n    \"  host=$CASSANDRA_HOST\" \\\n    \"  port=$CASSANDRA_PORT\" \\\n    \"  cluster=$CASSANDRA_CLUSTER_NAME\"\nfi\n"
    },
    "options": {},
    "services": {
      "cassandra": {
        "command": "cassandra -Dcassandra.config=file://$CASSANDRA_CONFIG_FILE -f"
      }
    }
  },
