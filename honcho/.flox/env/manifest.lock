{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.10.0",
    "install": {
      "honcho": {
        "pkg-path": "flox/honcho",
        "pkg-group": "honcho",
        "systems": [
          "aarch64-darwin",
          "aarch64-linux",
          "x86_64-linux"
        ]
      },
      "pgvector": {
        "pkg-path": "postgresqlPackages.pgvector",
        "pkg-group": "honcho-pg"
      },
      "postgresql": {
        "pkg-path": "postgresql",
        "pkg-group": "honcho-pg",
        "outputs": "all"
      },
      "redis": {
        "pkg-path": "redis",
        "pkg-group": "honcho-redis"
      }
    },
    "vars": {
      "AUTH_USE_AUTH": "false",
      "CACHE_ENABLED": "true",
      "EMBEDDING_MODEL_CONFIG__MODEL": "text-embedding-3-small",
      "EMBEDDING_MODEL_CONFIG__TRANSPORT": "openai",
      "HONCHO_HOST": "127.0.0.1",
      "HONCHO_PORT": "18000",
      "HONCHO_URL": "http://127.0.0.1:18000",
      "PGDATABASE": "honcho",
      "PGHOSTADDR": "127.0.0.1",
      "PGPASS": "honcho",
      "PGPORT": "15432",
      "PGUSER": "honcho",
      "REDIS_PORT": "16379"
    },
    "hook": {
      "on-activate": "export HONCHO_CACHE=\"$FLOX_ENV_CACHE/honcho\"\nexport PGDIR=\"$HONCHO_CACHE/pgdata\"\nexport PGDATA=\"$PGDIR/data\"\nexport REDISDIR=\"$HONCHO_CACHE/redis\"\nexport LOGDIR=\"$HONCHO_CACHE/logs\"\nmkdir -p \"$PGDIR\" \"$REDISDIR\" \"$LOGDIR\"\n\n# Unix socket dir kept short (<103 bytes) — hashed per env.\nexport PG_SOCKETDIR=\"/tmp/flox-honcho-pg-$(echo \"$PGDIR\" | cksum | cut -d\" \" -f1)\"\nmkdir -p \"$PG_SOCKETDIR\"\n\nexport PGHOST=\"$PGHOSTADDR\"\nexport DB_CONNECTION_URI=\"postgresql+psycopg://$PGUSER:$PGPASS@$PGHOSTADDR:$PGPORT/$PGDATABASE\"\nexport CACHE_URL=\"redis://$PGHOSTADDR:$REDIS_PORT/0?suppress=true\"\n\n# Where pg_config et al find pgvector's .so — flox links the\n# extension into $FLOX_ENV but postgres needs the dynamic\n# library lookup to work.\nexport PG_LIBDIR=\"$FLOX_ENV/lib\"\nexport PG_SHAREDIR=\"$FLOX_ENV/share/postgresql\"\n\nINIT_LOG=\"$PGDIR/init.log\"\n\npg_init_fail() {\n  echo \"ERROR: PostgreSQL initialization failed.\" >&2\n  [ -f \"$INIT_LOG\" ] && { echo \"--- init.log ---\" >&2; cat \"$INIT_LOG\" >&2; echo \"--- end init.log ---\" >&2; }\n  exit 1\n}\n\nif [[ ! -d \"$PGDATA\" ]]; then\n  mkdir -p \"$PGDATA\"\n  initdb \"$PGDATA\" \\\n    --locale=C --encoding=UTF8 --auth=trust \\\n    --username \"$PGUSER\" \\\n    >> \"$INIT_LOG\" 2>&1 || pg_init_fail\n\n  pg_ctl -D \"$PGDATA\" -w start \\\n    -o \"-c unix_socket_directories=$PG_SOCKETDIR -c listen_addresses=$PGHOSTADDR -p $PGPORT\" \\\n    >> \"$INIT_LOG\" 2>&1 || pg_init_fail\n\n  createdb -h \"$PG_SOCKETDIR\" -p \"$PGPORT\" -U \"$PGUSER\" \"$PGDATABASE\" \\\n    >> \"$INIT_LOG\" 2>&1 || pg_init_fail\n  psql -h \"$PG_SOCKETDIR\" -p \"$PGPORT\" -U \"$PGUSER\" -d \"$PGDATABASE\" \\\n    -c \"CREATE EXTENSION IF NOT EXISTS vector\" \\\n    >> \"$INIT_LOG\" 2>&1 || pg_init_fail\n\n  # Run alembic migrations once at init.\n  honcho-migrate upgrade head >> \"$INIT_LOG\" 2>&1 || pg_init_fail\n\n  pg_ctl -D \"$PGDATA\" -m fast -w stop >> \"$INIT_LOG\" 2>&1\n  rm -f \"$INIT_LOG\"\nfi\n\n# One-shot reminder: honcho's reasoning paths need an LLM key.\n# /health and the storage API work without one, so this is a\n# soft warning, not a hard failure.\nif [ -z \"${LLM_OPENAI_API_KEY:-}${LLM_ANTHROPIC_API_KEY:-}${LLM_GEMINI_API_KEY:-}${LLM_OPENAI_BASE_URL:-}${LLM_ANTHROPIC_BASE_URL:-}${LLM_GEMINI_BASE_URL:-}\" ] \\\n    && [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  echo \"honcho: no LLM provider configured — chat/reasoning endpoints will fail.\" >&2\n  echo \"        set LLM_OPENAI_API_KEY (or _ANTHROPIC_, _GEMINI_), or an\" >&2\n  echo \"        LLM_*_BASE_URL for a local/compatible endpoint, first.\" >&2\nfi\n"
    },
    "options": {},
    "services": {
      "honcho-api": {
        "command": "until pg_isready -h \"$PGHOSTADDR\" -p \"$PGPORT\" -q 2>/dev/null; do sleep 0.3; done\nexec honcho-server\n"
      },
      "honcho-deriver": {
        "command": "until pg_isready -h \"$PGHOSTADDR\" -p \"$PGPORT\" -q 2>/dev/null; do sleep 0.3; done\nexec honcho-deriver\n"
      },
      "postgres": {
        "command": "export PGDATA=\"$FLOX_ENV_CACHE/honcho/pgdata/data\"\nexport PG_SOCKETDIR=\"/tmp/flox-honcho-pg-$(echo \"$FLOX_ENV_CACHE/honcho/pgdata\" | cksum | cut -d\" \" -f1)\"\nmkdir -p \"$PG_SOCKETDIR\"\nexec postgres -D \"$PGDATA\" \\\n  -c unix_socket_directories=\"$PG_SOCKETDIR\" \\\n  -c listen_addresses=\"$PGHOSTADDR\" \\\n  -p \"$PGPORT\"\n"
      },
      "redis": {
        "command": "exec redis-server --port \"$REDIS_PORT\" \\\n  --bind \"$PGHOSTADDR\" \\\n  --dir \"$FLOX_ENV_CACHE/honcho/redis\" \\\n  --save \"\"\n"
      }
    }
  },
