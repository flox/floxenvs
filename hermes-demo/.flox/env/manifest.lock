      },
      "ripgrep": {
        "pkg-path": "ripgrep",
        "pkg-group": "hermes"
      }
    },
    "vars": {
      "HERMES_HOME": ""
    },
    "hook": {
      "on-activate": "HERMES_HOME=\"$FLOX_ENV_CACHE/hermes\"\nexport HERMES_HOME\nmkdir -p \"$HERMES_HOME\"\n\n# Lazy-install backends (anthropic, exa, faster-whisper, ...)\n# would try to `pip install` into the read-only Nix venv and\n# fail. Seed the user config to disable them so the user\n# gets clean FeatureUnavailable errors instead of pip\n# tracebacks.\nconfig=\"$HERMES_HOME/config.yaml\"\nif [ ! -f \"$config\" ]; then\n  printf 'security:\\n  allow_lazy_installs: false\\n' \\\n    > \"$config\"\nfi\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    'Hermes Agent — self-improving AI from Nous Research' '' \\\n    'First run:' \\\n    '  hermes setup     — interactive wizard' \\\n    '  hermes model     — pick a provider/model' '' \\\n    'Talk to it:' \\\n    '  hermes           — terminal UI' \\\n    '  hermes gateway   — Telegram/Discord/Slack' '' \\\n    \"HERMES_HOME=$HERMES_HOME\"\nfi\n"
    },
    "options": {}
  },
