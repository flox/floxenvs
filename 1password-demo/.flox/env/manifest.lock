      "op": {
        "pkg-path": "_1password",
        "pkg-group": "1password"
      }
    },
    "hook": {
      "on-activate": "# Cache 1Password session token so repeated\n# activations don't prompt for auth.\nexport OP_CACHE=\"$FLOX_ENV_CACHE/1password\"\nmkdir -p \"$OP_CACHE\"\n\nif ! op vault list >/dev/null 2>&1; then\n  SESSION_FILE=\"$OP_CACHE/session\"\n  OP_TOKEN=\"\"\n  if [ -f \"$SESSION_FILE\" ]; then\n    OP_TOKEN=$(cat \"$SESSION_FILE\")\n  fi\n  if [ -z \"$OP_TOKEN\" ] \\\n      || ! op whoami --session \"$OP_TOKEN\" \\\n           >/dev/null 2>&1; then\n    OP_TOKEN=$(op signin --raw 2>&1) || true\n    if op whoami --session \"$OP_TOKEN\" \\\n         >/dev/null 2>&1; then\n      echo \"$OP_TOKEN\" > \"$SESSION_FILE\"\n      chmod 600 \"$SESSION_FILE\"\n    fi\n  fi\n  if [ -n \"$OP_TOKEN\" ]; then\n    export OP_SESSION_TOKEN=\"$OP_TOKEN\"\n  fi\nfi\n\nif [[ \"${FLOX_ENVS_TESTING:-}\" != \"1\" ]]; then\n  gum style --border double --margin '1 2' \\\n    --padding '1 4' \\\n    '1Password CLI environment ready!' '' \\\n    'op version:' \\\n    \"  $(op --version)\" '' \\\n    'Usage:' \\\n    '  op vault list          List vaults' \\\n    '  op item list           List items' \\\n    '  op item get <name>     Get an item' \\\n    '' \\\n    'Fetch secrets in your hook:' \\\n    '  export API_KEY=$(op item get \"MyService\" \\' \\\n    '    --field \"credential\")'\nfi\n"
    },
    "profile": {
      "common": "if [ -n \"${OP_SESSION_TOKEN:-}\" ]; then\n  alias op=\"op --session $OP_SESSION_TOKEN\"\nfi\n"
    },
    "options": {}
  },
