    "hook": {
      "on-activate": "export MONGO_DATA=\"$FLOX_ENV_CACHE/mongodb\"\n\nif [ ! -d \"$MONGO_DATA\" ]; then\n  mkdir -m 0700 -p \"$MONGO_DATA\"\nfi\n"
    },
    "options": {},
    "services": {
      "mongodb": {
        "command": "  MONGO_DATA=\"$FLOX_ENV_CACHE/mongodb\"\n  exec mongod --dbpath \"$MONGO_DATA\" \\\n    --bind_ip \"$MONGO_HOST\" --port \"$MONGO_PORT\"\n"
      }
    }
